const {useState,useEffect,useRef,useCallback,useMemo} = React;h

/* ── 이벤트 헬퍼 ──────────────────────────────────────────── */
function getActiveEvents(date, menuName) {
  const menuHead = MASTER.menuHead.find(m=>m.name===menuName);
  return MASTER.events.filter(ev => {
    if (!ev.active) return false;
    if (date < ev.startDate || date > ev.endDate) return false;
    if (ev.menuCode && menuHead && ev.menuCode !== menuHead.code) return false;
    return true;
  });
}
function applyDiscount(price, events) {
  let p = price;
  events.forEach(ev => {
    if (ev.discountType === '%')   p = Math.round(p * (1 - ev.discountValue/100));
    if (ev.discountType === 'amt') p = Math.max(0, p - ev.discountValue);
  });
  return p;
}

/* ── 고객 자동완성 ────────────────────────────────────────── */
function CustomerAC({value, onChange, customers}) {
  const [open, setOpen]   = useState(false);
  const [query, setQuery] = useState(value||'');
  const wrapRef           = useRef();

  useEffect(()=>{ setQuery(value||''); },[value]);
  useEffect(()=>{
    const handler = e => { if(wrapRef.current&&!wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return ()=>document.removeEventListener('mousedown', handler);
  },[]);

  const hits = query.length>=1
    ? customers.filter(c=>(c.name+c.phone+(c.nameEn||'')).toLowerCase().includes(query.toLowerCase())).slice(0,8)
    : [];

  return (
    <div className="ac-wrap" ref={wrapRef}>
      <input
        value={query}
        onChange={e=>{ setQuery(e.target.value); onChange(e.target.value); setOpen(true); }}
        onFocus={()=>setOpen(true)}
        placeholder="고객명"
        style={{width:'100%',height:'100%',background:'transparent',border:'none',outline:'none',color:'var(--text)',fontSize:10.5,padding:'3px 5px',fontFamily:'inherit'}}
      />
      {open && hits.length>0 && (
        <div className="ac-list">
          {hits.map(c=>(
            <div key={c.id} className="ac-item"
              onMouseDown={e=>{e.preventDefault();setQuery(c.name);onChange(c.name,c);setOpen(false);}}>
              {c.name}{c.nameEn?` (${c.nameEn})`:''} <span style={{color:'var(--text3)',fontSize:9}}>{c.grade||''}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── 메뉴 구성 팝업 ───────────────────────────────────────── */
function MenuCompositionPopup({menuName, onClose}) {
  const head = MASTER.menuHead.find(m=>m.name===menuName);
  const body = head ? MASTER.menuBody.filter(b=>b.menuCode===head.code&&b.active).sort((a,b)=>a.seq-b.seq) : [];
  const pgName = code => { const p=MASTER.program.find(x=>x.code===code); return p?p.name:code; };
  if(!head) return null;
  return (
    <div className="menu-popup-bg" onClick={onClose}>
      <div className="menu-popup" onClick={e=>e.stopPropagation()}>
        <h4>{head.name}</h4>
        <div style={{fontSize:10,color:'var(--text3)',marginBottom:8}}>{head.desc} · {head.totalTime}분 · {fmt(head.price)}₫</div>
        {body.length===0 ? <div style={{color:'var(--text3)',fontSize:11}}>구성 없음</div> :
          body.map((b,i)=>(
            <div key={i} className="pg-row">
              <div className="pg-num">{b.seq}</div>
              <div style={{flex:1}}>{pgName(b.pgCode)}</div>
              <div style={{color:'var(--text3)',fontSize:10}}>{b.time}</div>
            </div>
          ))
        }
        <button className="btn btn-s" onClick={onClose} style={{marginTop:12}}>닫기</button>
      </div>
    </div>
  );
}

/* ── 영수증 팝업 ──────────────────────────────────────────── */
function ReceiptPopup({row, date, onClose}) {
  const head     = MASTER.menuHead.find(m=>m.name===row.service);
  const events   = row.service ? getActiveEvents(date, row.service) : [];
  const basePrice= head?.price||0;
  const disced   = applyDiscount(basePrice, events);
  const total    = (Number(row.cash)||0)+(Number(row.deposit)||0)+(Number(row.card)||0)+(Number(row.krw)||0);
  return (
    <div className="receipt-bg" onClick={onClose}>
      <div className="receipt" onClick={e=>e.stopPropagation()}>
        <h2>HWASA K-Beauty</h2>
        <div className="sub">하노이 뷰티 살롱 · {date}</div>
        <div className="row"><span>고객명</span><span>{row.name||'-'}</span></div>
        <div className="row"><span>등급</span><span>{row.grade||'-'}</span></div>
        <div className="row"><span>메뉴</span><span>{row.service||'-'}</span></div>
        {basePrice>0&&<div className="row"><span>정가</span><span>{fmt(basePrice)}₫</span></div>}
        {events.length>0&&events.map((ev,i)=>(<div key={i} className="row" style={{color:'#c00'}}><span>이벤트: {ev.name}</span><span>{ev.discountType==='%'?`-${ev.discountValue}%`:`-${fmt(ev.discountValue)}₫`}</span></div>))}
        {events.length>0&&<div className="row"><span>할인가</span><span>{fmt(disced)}₫</span></div>}
        {Number(row.cash)>0&&<div className="row"><span>현금</span><span>{fmt(row.cash)}₫</span></div>}
        {Number(row.deposit)>0&&<div className="row"><span>이체+10%</span><span>{fmt(row.deposit)}₫</span></div>}
        {Number(row.card)>0&&<div className="row"><span>카드</span><span>{fmt(row.card)}₫</span></div>}
        {Number(row.krw)>0&&<div className="row"><span>한국돈</span><span>{fmt(row.krw)}₫</span></div>}
        {Number(row.tipDeduct)>0&&<div className="row"><span>팁</span><span>{fmt(row.tipDeduct)}₫</span></div>}
        <div className="total-row"><span>합계</span><span>{fmt(total)}₫</span></div>
        <div className="footer">HWASA K-Beauty — 감사합니다 · Cảm ơn quý khách</div>
        <div style={{textAlign:'center',marginTop:10}}>
          <button onClick={()=>window.print()} style={{padding:'5px 14px',background:'#222',color:'#fff',border:'none',borderRadius:4,cursor:'pointer',fontSize:11}}>인쇄</button>
          <button onClick={onClose} style={{marginLeft:8,padding:'5px 14px',background:'#ddd',border:'none',borderRadius:4,cursor:'pointer',fontSize:11}}>닫기</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   SALES DAILY INPUT — SPREADSHEET
   ════════════════════════════════════════ */
function SalesDailyInput() {
  const [selDate, setSelDate] = useState(today());
  const [data,    setData]    = useState({ rows: [], expenses: [] });
  const [customers, setCust]  = useState([]);
  const [menuPopup, setMenuPop] = useState(null);
  const [receipt,   setReceipt] = useState(null);

  const loadData = useCallback(async (date) => {
    const all  = await DataService.read('sales');
    const d    = all[date] || { rows: [], expenses: [] };
    if (d.rows.length === 0) d.rows = [mkSaleRow(1, date)];
    setData(d);
  }, []);
  useEffect(() => { loadData(selDate); }, [selDate, loadData]);
  useEffect(() => { DataService.read('customers').then(setCust); }, []);

  const mkSaleRow = (no, date) => ({
    no, date, name:'', grade:'', service:'', therapist:'',
    hair:false, event:false, vip:false,
    deductAmt:0, deduct:0, tipDeduct:0,
    cash:0, deposit:0, card:0, krw:0, unpaid:0,
    male:'', female:'', ticket:'',
  });

  const upRow = (i, f, v) => setData(p => {
    const rows = [...p.rows]; rows[i] = { ...rows[i], [f]: v }; return { ...p, rows };
  });

  // 메뉴 선택 시 자동가격 + 이벤트 할인
  const onMenuChange = (ri, menuName) => {
    const head   = MASTER.menuHead.find(m=>m.name===menuName);
    if (!head) { upRow(ri, 'service', menuName); return; }
    const events = getActiveEvents(selDate, menuName);
    const discPrice = applyDiscount(head.price, events);
    setData(p => {
      const rows = [...p.rows];
      rows[ri] = { ...rows[ri], service: menuName, cash: discPrice, event: events.length>0, deductAmt: events.length>0 ? head.price - discPrice : 0 };
      return { ...p, rows };
    });
  };

  // 고객 선택 시 등급 자동 채우기
  const onCustomerSelect = (ri, name, cust) => {
    setData(p => {
      const rows = [...p.rows];
      rows[ri] = { ...rows[ri], name, grade: cust?.grade||rows[ri].grade };
      return { ...p, rows };
    });
  };

  const addRow = () => setData(p => ({ ...p, rows: [...p.rows, mkSaleRow(p.rows.length+1, selDate)] }));
  const delRow = (i) => setData(p => ({ ...p, rows: p.rows.filter((_,j)=>j!==i).map((r,j)=>({...r,no:j+1})) }));
  const addExp = () => setData(p => ({ ...p, expenses: [...p.expenses, {item:'기타',amount:0,note:''}] }));
  const upExp = (i,f,v) => setData(p => { const e=[...p.expenses]; e[i]={...e[i],[f]:v}; return {...p,expenses:e}; });
  const delExp = (i) => setData(p => ({ ...p, expenses: p.expenses.filter((_,j)=>j!==i) }));
  const save = async () => {
    const all = await DataService.read('sales');
    all[selDate] = data;
    await DataService.write('sales', all);
    alert('저장 완료');
  };

  const totals = useMemo(() => {
    const r=data.rows; const sm=(f)=>r.reduce((a,x)=>a+(Number(x[f])||0),0);
    const expT=data.expenses.reduce((a,x)=>a+(Number(x.amount)||0),0);
    const inc=sm('cash')+sm('deposit')+sm('card')+sm('krw');
    return { dCnt:r.filter(x=>Number(x.deduct)>0).length, dAmt:sm('deductAmt'), tip:sm('tipDeduct'),
      cash:sm('cash'), dep:sm('deposit'), card:sm('card'), krw:sm('krw'), unpaid:sm('unpaid'),
      male:r.filter(x=>x.male).length, female:r.filter(x=>x.female).length, expT, inc, net:inc-expT };
  }, [data]);

  const menuOpts = ['',...MASTER.menuHead.filter(m=>m.active).map(m=>m.name)];

  return (
    <div className="fade-in">
      <div className="toolbar">
        <input type="date" className="form-inp" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{width:150}} />
        <span style={{fontSize:11,color:'var(--text2)'}}>{new Date(selDate+'T00:00').toLocaleDateString('ko-KR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</span>
        <div className="spacer" />
        <button className="btn btn-s" onClick={addRow}>+ 행 추가</button>
        <button className="btn btn-g" onClick={save}>저장</button>
      </div>
      <div className="ss-wrap">
        <table className="ss" style={{minWidth:1550}}>
          <thead>
            <tr>
              <th style={{minWidth:30}}>No</th>
              <th style={{minWidth:90}}>고객명</th>
              <th style={{minWidth:75}}>멤버등급</th>
              <th style={{minWidth:70}}>담당자</th>
              <th style={{minWidth:140}}>메뉴</th>
              <th style={{minWidth:30}}>탈모</th><th style={{minWidth:40}}>이벤트</th><th style={{minWidth:30}}>VIP</th>
              <th style={{minWidth:80}}>차감금액</th><th style={{minWidth:55}}>차감</th>
              <th style={{minWidth:75}}>팁차감</th>
              <th style={{minWidth:85}}>현금</th><th style={{minWidth:80}}>입금+10%</th>
              <th style={{minWidth:80}}>카드</th><th style={{minWidth:75}}>한국돈</th><th style={{minWidth:65}}>미수</th>
              <th style={{minWidth:30}}>남</th><th style={{minWidth:30}}>여</th><th style={{minWidth:55}}>TICKET</th>
              <th style={{width:28}}>영수증</th>
              <th style={{width:28}}>×</th>
            </tr>
          </thead>
          <tbody>
            {data.rows.map((row,ri)=>(
              <tr key={ri}>
                <td><div className="rn">{row.no}</div></td>
                {/* 고객명 자동완성 */}
                <td>
                  <CustomerAC
                    value={row.name}
                    onChange={(name,cust)=>cust ? onCustomerSelect(ri,name,cust) : upRow(ri,'name',name)}
                    customers={customers}
                  />
                </td>
                {/* 멤버등급 */}
                <td><select value={row.grade||''} onChange={e=>upRow(ri,'grade',e.target.value)}>{MEMBER_GRADES.map(o=><option key={o} value={o}>{o||'-'}</option>)}</select></td>
                {/* 담당자 */}
                <td><select value={row.therapist||''} onChange={e=>upRow(ri,'therapist',e.target.value)} style={{width:'100%',height:'100%',background:'transparent',border:'none',outline:'none',color:'var(--text)',fontSize:10.5,padding:'3px 5px',fontFamily:'inherit'}}><option value=''>-</option>{EMPLOYEES.map(e=><option key={e.name} value={e.nameKr}>{e.nameKr}</option>)}</select></td>
                {/* 메뉴 */}
                <td>
                  <div style={{display:'flex',alignItems:'center',height:'100%'}}>
                    <select value={row.service||''} onChange={e=>onMenuChange(ri,e.target.value)} style={{flex:1,height:'100%',background:'transparent',border:'none',outline:'none',color:'var(--text)',fontSize:10.5,padding:'3px 5px',fontFamily:'inherit'}}>
                      {menuOpts.map(o=><option key={o} value={o}>{o||'-'}</option>)}
                    </select>
                    {row.service && <button onClick={()=>setMenuPop(row.service)} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:11,padding:'0 3px',flexShrink:0}} title="메뉴 구성 보기">☰</button>}
                  </div>
                </td>
                <td><div style={{textAlign:'center'}}><input type="checkbox" checked={!!row.hair}    onChange={e=>upRow(ri,'hair',e.target.checked)}/></div></td>
                <td><div style={{textAlign:'center'}}><input type="checkbox" checked={!!row.event}   onChange={e=>upRow(ri,'event',e.target.checked)}/></div></td>
                <td><div style={{textAlign:'center'}}><input type="checkbox" checked={!!row.vip}     onChange={e=>upRow(ri,'vip',e.target.checked)}/></div></td>
                <td className="nc"><input value={row.deductAmt||''} onChange={e=>upRow(ri,'deductAmt',Number(e.target.value.replace(/,/g,''))||0)} placeholder="0"/></td>
                <td className="nc"><input value={row.deduct||''}    onChange={e=>upRow(ri,'deduct',Number(e.target.value.replace(/,/g,''))||0)} placeholder="0"/></td>
                <td className="nc"><input value={row.tipDeduct||''} onChange={e=>upRow(ri,'tipDeduct',Number(e.target.value.replace(/,/g,''))||0)} placeholder="0"/></td>
                <td className="nc"><input value={row.cash||''}      onChange={e=>upRow(ri,'cash',Number(e.target.value.replace(/,/g,''))||0)} placeholder="0"/></td>
                <td className="nc"><input value={row.deposit||''}   onChange={e=>upRow(ri,'deposit',Number(e.target.value.replace(/,/g,''))||0)} placeholder="0"/></td>
                <td className="nc"><input value={row.card||''}      onChange={e=>upRow(ri,'card',Number(e.target.value.replace(/,/g,''))||0)} placeholder="0"/></td>
                <td className="nc"><input value={row.krw||''}       onChange={e=>upRow(ri,'krw',Number(e.target.value.replace(/,/g,''))||0)} placeholder="0"/></td>
                <td className="nc"><input value={row.unpaid||''}    onChange={e=>upRow(ri,'unpaid',Number(e.target.value.replace(/,/g,''))||0)} placeholder="0"/></td>
                <td><input value={row.male||''}   onChange={e=>upRow(ri,'male',e.target.value)}/></td>
                <td><input value={row.female||''} onChange={e=>upRow(ri,'female',e.target.value)}/></td>
                <td><input value={row.ticket||''} onChange={e=>upRow(ri,'ticket',e.target.value)}/></td>
                <td><button className="del-btn" onClick={()=>setReceipt(row)} title="영수증">🧾</button></td>
                <td><button className="del-btn" onClick={()=>delRow(ri)}>×</button></td>
              </tr>
            ))}
            <tr className="ss-total">
              <td colSpan={8} style={{textAlign:'right',paddingRight:8}}>합계</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.dAmt)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{totals.dCnt}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.tip)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.cash)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.dep)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.card)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.krw)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.unpaid)}</td>
              <td style={{textAlign:'center'}}>{totals.male}</td>
              <td style={{textAlign:'center'}}>{totals.female}</td>
              <td colSpan={3}></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:10}}>
        <div className="exp-panel">
          <h4>지출 항목</h4>
          {data.expenses.map((exp,i)=>(
            <div key={i} className="exp-row">
              <select value={exp.item} onChange={e=>upExp(i,'item',e.target.value)}>{EXPENSE_ITEMS.map(it=><option key={it} value={it}>{it}</option>)}</select>
              <input value={exp.amount||''} placeholder="금액" onChange={e=>upExp(i,'amount',Number(e.target.value.replace(/,/g,''))||0)} style={{width:90}}/>
              <input value={exp.note||''} placeholder="비고" onChange={e=>upExp(i,'note',e.target.value)}/>
              <button onClick={()=>delExp(i)} style={{background:'none',border:'none',color:'var(--err)',cursor:'pointer',fontSize:13}}>×</button>
            </div>
          ))}
          <button className="btn btn-s" onClick={addExp} style={{marginTop:5}}>+ 지출 추가</button>
        </div>
        <div className="close-panel">
          <h4>일일 마감 집계</h4>
          <div className="close-grid">
            {[['차감횟수',totals.dCnt+'건'],['차감금액',fmt(totals.dAmt)],['팁차감',fmt(totals.tip)],
              ['현금',fmt(totals.cash)],['입금+10%',fmt(totals.dep)],['카드',fmt(totals.card)],
              ['한국돈',fmt(totals.krw)],['미수금',fmt(totals.unpaid)],
              ['총지출',fmt(totals.expT),'var(--err)'],['총수입',fmt(totals.inc),'var(--ok)'],
              ['남',totals.male+'명'],['여',totals.female+'명'],
            ].map(([k,v,c],i)=>(
              <div key={i} className="close-item"><span className="k">{k}</span><span className="v" style={c?{color:c}:{}}>{v}</span></div>
            ))}
            <div className="close-item" style={{gridColumn:'span 2',borderColor:'var(--border-gold)'}}>
              <span className="k">남은돈 (수입-지출)</span><span className="v" style={{fontSize:13}}>{fmt(totals.net)}</span>
            </div>
          </div>
        </div>
      </div>
      {menuPopup && <MenuCompositionPopup menuName={menuPopup} onClose={()=>setMenuPop(null)}/>}
      {receipt    && <ReceiptPopup row={receipt} date={selDate} onClose={()=>setReceipt(null)}/>}
    </div>
  );
}

/* ════════════════════════════════════════
   SALES LIST / MONTHLY
   ════════════════════════════════════════ */
function SalesList() {
  const [data, setData] = useState({});
  const [sel, setSel] = useState('');
  useEffect(()=>{DataService.read('sales').then(setData);},[]);
  const dates = Object.keys(data).sort().reverse();

  if (sel && data[sel]) {
    const d = data[sel];
    return (<div className="fade-in">
      <div className="toolbar"><button className="btn btn-s" onClick={()=>setSel('')}>← 목록</button><span style={{fontSize:12,fontWeight:600}}>{sel} 매출 상세</span></div>
      <div className="ss-wrap"><table className="ss" style={{minWidth:1200}}>
        <thead><tr><th>No</th><th>고객명</th><th>등급</th><th>서비스</th><th>차감금액</th><th>차감</th><th>팁차감</th><th>현금</th><th>입금</th><th>카드</th><th>한국돈</th><th>미수</th><th>남</th><th>여</th></tr></thead>
        <tbody>{d.rows.map((r,i)=>(<tr key={i}><td className="rn">{r.no}</td><td style={{padding:'3px 6px'}}>{r.name}</td><td style={{padding:'3px 6px'}}>{r.grade}</td><td style={{padding:'3px 6px'}}>{r.service}</td>
          <td className="nc" style={{padding:'3px 6px'}}>{fmt(r.deductAmt)}</td><td className="nc" style={{padding:'3px 6px'}}>{fmt(r.deduct)}</td><td className="nc" style={{padding:'3px 6px'}}>{fmt(r.tipDeduct)}</td>
          <td className="nc" style={{padding:'3px 6px'}}>{fmt(r.cash)}</td><td className="nc" style={{padding:'3px 6px'}}>{fmt(r.deposit)}</td><td className="nc" style={{padding:'3px 6px'}}>{fmt(r.card)}</td>
          <td className="nc" style={{padding:'3px 6px'}}>{fmt(r.krw)}</td><td className="nc" style={{padding:'3px 6px'}}>{fmt(r.unpaid)}</td>
          <td style={{textAlign:'center',padding:'3px'}}>{r.male}</td><td style={{textAlign:'center',padding:'3px'}}>{r.female}</td></tr>))}</tbody>
      </table></div></div>);
  }

  return (<div className="fade-in"><div className="pn">
    <div className="pn-h"><div><div className="pn-t">매출 내역</div></div></div>
    <table className="tbl"><thead><tr><th>날짜</th><th>건수</th><th className="num">현금</th><th className="num">입금</th><th className="num">카드</th><th className="num">한국돈</th><th className="num">미수</th><th className="num">합계</th></tr></thead>
    <tbody>{dates.map(dt=>{const d=data[dt];const sm=(f)=>d.rows.reduce((a,x)=>a+(Number(x[f])||0),0);const tot=sm('cash')+sm('deposit')+sm('card')+sm('krw');
      return (<tr key={dt} onClick={()=>setSel(dt)} style={{cursor:'pointer'}}><td style={{fontWeight:500,color:'var(--gold-light)'}}>{dt}</td><td>{d.rows.length}건</td>
        <td className="num">{fmt(sm('cash'))}</td><td className="num">{fmt(sm('deposit'))}</td><td className="num">{fmt(sm('card'))}</td><td className="num">{fmt(sm('krw'))}</td><td className="num">{fmt(sm('unpaid'))}</td>
        <td className="num" style={{fontWeight:600,color:'var(--gold-light)'}}>{fmt(tot)}</td></tr>);
    })}</tbody></table></div></div>);
}

function SalesMonthlySummary() {
  const [data, setData] = useState({});
  const [mo, setMo] = useState('2026-03');
  useEffect(()=>{DataService.read('sales').then(setData);},[]);
  const mDates=Object.keys(data).filter(d=>d.startsWith(mo)).sort();
  const mData=mDates.map(dt=>{const d=data[dt];const sm=(f)=>d.rows.reduce((a,x)=>a+(Number(x[f])||0),0);const expT=(d.expenses||[]).reduce((a,x)=>a+(Number(x.amount)||0),0);
    return {date:dt,cnt:d.rows.length,cash:sm('cash'),dep:sm('deposit'),card:sm('card'),krw:sm('krw'),unpaid:sm('unpaid'),exp:expT};});
  const gt=(f)=>mData.reduce((a,x)=>a+x[f],0);
  const totInc=gt('cash')+gt('dep')+gt('card')+gt('krw');

  return (<div className="fade-in">
    <div className="toolbar"><input type="month" className="form-inp" value={mo} onChange={e=>setMo(e.target.value)} style={{width:150}}/></div>
    <div className="cards">
      {[['총 매출',fmt(totInc),'var(--gold)'],['현금',fmt(gt('cash')),'var(--ok)'],['카드',fmt(gt('card')),'var(--info)'],['총 지출',fmt(gt('exp')),'var(--warn)'],['미수금',fmt(gt('unpaid')),'var(--err)'],['총 건수',gt('cnt'),'#9B59B6',mDates.length+'일 영업']].map(([lb,vl,c,sub],i)=>(
        <div className="card" key={i}><div className="card-bar" style={{background:c}}/><div className="card-lb">{lb}</div><div className="card-vl">{vl}</div>{sub&&<div className="card-sub">{sub}</div>}</div>
      ))}
    </div>
    <div className="pn"><table className="tbl">
      <thead><tr><th>날짜</th><th>건수</th><th className="num">현금</th><th className="num">입금</th><th className="num">카드</th><th className="num">한국돈</th><th className="num">미수</th><th className="num">지출</th><th className="num">순수입</th></tr></thead>
      <tbody>{mData.map(d=>{const inc=d.cash+d.dep+d.card+d.krw;return (<tr key={d.date}><td>{d.date}</td><td>{d.cnt}건</td><td className="num">{fmt(d.cash)}</td><td className="num">{fmt(d.dep)}</td><td className="num">{fmt(d.card)}</td><td className="num">{fmt(d.krw)}</td><td className="num">{fmt(d.unpaid)}</td><td className="num" style={{color:'var(--err)'}}>{fmt(d.exp)}</td><td className="num" style={{fontWeight:600,color:'var(--gold-light)'}}>{fmt(inc-d.exp)}</td></tr>);})}
        <tr style={{background:'var(--gold-glow)'}}><td style={{fontWeight:600}}>합계</td><td>{gt('cnt')}건</td><td className="num" style={{fontWeight:600}}>{fmt(gt('cash'))}</td><td className="num" style={{fontWeight:600}}>{fmt(gt('dep'))}</td><td className="num" style={{fontWeight:600}}>{fmt(gt('card'))}</td><td className="num" style={{fontWeight:600}}>{fmt(gt('krw'))}</td><td className="num" style={{fontWeight:600}}>{fmt(gt('unpaid'))}</td><td className="num" style={{fontWeight:600,color:'var(--err)'}}>{fmt(gt('exp'))}</td><td className="num" style={{fontWeight:700,color:'var(--gold-light)',fontSize:12}}>{fmt(totInc-gt('exp'))}</td></tr>
      </tbody></table></div></div>);
}

function App() {
  const [user,setUser]=useState(getUser());
  const [subTab,setSub]=useState(0);
  const [now,setNow]=useState(new Date());
  const [dark,setDark]=useState(()=>localStorage.getItem('hskb_theme')!=='light');

  useEffect(()=>{ if(!user){ window.location.href='PAGE_ERP.html'; return; } const t=setInterval(()=>setNow(new Date()),60000); return ()=>clearInterval(t); },[user]);
  useEffect(()=>{ document.body.classList.toggle('light',!dark); localStorage.setItem('hskb_theme',dark?'dark':'light'); },[dark]);

  if(!user) return null;
  const logout=()=>{ localStorage.removeItem('hskb_erp_user'); window.location.href='PAGE_ERP.html'; };

  const renderContent=()=>{ return subTab===0?<SalesDailyInput/>:subTab===1?<SalesList/>:<SalesMonthlySummary/>; };

  return (
    <React.Fragment>
      <style>{ CSS }{ SALES_CSS }</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-logo"><div className="mk">H</div><div className="nm">HWASA K-Beauty</div></div>
          <div className="hdr-nav">
            { ERP_PAGES.map(p=>(
              <a key={p.id} href={p.href} className={'hdr-tab'+(p.id==='sales'?' active':'')} style={{ textDecoration:'none' }}> <Ic d={p.icon} size={14}/>{ p.label }</a>
            )) }
          </div>
          <div className="hdr-right">
            <div className="hdr-date">{now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
            <button className="theme-btn" onClick={()=>setDark(!dark)}>
              {dark ? <Ic d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" size={15}/>
                : <Ic d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" size={15}/>
              }
            </button>
            <div className="hdr-user">
              <div className="av" style={{ background:user.color||'var(--gold)' }}>{user.initial||user.name?.charAt(0)}</div>
              <div><div className="nm">{user.name}</div><div className="rl">{user.role}</div></div>
            </div>
            <button className="btn-logout" onClick={logout}> 로그아웃</button>
          </div>
        </div>
        <div className="content">
                  <div className="sub-tabs">{SUB_TABS.sales.map((tab,i)=>(
            <div key={i} className={'sub-tab'+(subTab===i?' active':'')} onClick={()=>setSub(i)}>{ tab }</div>
          ))}</div>
          <div className="page" key={subTab}>{renderContent()}</div>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
