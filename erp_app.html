// 매출 목업 데이터 생성
(() => {
  const names = ['김민준','Nguyễn Mai','박서연','Trần Hùng','이수진','Lê Hoa','Phạm Tuấn','정하늘','Đỗ Lan','최예린'];
  const programs = ['화사케어 A','화사케어 B','화사케어 C','골프케어 A','골프케어 B','탈모케어','VIP케어','기본관리'];
  const sales = {};
  for (let d = 2; d <= 15; d++) {
    const date = `2026-03-${String(d).padStart(2,'0')}`;
    const rows = [];
    const cnt = 5 + Math.floor(Math.random() * 8);
    for (let i = 0; i < cnt; i++) {
      const cash = Math.round((Math.random() * 800000 + 200000) / 10000) * 10000;
      const card = Math.random() > 0.6 ? Math.round((Math.random() * 500000) / 10000) * 10000 : 0;
      const tipD = Math.random() > 0.5 ? Math.round((Math.random() * 200000) / 10000) * 10000 : 0;
      rows.push({
        no: i+1, date, name: names[i % names.length],
        grade: MEMBER_GRADES[Math.floor(Math.random()*MEMBER_GRADES.length)],
        service: programs[Math.floor(Math.random()*programs.length)],
        hair: Math.random()>0.8, event: Math.random()>0.85, vip: Math.random()>0.9,
        deductAmt: 0, deduct: 0, tipDeduct: tipD,
        cash, deposit: 0, card, krw: Math.random()>0.8 ? 50000 : 0, unpaid: 0,
        male: Math.random()>0.5 ? 'M' : '', female: Math.random()>0.5 ? 'F' : '', ticket: '',
      });
    }
    const expenses = [];
    if (Math.random() > 0.3) expenses.push({ item: '빨래', amount: 150000, note: '' });
    if (Math.random() > 0.5) expenses.push({ item: '마트', amount: Math.round(Math.random()*300000/10000)*10000, note: '' });
    if (Math.random() > 0.7) expenses.push({ item: '소모품', amount: Math.round(Math.random()*200000/10000)*10000, note: '' });
    sales[date] = { rows, expenses };
  }
  DataService._store.sales = sales;

  // 매입 목업
  DataService._store.purchase = [
    { id:'p001', date:'2026-03-05', supplier:'화장품 도매', item:'앰플 세트', category:'원재료', qty:5, unitPrice:4000000, total:20000000, note:'' },
    { id:'p002', date:'2026-03-08', supplier:'포장재 업체', item:'포장박스', category:'소모품', qty:100, unitPrice:50000, total:5000000, note:'' },

const pad2 = (n) => String(n).padStart(2,'0');
const fmt = (n) => n == null || n === '' ? '' : Number(n).toLocaleString('ko-KR');
const fmtVND = (n) => n == null || n === '' || n === 0 ? '' : Number(n).toLocaleString('ko-KR') + '₫';
const today = () => { const d = new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; };

/* ════════════════════════════════════════

/* ════════════════════════════════════════
   CSS
   ════════════════════════════════════════ */
const CSS = `
:root {
  --gold:#B8956A; --gold-light:#D4B896; --gold-dark:#8B6F4E;
  --gold-glow:rgba(184,149,106,0.15);
  --bg:#0D0D0F; --bg2:#141418; --bg-card:#1A1A1F; --bg-el:#222228;
  --border:rgba(255,255,255,0.06); --border-gold:rgba(184,149,106,0.2);
  --text:#F0ECE6; --text2:#9B9B9B; --text3:#5E5E5E;
  --ok:#6BCB77; --warn:#FFB347; --err:#FF6B6B; --info:#4D96FF;
  --hdr-h:52px; --radius:10px; --rs:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;width:100vw;}

/* HEADER */
.hdr{height:var(--hdr-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:0;flex-shrink:0;z-index:100;}
.hdr-logo{display:flex;align-items:center;gap:8px;margin-right:24px;cursor:default;}
.hdr-logo .mk{width:30px;height:30px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:#fff;}
.hdr-logo .nm{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold-light);letter-spacing:0.5px;}
.hdr-nav{display:flex;gap:2px;flex:1;}
.hdr-tab{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);cursor:pointer;transition:all .2s;color:var(--text2);font-size:12.5px;font-weight:500;position:relative;}
.hdr-tab:hover{color:var(--text);background:rgba(255,255,255,0.04);}
.hdr-tab.active{color:var(--gold-light);background:var(--gold-glow);}
.hdr-tab.active::after{content:'';position:absolute;bottom:-1px;left:16px;right:16px;height:2px;background:var(--gold);border-radius:1px;}
.hdr-right{display:flex;align-items:center;gap:12px;margin-left:auto;}
.hdr-date{font-size:11px;color:var(--text3);}
.hdr-user{display:flex;align-items:center;gap:8px;padding:4px 10px;border-radius:var(--rs);cursor:pointer;transition:all .2s;}
.hdr-user:hover{background:rgba(255,255,255,0.04);}
.hdr-user .av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;}
.hdr-user .info{font-size:11px;}
.hdr-user .nm{font-weight:500;}
.hdr-user .rl{color:var(--text3);font-size:10px;}
.btn-logout{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:var(--rs);font-size:10px;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-logout:hover{border-color:var(--err);color:var(--err);}

/* CONTENT */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.sub-tabs{display:flex;gap:2px;padding:10px 20px 0;background:var(--bg2);border-bottom:1px solid var(--border);}
.sub-tab{padding:8px 16px;font-size:11.5px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-weight:500;}
.sub-tab:hover{color:var(--text);}
.sub-tab.active{color:var(--gold-light);border-bottom-color:var(--gold);}
.page{flex:1;overflow-y:auto;padding:20px;}
.page::-webkit-scrollbar{width:5px;}
.page::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* PANEL */
.pn{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.pn-h{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.pn-t{font-size:13px;font-weight:600;}
.pn-st{font-size:10px;color:var(--text3);margin-top:2px;}
.pn-b{padding:0;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.3px;text-align:left;padding:8px 10px;background:var(--bg-el);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:5;}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;white-space:nowrap;}
.tbl tr:hover td{background:rgba(255,255,255,0.015);}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;}
.tbl .chk{text-align:center;width:40px;}

/* SPREADSHEET */
.ss-wrap{overflow:auto;max-height:calc(100vh - 200px);border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-card);}
.ss{border-collapse:collapse;font-size:11px;min-width:1600px;}
.ss th{background:var(--bg-el);color:var(--text2);font-size:9.5px;font-weight:600;letter-spacing:0.3px;padding:6px 8px;border:1px solid var(--border);position:sticky;top:0;z-index:10;white-space:nowrap;text-align:center;}
.ss td{padding:0;border:1px solid var(--border);height:30px;}
.ss input{width:100%;height:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:11px;padding:4px 6px;font-family:inherit;}
.ss input:focus{background:rgba(184,149,106,0.08);box-shadow:inset 0 0 0 1px var(--gold);}
.ss input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;}
.ss .row-num{background:var(--bg-el);color:var(--text3);text-align:center;font-size:10px;width:35px;padding:4px;}
.ss .num-cell input{text-align:right;}
.ss-total{background:rgba(184,149,106,0.06);}
.ss-total td{font-weight:600;padding:6px 8px;font-size:11px;color:var(--gold-light);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rs);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;border:none;font-family:inherit;}
.btn-g{background:var(--gold);color:#fff;}.btn-g:hover{background:var(--gold-dark);}
.btn-o{background:none;border:1px solid var(--border-gold);color:var(--gold-light);}.btn-o:hover{background:var(--gold-glow);}
.btn-s{background:none;border:1px solid var(--border);color:var(--text2);}.btn-s:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.btn-d{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);color:var(--err);}.btn-d:hover{background:rgba(255,107,107,0.2);}

.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px;}
.form-g{display:flex;flex-direction:column;gap:4px;}
.form-l{font-size:10px;color:var(--text2);font-weight:600;letter-spacing:0.5px;}
.form-inp{background:var(--bg-el);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;font-size:12px;color:var(--text);font-family:inherit;outline:none;transition:all .2s;}
.form-inp:focus{border-color:var(--border-gold);box-shadow:0 0 0 3px var(--gold-glow);}
select.form-inp{cursor:pointer;}

/* SUMMARY CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .2s;position:relative;overflow:hidden;}
.card:hover{border-color:var(--border-gold);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.card-bar{position:absolute;top:0;left:0;right:0;height:2px;}
.card-lb{font-size:10px;color:var(--text2);margin-bottom:6px;}
.card-vl{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.card-sub{font-size:10px;color:var(--text3);margin-top:4px;}

/* STATUS */
.sts{font-size:9px;font-weight:600;padding:2px 8px;border-radius:8px;}
.sts-ok{background:rgba(107,203,119,0.12);color:var(--ok);}
.sts-warn{background:rgba(255,179,71,0.12);color:var(--warn);}
.sts-err{background:rgba(255,107,107,0.12);color:var(--err);}
.sts-info{background:rgba(77,150,255,0.12);color:var(--info);}

/* EXPENSE PANEL */
.exp-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:12px;}
.exp-panel h4{font-size:12px;color:var(--gold-light);margin-bottom:10px;}

.exp-row select{width:100px;} .exp-row input{flex:1;}
.exp-row .del{background:none;border:none;color:var(--err);cursor:pointer;padding:4px;font-size:14px;}

.close-panel{background:rgba(184,149,106,0.04);border:1px solid var(--border-gold);border-radius:var(--radius);padding:16px;margin-top:12px;}

.close-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}

.att-cal{border-collapse:collapse;font-size:10px;width:100%;}
.att-cal th{background:var(--bg-el);padding:6px 4px;border:1px solid var(--border);text-align:center;color:var(--text2);font-weight:600;position:sticky;top:0;z-index:5;}

/* ════════════════════════════════════════
   SALES - DAILY INPUT (SPREADSHEET)
   ════════════════════════════════════════ */
function SalesDailyInput() {
  const [selDate, setSelDate] = useState(today());
  const [data, setData] = useState({ rows: [], expenses: [] });
  const [loading, setLoading] = useState(false);

  const loadData = useCallback(async (date) => {
    setLoading(true);
    const all = await DataService.read('sales');
    const d = all[date] || { rows: [], expenses: [] };
    if (d.rows.length === 0) {
      d.rows = [makeRow(1, date)];
    }
    setData(d);
    setLoading(false);
  }, []);

  useEffect(() => { loadData(selDate); }, [selDate, loadData]);

  const makeRow = (no, date) => ({
    no, date, name:'', grade:'', service:'',
    hair:false, event:false, vip:false,
    deductAmt:0, deduct:0, tipDeduct:0,
    cash:0, deposit:0, card:0, krw:0, unpaid:0,
    male:'', female:'', ticket:'',
  });

  const updateRow = (idx, field, value) => {
    setData(prev => {
      const rows = [...prev.rows];
      rows[idx] = { ...rows[idx], [field]: value };
      return { ...prev, rows };
    });
  };

  const addRow = () => {
    setData(prev => ({
      ...prev,
      rows: [...prev.rows, makeRow(prev.rows.length + 1, selDate)]
    }));
  };

  const deleteRow = (idx) => {
    setData(prev => ({
      ...prev,
      rows: prev.rows.filter((_,i) => i !== idx).map((r,i) => ({...r, no: i+1}))
    }));
  };

  const addExpense = () => {
    setData(prev => ({
      ...prev,
      expenses: [...prev.expenses, { item: '기타', amount: 0, note: '' }]
    }));
  };

  const updateExpense = (idx, field, value) => {
    setData(prev => {
      const expenses = [...prev.expenses];
      expenses[idx] = { ...expenses[idx], [field]: value };
      return { ...prev, expenses };
    });
  };

  const deleteExpense = (idx) => {
    setData(prev => ({ ...prev, expenses: prev.expenses.filter((_,i) => i !== idx) }));
  };

  const saveData = async () => {
    const all = await DataService.read('sales');
    all[selDate] = data;
    await DataService.write('sales', all);
    alert('저장되었습니다.');
  };

  // 집계
  const totals = useMemo(() => {
    const r = data.rows;
    const sum = (f) => r.reduce((a,x) => a + (Number(x[f]) || 0), 0);
    const expTotal = data.expenses.reduce((a,x) => a + (Number(x.amount) || 0), 0);
    const income = sum('cash') + sum('deposit') + sum('card') + sum('krw');
    return {
      deductCnt: r.filter(x => Number(x.deduct) > 0).length,
      deductAmt: sum('deductAmt'), tipDeduct: sum('tipDeduct'),
      cash: sum('cash'), deposit: sum('deposit'), card: sum('card'),
      krw: sum('krw'), unpaid: sum('unpaid'),
      male: r.filter(x => x.male).length, female: r.filter(x => x.female).length,
      expTotal, income, net: income - expTotal,
    };
  }, [data]);

  const cols = [
    { key:'no', label:'No', w:35, type:'readonly' },
    { key:'name', label:'고객명', w:90, type:'text' },
    { key:'grade', label:'멤버등급', w:80, type:'select', options: MEMBER_GRADES },
    { key:'service', label:'서비스/프로그램', w:130, type:'text' },
    { key:'hair', label:'탈모', w:40, type:'check' },
    { key:'event', label:'이벤트', w:45, type:'check' },
    { key:'vip', label:'VIP', w:40, type:'check' },
    { key:'deductAmt', label:'차감금액', w:85, type:'number' },
    { key:'deduct', label:'차감', w:65, type:'number' },
    { key:'tipDeduct', label:'팁차감', w:80, type:'number' },
    { key:'cash', label:'현금', w:90, type:'number' },
    { key:'deposit', label:'입금+10%', w:85, type:'number' },
    { key:'card', label:'카드', w:85, type:'number' },
    { key:'krw', label:'한국돈', w:80, type:'number' },
    { key:'unpaid', label:'미수', w:70, type:'number' },
    { key:'male', label:'남', w:35, type:'text' },
    { key:'female', label:'여', w:35, type:'text' },
    { key:'ticket', label:'TICKET', w:60, type:'text' },
  ];

  return (
    <div className="fade-in">
      <div className="toolbar">
        <input type="date" className="form-inp" value={selDate} onChange={e => setSelDate(e.target.value)} style={{width:160}} />
        <span style={{fontSize:12,color:'var(--text2)'}}>
          {new Date(selDate+'T00:00').toLocaleDateString('ko-KR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
        </span>
        <div className="spacer" />
        <button className="btn btn-s" onClick={addRow}>+ 행 추가</button>
        <button className="btn btn-g" onClick={saveData}>저장</button>
      </div>

      <div className="ss-wrap">
        <table className="ss">
          <thead>
            <tr>
              {cols.map(c => <th key={c.key} style={{minWidth:c.w}}>{c.label}</th>)}
              <th style={{width:35}}>삭제</th>
            </tr>
          </thead>
          <tbody>
            {data.rows.map((row, ri) => (
              <tr key={ri}>
                {cols.map(c => (
                  <td key={c.key} className={c.type==='number'?'num-cell':''}>
                    {c.type === 'readonly' ? (
                      <div className="row-num">{row.no}</div>
                    ) : c.type === 'check' ? (
                      <div style={{textAlign:'center'}}>
                        <input type="checkbox" checked={!!row[c.key]} onChange={e => updateRow(ri, c.key, e.target.checked)} />
                      </div>
                    ) : c.type === 'select' ? (
                      <select value={row[c.key]} onChange={e => updateRow(ri, c.key, e.target.value)}
                        style={{width:'100%',height:'100%',background:'transparent',border:'none',color:'var(--text)',fontSize:11,outline:'none',fontFamily:'inherit',padding:'4px 4px'}}>
                        {c.options.map(o => <option key={o} value={o} style={{background:'#1A1A1F'}}>{o || '-'}</option>)}
                      </select>
                    ) : (
                      <input
                        type={c.type==='number'?'text':'text'}
                        value={c.type==='number' ? (row[c.key] || '') : (row[c.key] || '')}
                        onChange={e => updateRow(ri, c.key, c.type==='number' ? (e.target.value==='' ? 0 : Number(e.target.value.replace(/,/g,''))) : e.target.value)}
                        placeholder={c.type==='number'?'0':''}
                      />
                    )}
                  </td>
                ))}
                <td style={{textAlign:'center'}}>
                  <button onClick={() => deleteRow(ri)} style={{background:'none',border:'none',color:'var(--err)',cursor:'pointer',fontSize:14}}>×</button>
                </td>
              </tr>
            ))}
            <tr className="ss-total">
              <td colSpan={7} style={{textAlign:'right',paddingRight:10}}>합계</td>
              <td className="num-cell" style={{padding:'6px 8px'}}>{fmt(totals.deductAmt)}</td>
              <td className="num-cell" style={{padding:'6px 8px'}}>{totals.deductCnt}</td>
              <td className="num-cell" style={{padding:'6px 8px'}}>{fmt(totals.tipDeduct)}</td>
              <td className="num-cell" style={{padding:'6px 8px'}}>{fmt(totals.cash)}</td>
              <td className="num-cell" style={{padding:'6px 8px'}}>{fmt(totals.deposit)}</td>
              <td className="num-cell" style={{padding:'6px 8px'}}>{fmt(totals.card)}</td>
              <td className="num-cell" style={{padding:'6px 8px'}}>{fmt(totals.krw)}</td>
              <td className="num-cell" style={{padding:'6px 8px'}}>{fmt(totals.unpaid)}</td>
              <td style={{padding:'6px 8px',textAlign:'center'}}>{totals.male}</td>
              <td style={{padding:'6px 8px',textAlign:'center'}}>{totals.female}</td>
              <td></td><td></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:12}}>
        <div className="exp-panel">
          <h4>지출 항목</h4>
          {data.expenses.map((exp, i) => (
            <div key={i} className="exp-row">
              <select value={exp.item} onChange={e => updateExpense(i,'item',e.target.value)}>
                {EXPENSE_ITEMS.map(it => <option key={it} value={it} style={{background:'#1A1A1F'}}>{it}</option>)}
              </select>
              <input type="text" value={exp.amount||''} placeholder="금액"
                onChange={e => updateExpense(i,'amount',Number(e.target.value.replace(/,/g,''))||0)}
                style={{width:100}} />
              <input type="text" value={exp.note||''} placeholder="비고"
                onChange={e => updateExpense(i,'note',e.target.value)} />
              <button className="del" onClick={() => deleteExpense(i)}>×</button>
            </div>
          ))}
          <button className="btn btn-s" onClick={addExpense} style={{marginTop:6}}>+ 지출 추가</button>
        </div>

        <div className="close-panel">
          <h4>일일 마감 집계</h4>
          <div className="close-grid">
            <div className="close-item"><span className="k">차감횟수</span><span className="v">{totals.deductCnt}건</span></div>
            <div className="close-item"><span className="k">차감금액</span><span className="v">{fmt(totals.deductAmt)}</span></div>
            <div className="close-item"><span className="k">팁차감</span><span className="v">{fmt(totals.tipDeduct)}</span></div>
            <div className="close-item"><span className="k">현금</span><span className="v">{fmt(totals.cash)}</span></div>
            <div className="close-item"><span className="k">입금+10%</span><span className="v">{fmt(totals.deposit)}</span></div>
            <div className="close-item"><span className="k">카드</span><span className="v">{fmt(totals.card)}</span></div>
            <div className="close-item"><span className="k">한국돈</span><span className="v">{fmt(totals.krw)}</span></div>
            <div className="close-item"><span className="k">미수금</span><span className="v">{fmt(totals.unpaid)}</span></div>
            <div className="close-item"><span className="k">총지출</span><span className="v" style={{color:'var(--err)'}}>{fmt(totals.expTotal)}</span></div>
            <div className="close-item"><span className="k">총수입</span><span className="v" style={{color:'var(--ok)'}}>{fmt(totals.income)}</span></div>
            <div className="close-item" style={{gridColumn:'span 2',borderColor:'var(--border-gold)'}}>
              <span className="k">남은돈 (수입-지출)</span>
              <span className="v" style={{fontSize:14}}>{fmt(totals.net)}</span>
            </div>
            <div className="close-item"><span className="k">남</span><span className="v">{totals.male}명</span></div>
            <div className="close-item"><span className="k">여</span><span className="v">{totals.female}명</span></div>
          </div>
        </div>
      </div>
    </div>
  );
}

            {dates.map(date => {

                <tr key={date} onClick={() => setSelDate(date)} style={{cursor:'pointer'}}>

}

/* ════════════════════════════════════════
   SALES - MONTHLY SUMMARY
   ════════════════════════════════════════ */
function SalesMonthlySummary() {
  const [data, setData] = useState({});
  const [selMonth, setSelMonth] = useState('2026-03');
  useEffect(() => { DataService.read('sales').then(setData); }, []);

  const monthDates = Object.keys(data).filter(d => d.startsWith(selMonth)).sort();
  const monthData = monthDates.map(date => {
    const d = data[date];
    const sum = (f) => d.rows.reduce((a,x) => a + (Number(x[f])||0), 0);
    const expTotal = (d.expenses||[]).reduce((a,x) => a + (Number(x.amount)||0), 0);
    return { date, count: d.rows.length, cash: sum('cash'), deposit: sum('deposit'), card: sum('card'), krw: sum('krw'), unpaid: sum('unpaid'), exp: expTotal };
  });
  const grandTotal = (f) => monthData.reduce((a,x) => a + x[f], 0);
  const totalIncome = grandTotal('cash') + grandTotal('deposit') + grandTotal('card') + grandTotal('krw');

  return (
    <div className="fade-in">
      <div className="toolbar">
        <input type="month" className="form-inp" value={selMonth} onChange={e => setSelMonth(e.target.value)} style={{width:160}} />
      </div>
      <div className="cards">
        <div className="card"><div className="card-bar" style={{background:'var(--gold)'}} /><div className="card-lb">총 매출</div><div className="card-vl">{fmt(totalIncome)}</div><div className="card-sub">VND</div></div>
        <div className="card"><div className="card-bar" style={{background:'var(--ok)'}} /><div className="card-lb">현금</div><div className="card-vl">{fmt(grandTotal('cash'))}</div></div>
        <div className="card"><div className="card-bar" style={{background:'var(--info)'}} /><div className="card-lb">카드</div><div className="card-vl">{fmt(grandTotal('card'))}</div></div>
        <div className="card"><div className="card-bar" style={{background:'var(--warn)'}} /><div className="card-lb">총 지출</div><div className="card-vl">{fmt(grandTotal('exp'))}</div></div>
        <div className="card"><div className="card-bar" style={{background:'var(--err)'}} /><div className="card-lb">미수금</div><div className="card-vl">{fmt(grandTotal('unpaid'))}</div></div>
        <div className="card"><div className="card-bar" style={{background:'#9B59B6'}} /><div className="card-lb">총 건수</div><div className="card-vl">{grandTotal('count')}</div><div className="card-sub">{monthDates.length}일 영업</div></div>
      </div>
      <div className="pn">
        <table className="tbl">
          <thead><tr><th>날짜</th><th>건수</th><th className="num">현금</th><th className="num">입금</th><th className="num">카드</th><th className="num">한국돈</th><th className="num">미수</th><th className="num">지출</th><th className="num">순수입</th></tr></thead>
          <tbody>
            {monthData.map(d => {
              const income = d.cash+d.deposit+d.card+d.krw;
              return (
                <tr key={d.date}>
                  <td>{d.date}</td><td>{d.count}건</td>
                  <td className="num">{fmt(d.cash)}</td><td className="num">{fmt(d.deposit)}</td>
                  <td className="num">{fmt(d.card)}</td><td className="num">{fmt(d.krw)}</td>
                  <td className="num">{fmt(d.unpaid)}</td>
                  <td className="num" style={{color:'var(--err)'}}>{fmt(d.exp)}</td>
                  <td className="num" style={{fontWeight:600,color:'var(--gold-light)'}}>{fmt(income - d.exp)}</td>
                </tr>
              );
            })}
            <tr style={{background:'rgba(184,149,106,0.06)'}}>
              <td style={{fontWeight:600}}>합계</td><td>{grandTotal('count')}건</td>
              <td className="num" style={{fontWeight:600}}>{fmt(grandTotal('cash'))}</td>
              <td className="num" style={{fontWeight:600}}>{fmt(grandTotal('deposit'))}</td>
              <td className="num" style={{fontWeight:600}}>{fmt(grandTotal('card'))}</td>
              <td className="num" style={{fontWeight:600}}>{fmt(grandTotal('krw'))}</td>
              <td className="num" style={{fontWeight:600}}>{fmt(grandTotal('unpaid'))}</td>
              <td className="num" style={{fontWeight:600,color:'var(--err)'}}>{fmt(grandTotal('exp'))}</td>
              <td className="num" style={{fontWeight:700,color:'var(--gold-light)',fontSize:13}}>{fmt(totalIncome - grandTotal('exp'))}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   PURCHASE
   ════════════════════════════════════════ */
function PurchaseInput() {
  const [form, setForm] = useState({ date: today(), supplier:'', item:'', category:'원재료', qty:1, unitPrice:0, note:'' });
  const [list, setList] = useState([]);
  useEffect(() => { DataService.read('purchase').then(setList); }, []);

  const save = async () => {
    if (!form.supplier || !form.item) { alert('공급처와 품목을 입력하세요.'); return; }
    const newItem = { ...form, id: 'p'+String(list.length+1).padStart(3,'0'), total: form.qty * form.unitPrice };
    const updated = [...list, newItem];
    await DataService.write('purchase', updated);
    setList(updated);
    setForm({ date: today(), supplier:'', item:'', category:'원재료', qty:1, unitPrice:0, note:'' });
    alert('저장되었습니다.');
  };

  return (
    <div className="fade-in">
      <div className="pn" style={{padding:18}}>

/* ════════════════════════════════════════
   SETTLEMENT (결산)
   ════════════════════════════════════════ */
function Settlement({ period }) {
  const [sales, setSales] = useState({});
  const [purchase, setPurchase] = useState([]);
  useEffect(() => { DataService.read('sales').then(setSales); DataService.read('purchase').then(setPurchase); }, []);

  const getPeriodDates = () => {
    const dates = Object.keys(sales).sort();
    if (dates.length === 0) return [];
    // 간단히 전체 데이터 사용 (추후 기간 필터 추가)
    return dates;
  };

  const dates = getPeriodDates();
  const salesTotal = dates.reduce((a, d) => {
    const rows = sales[d]?.rows || [];
    return a + rows.reduce((b,r) => b + (Number(r.cash)||0) + (Number(r.deposit)||0) + (Number(r.card)||0) + (Number(r.krw)||0), 0);
  }, 0);
  const expTotal = dates.reduce((a, d) => {
    return a + (sales[d]?.expenses || []).reduce((b,e) => b + (Number(e.amount)||0), 0);
  }, 0);
  const purchaseTotal = purchase.reduce((a,p) => a+p.total, 0);
  const net = salesTotal - expTotal - purchaseTotal;

  const labels = { monthly:'월말 결산', quarterly:'분기 결산', semi:'반기 결산', annual:'년간 결산' };

  return (
    <div className="fade-in">
      <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,marginBottom:16,color:'var(--gold-light)'}}>{labels[period]}</h3>
      <div className="cards">
        <div className="card"><div className="card-bar" style={{background:'var(--ok)'}} /><div className="card-lb">총 매출</div><div className="card-vl" style={{color:'var(--ok)'}}>{fmt(salesTotal)}</div><div className="card-sub">VND</div></div>
        <div className="card"><div className="card-bar" style={{background:'var(--warn)'}} /><div className="card-lb">영업 지출</div><div className="card-vl">{fmt(expTotal)}</div></div>
        <div className="card"><div className="card-bar" style={{background:'var(--err)'}} /><div className="card-lb">매입 비용</div><div className="card-vl">{fmt(purchaseTotal)}</div></div>
        <div className="card"><div className="card-bar" style={{background:'var(--gold)'}} /><div className="card-lb">순이익</div><div className="card-vl" style={{color: net>=0?'var(--ok)':'var(--err)'}}>{fmt(net)}</div></div>
      </div>
      <div className="pn" style={{padding:18}}>
        <div style={{fontSize:12,color:'var(--text2)',marginBottom:12}}>기간: {dates[0] || '-'} ~ {dates[dates.length-1] || '-'} ({dates.length}일)</div>
        <table className="tbl">
          <thead><tr><th>항목</th><th className="num">금액 (VND)</th><th className="num">비율</th></tr></thead>
          <tbody>
            <tr><td>매출 (현금+입금+카드+한국돈)</td><td className="num" style={{color:'var(--ok)'}}>{fmt(salesTotal)}</td><td className="num">100%</td></tr>
            <tr><td>(-) 영업 지출</td><td className="num" style={{color:'var(--err)'}}>-{fmt(expTotal)}</td><td className="num">{salesTotal>0?Math.round(expTotal/salesTotal*100):0}%</td></tr>
            <tr><td>(-) 매입 비용</td><td className="num" style={{color:'var(--err)'}}>-{fmt(purchaseTotal)}</td><td className="num">{salesTotal>0?Math.round(purchaseTotal/salesTotal*100):0}%</td></tr>
            <tr style={{background:'rgba(184,149,106,0.06)'}}><td style={{fontWeight:600}}>순이익</td><td className="num" style={{fontWeight:700,fontSize:14,color:net>=0?'var(--ok)':'var(--err)'}}>{fmt(net)}</td><td className="num" style={{fontWeight:600}}>{salesTotal>0?Math.round(net/salesTotal*100):0}%</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

function AttendanceByEmployee() {
  const [data, setData] = useState({});
  const [selEmp, setSelEmp] = useState('hong');
  const [selMonth, setSelMonth] = useState('2026-03');
  useEffect(() => { DataService.read('attendance').then(setData); }, []);

  const empData = (data[selMonth] || {})[selEmp] || {};
  const days = Object.keys(empData).sort((a,b) => Number(a)-Number(b));
  const emp = EMPLOYEES.find(e => e.name === selEmp);

    const [ih,im] = rec.in.split(':').map(Number);
    const [oh,om] = rec.out.split(':').map(Number);
    return a + (oh + om/60) - (ih + im/60);
  }, 0);

  return (
    <div className="fade-in">
      <div className="toolbar">
        <select className="form-inp" value={selEmp} onChange={e => setSelEmp(e.target.value)} style={{width:140}}>

      </div>

        <div className="card"><div className="card-lb">출근일</div><div className="card-vl">{days.length}일</div></div>
        <div className="card"><div className="card-lb">총 근무시간</div><div className="card-vl">{totalHours.toFixed(1)}h</div></div>
        <div className="card"><div className="card-lb">일평균</div><div className="card-vl">{days.length>0?(totalHours/days.length).toFixed(1):'0'}h</div></div>
      </div>
      <div className="pn">
        <table className="tbl">
          <thead><tr><th>일</th><th>출근</th><th>퇴근</th><th className="num">근무시간</th></tr></thead>
          <tbody>
            {days.map(d => {
              const rec = empData[d];
              const [ih,im] = rec.in.split(':').map(Number);
              const [oh,om] = rec.out.split(':').map(Number);
              const hrs = ((oh+om/60)-(ih+im/60)).toFixed(1);
              return (

              );

        </table>
      </div>
    </div>
  );
}

              const empAtt = monthData[emp.name] || {};
              const days = Object.keys(empAtt);
              const totalHours = days.reduce((a,d) => {
                const rec = empAtt[d];
                if (!rec) return a;
                const [ih,im] = rec.in.split(':').map(Number);
                const [oh,om] = rec.out.split(':').map(Number);
                return a + (oh+om/60)-(ih+im/60);
              }, 0);
              const contract = contracts.find(c => c.employee === emp.name);
              const base = contract?.baseSalary || emp.base;
              const hourlyPay = Math.round(totalHours * emp.hourly);
              const tip = 0; // DB 연동 시 실제 팁 데이터 로드
              const deduction = Math.round(base * 0.035);
              const net = base + tip - deduction;
              return (
                <tr key={emp.name}>
                  <td style={{fontWeight:500}}>{emp.nameKr} <span style={{color:'var(--text3)',fontSize:10}}>({emp.name})</span></td>
                  <td className="num">{days.length}일</td>
                  <td className="num">{totalHours.toFixed(1)}h</td>
                  <td className="num">{fmt(base)}</td>
                  <td className="num">{fmt(hourlyPay)}</td>
                  <td className="num" style={{color:'var(--ok)'}}>{fmt(tip)}</td>
                  <td className="num" style={{color:'var(--err)'}}>-{fmt(deduction)}</td>
                  <td className="num" style={{fontWeight:700,color:'var(--gold-light)',fontSize:13}}>{fmt(net)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function SalaryHistory() {
  const [list, setList] = useState([]);
  useEffect(() => { DataService.read('salary').then(setList); }, []);

          <tbody>
            {list.map((s,i) => {
              const emp = EMPLOYEES.find(e => e.name === s.employee);

                <tr key={i}>

}

function SalaryPayslip() {
  const [list, setList] = useState([]);
  const [selIdx, setSelIdx] = useState(0);
  useEffect(() => { DataService.read('salary').then(setList); }, []);

  if (list.length === 0) return <div className="empty"><div>지급 이력이 없습니다</div></div>;
  const s = list[selIdx] || list[0];
  const emp = EMPLOYEES.find(e => e.name === s.employee);

  return (
    <div className="fade-in">
      <div className="toolbar">
        <select className="form-inp" value={selIdx} onChange={e => setSelIdx(Number(e.target.value))} style={{width:220}}>
          {list.map((s,i) => {
            const e = EMPLOYEES.find(x => x.name === s.employee);
            return <option key={i} value={i}>{e?.nameKr||s.employee} - {s.year}.{pad2(s.month)}</option>;
          })}
        </select>
      </div>
      <div className="payslip">
        <h3>급여 명세서</h3>
        <div className="period">{s.year}년 {s.month}월 · {emp?.nameKr || s.employee} ({emp?.position || ''})</div>
        <div className="row"><span className="k">기본급</span><span className="v">{fmt(s.baseSalary)}₫</span></div>
        <div className="row"><span className="k">추가수당 (초과근무)</span><span className="v">{fmt(s.overtime)}₫</span></div>
        <div className="row"><span className="k">팁</span><span className="v" style={{color:'var(--ok)'}}>{fmt(s.tip)}₫</span></div>
        <div className="row"><span className="k">공제액</span><span className="v" style={{color:'var(--err)'}}>-{fmt(s.deduction)}₫</span></div>
        <div className="row"><span className="k">근무일</span><span className="v">{s.workDays}일</span></div>
        <div className="row"><span className="k">근무시간</span><span className="v">{s.workHours}h</span></div>
        <div className="row total"><span className="k" style={{fontSize:14,fontWeight:600}}>실지급액</span><span className="v">{fmt(s.netSalary)}₫</span></div>
        <div style={{marginTop:12,fontSize:10,color:'var(--text3)'}}>
          지급일: {s.paidDate || '미정'} · 상태: {s.paid ? '지급완료' : '대기'}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   MAIN APP
   ════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(getUser);
  const [menu, setMenu] = useState('sales');
  const [subTab, setSubTab] = useState(0);
  const [now, setNow] = useState(new Date());

  useEffect(() => {
    if (!user) { window.location.href = 'erp.html'; return; }
    const t = setInterval(() => setNow(new Date()), 60000);
    // 스플래시 제거
    const sp = document.getElementById('splash');
    if (sp) { sp.style.opacity = '0'; setTimeout(() => sp.remove(), 500); }
    return () => clearInterval(t);
  }, [user]);

  if (!user) return null;

  const changeMenu = (id) => { setMenu(id); setSubTab(0); };
  const logout = () => { sessionStorage.removeItem('hskb_erp_user'); window.location.href = 'erp.html'; };

  const renderContent = () => {
    switch(menu) {
      case 'sales':
        if (subTab === 0) return <SalesDailyInput />;
        if (subTab === 1) return <SalesList />;
        return <SalesMonthlySummary />;
      case 'purchase':
        if (subTab === 0) return <PurchaseInput />;
        if (subTab === 1) return <PurchaseList />;
        return <PurchaseStats />;
      case 'settlement':
        return <Settlement period={['monthly','quarterly','semi','annual'][subTab]} />;
      case 'contracts':
        if (subTab === 0) return <ContractList />;
        if (subTab === 1) return <ContractAdd />;
        return <ContractExpiry />;
      case 'attendance':
        if (subTab === 0) return <AttendanceMonthly />;
        if (subTab === 1) return <AttendanceByEmployee />;
        return <AttendanceSummary />;
      case 'salary':
        if (subTab === 0) return <SalaryCalc />;
        if (subTab === 1) return <SalaryHistory />;
        return <SalaryPayslip />;
      default: return null;
    }
  };

  return (
    <React.Fragment>
      <style>{CSS}</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-logo">
            <div className="mk">H</div>
            <div className="nm">HWASA K-Beauty</div>
          </div>
          <div className="hdr-nav">
            {MENUS.map(m => (
              <div key={m.id} className={`hdr-tab ${menu===m.id?'active':''}`} onClick={() => changeMenu(m.id)}>
                <Ic d={m.icon} size={15} />
                {m.label}
              </div>
            ))}
          </div>
          <div className="hdr-right">
            <div className="hdr-date">{now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
            <div className="hdr-user">
              <div className="av" style={{background: user.color || 'var(--gold)'}}>{user.initial || user.name?.charAt(0)}</div>
              <div className="info"><div className="nm">{user.name}</div><div className="rl">{user.role}</div></div>
            </div>
            <button className="btn-logout" onClick={logout}>로그아웃</button>
          </div>
        </div>
        <div className="content">
          <div className="sub-tabs">
            {SUB_TABS[menu].map((tab, i) => (
              <div key={i} className={`sub-tab ${subTab===i?'active':''}`} onClick={() => setSubTab(i)}>{tab}</div>
            ))}
          </div>
          <div className="page" key={menu+'-'+subTab}>
            {renderContent()}
          </div>
        </div>
      </div>
    </React.Fragment>
  );
}

// ─── RENDER ───
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
