<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HWASA K-Beauty ERP - 매입</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
  <script src="ERP_COMMON.js"></script>
    <script src="DATA_CONNECTOR.js"></script>
    </head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;
const PAGE_TABS = ['매입 입력','매입 내역','통계'];


/* ════════════════════════════════════════
   매입 입력 (PurchaseInput)
   ════════════════════════════════════════ */
function PurchaseInput() {
  const mk = () => ({ date:today(), supplier:SUPPLIER_NAMES[0]||'', item:'', category:PURCHASE_CATS[0]||'', qty:1, unitPrice:0, total:0, note:'' });
  const [form,setForm] = useState(mk());
  const up = (k,v) => setForm(p => {
    const next = {...p, [k]:v};
    if (k==='qty'||k==='unitPrice') next.total = Number(k==='qty'?v:next.qty) * Number(k==='unitPrice'?v:next.unitPrice);
    return next;
  });

  const save = async () => {
    if (!form.item) { alert('품목을 입력하세요'); return; }
    const list = await DataService.read('purchase');
    const maxId = list.reduce((a,p) => Math.max(a, parseInt((p.id||'p000').replace('p',''))||0), 0);
    list.push({ ...form, id:'p'+String(maxId+1).padStart(3,'0'), qty:Number(form.qty), unitPrice:Number(form.unitPrice), total:Number(form.total) });
    await DataService.write('purchase', list);
    alert('매입 등록 완료');
    setForm(mk());
  };

  return (
    <div className="fade-in">
      <div className="pn" style={{padding:18}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:14,color:'var(--gold-light)'}}>신규 매입 등록</div>
        <div className="form-grid">
          <div className="form-g"><label className="form-l">날짜</label>
            <input type="date" className="form-inp" value={form.date} onChange={e=>up('date',e.target.value)}/></div>
          <div className="form-g"><label className="form-l">공급처</label>
            <select className="form-inp" value={form.supplier} onChange={e=>up('supplier',e.target.value)}>
              {SUPPLIER_NAMES.map(s=><option key={s} value={s}>{s}</option>)}
              <option value="기타">기타 (직접입력)</option>
            </select></div>
          {form.supplier==='기타'&&<div className="form-g"><label className="form-l">공급처명</label>
            <input className="form-inp" placeholder="직접 입력" onChange={e=>up('supplier',e.target.value)}/></div>}
          <div className="form-g"><label className="form-l">품목 *</label>
            <input className="form-inp" value={form.item} onChange={e=>up('item',e.target.value)} placeholder="품목명"/></div>
          <div className="form-g"><label className="form-l">분류</label>
            <select className="form-inp" value={form.category} onChange={e=>up('category',e.target.value)}>
              {PURCHASE_CATS.map(c=><option key={c} value={c}>{c}</option>)}
            </select></div>
          <div className="form-g"><label className="form-l">수량</label>
            <input type="number" className="form-inp" value={form.qty} min="1" onChange={e=>up('qty',e.target.value)}/></div>
          <div className="form-g"><label className="form-l">단가 (VND)</label>
            <input type="number" className="form-inp" value={form.unitPrice} step="1000" onChange={e=>up('unitPrice',e.target.value)}/></div>
          <div className="form-g"><label className="form-l">합계 (자동)</label>
            <input className="form-inp" value={fmt(form.total)} readOnly style={{color:'var(--gold-light)',fontWeight:600}}/></div>
          <div className="form-g"><label className="form-l">비고</label>
            <input className="form-inp" value={form.note} onChange={e=>up('note',e.target.value)}/></div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button className="btn btn-g" onClick={save}>등록</button>
          <span style={{fontSize:10,color:'var(--text3)'}}>합계: <strong style={{color:'var(--gold-light)'}}>{fmt(form.total)}₫</strong></span>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   매입 내역 (PurchaseList)
   ════════════════════════════════════════ */
function PurchaseList() {
  const [list,setList] = useState([]);
  const [search,setSearch] = useState('');
  const [catFilter,setCat] = useState('');
  const load = () => DataService.read('purchase').then(setList);
  useEffect(()=>{ load(); },[]);

  const filtered = list.filter(p =>
    (!catFilter || p.category===catFilter) &&
    (!search || p.item.includes(search) || p.supplier.includes(search))
  ).sort((a,b)=>b.date.localeCompare(a.date));

  const del = async (id) => {
    if (!confirm('삭제하시겠습니까?')) return;
    const next = list.filter(p=>p.id!==id);
    await DataService.write('purchase', next);
    setList(next);
  };

  const totalAmt = filtered.reduce((a,p)=>a+(p.total||0),0);

  return (
    <div className="fade-in">
      <div className="toolbar">
        <input className="form-inp" placeholder="품목/공급처 검색" value={search} onChange={e=>setSearch(e.target.value)} style={{width:200}}/>
        <select className="form-inp" value={catFilter} onChange={e=>setCat(e.target.value)} style={{width:120}}>
          <option value="">전체 분류</option>
          {PURCHASE_CATS.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <div className="spacer"/>
        <span style={{fontSize:10,color:'var(--text3)'}}>{filtered.length}건 합계: <strong style={{color:'var(--gold-light)'}}>{fmt(totalAmt)}₫</strong></span>
      </div>
      <div className="pn">
        <table className="tbl">
          <thead><tr>
            <th>날짜</th><th>공급처</th><th>품목</th><th>분류</th>
            <th className="num">수량</th><th className="num">단가</th><th className="num">합계</th>
            <th>비고</th><th></th>
          </tr></thead>
          <tbody>
            {filtered.length===0 && <tr><td colSpan={9} style={{textAlign:'center',color:'var(--text3)',padding:24}}>매입 내역이 없습니다</td></tr>}
            {filtered.map((p,i)=>(
              <tr key={p.id||i}>
                <td style={{color:'var(--text2)'}}>{p.date}</td>
                <td>{p.supplier}</td>
                <td style={{fontWeight:500}}>{p.item}</td>
                <td><span className="sts sts-info">{p.category}</span></td>
                <td className="num">{fmt(p.qty)}</td>
                <td className="num">{fmt(p.unitPrice)}</td>
                <td className="num" style={{fontWeight:600,color:'var(--gold-light)'}}>{fmt(p.total)}</td>
                <td style={{color:'var(--text3)',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis'}}>{p.note}</td>
                <td><button className="btn btn-s" style={{fontSize:10,padding:'2px 7px',color:'var(--err)',borderColor:'var(--err)'}} onClick={()=>del(p.id)}>삭제</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   매입 통계 (PurchaseStats)
   ════════════════════════════════════════ */
function PurchaseStats() {
  const [list,setList] = useState([]);
  useEffect(()=>{ DataService.read('purchase').then(setList); },[]);

  const byCat = {};
  const bySupp = {};
  list.forEach(p => {
    byCat[p.category]  = (byCat[p.category]||0)  + (p.total||0);
    bySupp[p.supplier] = (bySupp[p.supplier]||0)  + (p.total||0);
  });
  const total = list.reduce((a,p)=>a+(p.total||0),0);
  const catEntries  = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const suppEntries = Object.entries(bySupp).sort((a,b)=>b[1]-a[1]);
  const maxCat  = Math.max(1,...catEntries.map(e=>e[1]));
  const maxSupp = Math.max(1,...suppEntries.map(e=>e[1]));

  const BarRow = ({label,val,max,color}) => (
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid var(--border)'}}>
      <div style={{width:90,fontSize:10,color:'var(--text2)',flexShrink:0}}>{label}</div>
      <div style={{flex:1,background:'var(--bg-el)',borderRadius:4,height:7,overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:4,background:color,width:Math.round(val/max*100)+'%',transition:'width .4s'}}/>
      </div>
      <div style={{width:100,textAlign:'right',fontSize:10,fontWeight:600,color:'var(--gold-light)'}}>{fmt(val)}₫</div>
      <div style={{width:35,textAlign:'right',fontSize:9,color:'var(--text3)'}}>{total>0?Math.round(val/total*100):0}%</div>
    </div>
  );

  return (
    <div className="fade-in">
      <div className="cards">
        <div className="card"><div className="card-bar" style={{background:'var(--gold)'}}/><div className="card-lb">총 매입액</div><div className="card-vl" style={{fontSize:16}}>{fmt(total)}</div></div>
        <div className="card"><div className="card-bar" style={{background:'var(--info)'}}/><div className="card-lb">매입 건수</div><div className="card-vl" style={{fontSize:16}}>{list.length}건</div></div>
        <div className="card"><div className="card-bar" style={{background:'var(--ok)'}}/><div className="card-lb">공급처 수</div><div className="card-vl" style={{fontSize:16}}>{Object.keys(bySupp).length}곳</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div className="pn" style={{padding:16}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:12,color:'var(--gold-light)'}}>분류별 매입</div>
          {catEntries.length===0 ? <div style={{color:'var(--text3)',fontSize:11}}>데이터 없음</div>
            : catEntries.map(([k,v])=><BarRow key={k} label={k} val={v} max={maxCat} color="var(--gold)"/>)}
        </div>
        <div className="pn" style={{padding:16}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:12,color:'var(--gold-light)'}}>공급처별 매입</div>
          {suppEntries.length===0 ? <div style={{color:'var(--text3)',fontSize:11}}>데이터 없음</div>
            : suppEntries.map(([k,v])=><BarRow key={k} label={k} val={v} max={maxSupp} color="var(--info)"/>)}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   APP
   ════════════════════════════════════════ */
function App() {
  const [user,setUser]=useState(getUser());
  const [subTab,setSub]=useState(0);
  const [now,setNow]=useState(new Date());
  const [dark,setDark]=useState(()=>localStorage.getItem('hskb_theme')!=='light');

  useEffect(()=>{ if(!user){ window.location.href='PAGE_ERP.html'; return; } const t=setInterval(()=>setNow(new Date()),60000); return ()=>clearInterval(t); },[user]);
  useEffect(()=>{ document.body.classList.toggle('light',!dark); localStorage.setItem('hskb_theme',dark?'dark':'light'); },[dark]);

  if(!user) return null;
  const logout=()=>{ localStorage.removeItem('hskb_erp_user'); window.location.href='PAGE_ERP.html'; };

  const renderContent=()=>{ return subTab===0?<PurchaseInput/>:subTab===1?<PurchaseList/>:<PurchaseStats/>; };

  return (
    <React.Fragment>
      <style>{ CSS }</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-logo"><div className="mk">H</div><div className="nm">HWASA K-Beauty</div></div>
          <div className="hdr-nav">
            { ERP_PAGES.map(p=>{
              const isActive = p.id==='purchase' || (p.children && p.children.some(c=>c.id==='purchase'));
              if(p.children && p.children.length > 0) {
                return (
                  <div key={p.id} className="hdr-tab-wrap">
                    <a href={p.href} className={'hdr-tab'+(isActive?' active':'')} style={{textDecoration:'none'}}><Ic d={p.icon} size={14}/>{p.label}</a>
                    <div className="hdr-dropdown">
                      {p.children.map(c=>(
                        <a key={c.id} href={c.href} className={'hdr-dropdown-item'+(c.id==='purchase'?' active':'')} style={{textDecoration:'none'}}><Ic d={c.icon} size={13}/>{c.label}</a>
                      ))}
                    </div>
                  </div>
                );
              }
              return <a key={p.id} href={p.href} className={'hdr-tab'+(isActive?' active':'')} style={{textDecoration:'none'}}><Ic d={p.icon} size={14}/>{p.label}</a>;
            }) }
          </div>
          <div className="hdr-right">
            <div className="hdr-date">{now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
            <button className="theme-btn" onClick={()=>setDark(!dark)}>
              {dark ? <Ic d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" size={15}/>
                : <Ic d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" size={15}/>
              }
            </button>
            <div className="hdr-user">
              <div className="av" style={{ background:user.color||'var(--gold)' }}>{user.initial||user.name?.charAt(0)}</div>
              <div><div className="nm">{user.name}</div><div className="rl">{user.role}</div></div>
            </div>
            <button className="btn-logout" onClick={logout}> 로그아웃</button>
          </div>
        </div>
        <div className="content">
          <div className="sub-tabs">{PAGE_TABS.map((tab,i)=>(
            <div key={i} className={'sub-tab'+(subTab===i?' active':'')} onClick={()=>setSub(i)}>{ tab }</div>
          ))}</div>
          <div className="page" key={subTab}>{renderContent()}</div>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
