.sts-info{background:rgba(77,150,255,0.12);color:var(--info);}

/* EXPENSE */
.exp-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-top:10px;transition:background .3s;}
.exp-panel h4{font-size:11px;color:var(--gold-light);margin-bottom:8px;}
.exp-row{display:flex;gap:6px;align-items:center;margin-bottom:5px;}
.exp-row select,.exp-row input{background:var(--bg-el);border:1px solid var(--border);border-radius:var(--rs);padding:4px 7px;font-size:10.5px;color:var(--text);font-family:inherit;outline:none;}
.exp-row select{width:90px;}.exp-row input{flex:1;}

/* CLOSE */
.close-panel{background:var(--gold-glow);border:1px solid var(--border-gold);border-radius:var(--radius);padding:14px;margin-top:10px;}
.close-panel h4{font-size:11px;color:var(--gold-light);margin-bottom:10px;}
.close-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;}
.close-item{display:flex;justify-content:space-between;padding:5px 8px;background:var(--bg-card);border-radius:var(--rs);border:1px solid var(--border);}
.close-item .k{font-size:9.5px;color:var(--text2);}
.close-item .v{font-size:11px;font-weight:600;color:var(--gold-light);font-variant-numeric:tabular-nums;}

function App() {
  const [user,setUser]=useState(getUser());
  const [subTab,setSub]=useState(0);
  const [now,setNow]=useState(new Date());
  const [dark,setDark]=useState(()=>localStorage.getItem('hskb_theme')!=='light');

  useEffect(()=>{ if(!user){ window.location.href='PAGE_ERP.html'; return; } const t=setInterval(()=>setNow(new Date()),60000); return ()=>clearInterval(t); },[user]);
  useEffect(()=>{ document.body.classList.toggle('light',!dark); localStorage.setItem('hskb_theme',dark?'dark':'light'); },[dark]);

  if(!user) return null;
  const logout=()=>{ sessionStorage.removeItem('hskb_erp_user'); window.location.href='PAGE_ERP.html'; };

  const renderContent=()=>{ return subTab===0?<PurchaseInput/>:subTab===1?<PurchaseList/>:<PurchaseStats/>; };

  return (
    <React.Fragment>
      <style>{ CSS }</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-logo"><div className="mk">H</div><div className="nm">HWASA K-Beauty</div></div>
          <div className="hdr-nav">
            { ERP_PAGES.map(p=>(
              <a key={p.id} href={p.href} className={'hdr-tab'+(p.id==='purchase'?' active':'')} style={{ textDecoration:'none' }}> <Ic d={p.icon} size={14}/>{ p.label }</a>
            )) }
          </div>
          <div className="hdr-right">
            <div className="hdr-date">{now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
            <button className="theme-btn" onClick={()=>setDark(!dark)}>
              {dark ? <Ic d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" size={15}/>
                : <Ic d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" size={15}/>
              }
            </button>
            <div className="hdr-user">
              <div className="av" style={{ background:user.color||'var(--gold)' }}>{user.initial||user.name?.charAt(0)}</div>
              <div><div className="nm">{user.name}</div><div className="rl">{user.role}</div></div>
            </div>
            <button className="btn-logout" onClick={logout}> 로그아웃</button>
          </div>
        </div>
        <div className="content">
          <div className="sub-tabs">{SUB_TABS.map((tab,i)=>(
            <div key={i} className={'sub-tab'+(subTab===i?' active':'')} onClick={()=>setSub(i)}>{ tab }</div>
          ))}</div>
          <div className="page" key={subTab}>{renderContent()}</div>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
