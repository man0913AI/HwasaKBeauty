const WF_STEPS = ['계산','검토','확정','지급'];

/* ── 팁 집계 헬퍼 ──────────────────────────────────────────── */
function calcTipsByEmp(salesData, ym) {
  const byEmp = {};
  EMPLOYEES.forEach(e => { byEmp[e.name] = 0; });
  Object.entries(salesData).forEach(([date, dayData]) => {
    if (!date.startsWith(ym)) return;
    (dayData.rows||[]).forEach(row => {
      const tip = Number(row.tipDeduct) || 0;
      if (!tip) return;
      // therapist 필드가 있으면 해당 직원에게 전액 집계
      if (row.therapist) {
        const emp = EMPLOYEES.find(e => e.nameKr === row.therapist);
        if (emp) { byEmp[emp.name] = (byEmp[emp.name]||0) + tip; return; }
      }
      // therapist 없으면 균등 분배
      const perEmp = Math.round(tip / EMPLOYEES.length);
      EMPLOYEES.forEach(e => { byEmp[e.name] = (byEmp[e.name]||0) + perEmp; });
    });
  });
  return byEmp;
}

/* ── 급여 계산 ────────────────────────────────────────────── */
function calcEmpSalary(emp, attMonth, contract, tipAmt) {
  const ed   = attMonth[emp.name] || {};
  const days  = Object.keys(ed);
  let totalH  = 0;
  let otH     = 0;
  days.forEach(d => {
    const r = ed[d]; if(!r) return;
    const h = Math.max(0, timeToH(r.out) - timeToH(r.in));
    totalH += h;
    const ot = Math.max(0, timeToH(r.out) - 19);
    otH += ot;
  });
  const base     = contract?.baseSalary || emp.base;
  const hourly   = contract?.hourlyRate  || emp.hourly;
  const otPay    = Math.round(otH * hourly);
  const deduction= Math.round(base * 0.035);
  const netSalary= base + otPay + tipAmt - deduction;
  return {
    workDays:  days.length,
    workHours: Math.round(totalH),
    baseSalary:base, overtime:otPay,
    tip:tipAmt, deduction, netSalary,
    otH: Math.round(otH * 10) / 10,
  };
}

function timeToH(t) {
  if (!t) return 0;
  const [h,m] = t.split(':').map(Number);
  return h + m/60;
}

/* ════════════════════════════════════════
   TAB 1 — 급여 계산
   ════════════════════════════════════════ */
function SalaryCalc() {
  const [mo,     setMo]    = useState(() => { const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; });
  const [attAll, setAttAll]= useState({});
  const [sales,  setSales] = useState({});
  const [cons,   setCons]  = useState([]);
  const [wfStep, setWfStep]= useState(0);  // 0=계산 1=검토 2=확정 3=지급
  const [salaryList, setSalaryList] = useState([]);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    DataService.read('attendance').then(setAttAll);
    DataService.read('sales').then(setSales);
    DataService.read('contracts').then(setCons);
    DataService.read('salary').then(setSalaryList);
  }, []);

  const attMonth = attAll[mo] || {};
  const tips     = calcTipsByEmp(sales, mo);

  const empCalcs = EMPLOYEES.map(emp => {
    const con = cons.find(c => c.employee===emp.name);
    const tip = tips[emp.name] || 0;
    return { emp, con, ...calcEmpSalary(emp, attMonth, con, tip) };
  });

  const alreadyPaid = salaryList.some(s => s.year===parseInt(mo.split('-')[0]) && s.month===parseInt(mo.split('-')[1]));

  const confirmSalary = async () => {
    if (wfStep < 2) { alert('검토 단계까지 완료 후 확정하세요.'); return; }
    if (alreadyPaid) { alert('이미 처리된 월입니다.'); return; }
    setSaving(true);
    const [year, month] = mo.split('-').map(Number);
    const newEntries = empCalcs.map((c,i) => ({
      id: `s${Date.now()}_${i}`, employee:c.emp.name, year, month,
      workDays:c.workDays, workHours:c.workHours,
      baseSalary:c.baseSalary, overtime:c.overtime, tip:c.tip,
      deduction:c.deduction, netSalary:c.netSalary,
      paid:false, paidDate:'',
    }));
    const updated = [...salaryList, ...newEntries];
    await DataService.write('salary', updated);
    setSalaryList(updated);
    setSaving(false);
    setWfStep(3);
    alert('급여 확정 완료. 지급 이력에 저장되었습니다.');
  };

  return (
    <div className="fade-in">
      <div className="toolbar">
        <input type="month" className="form-inp" value={mo} onChange={e=>{setMo(e.target.value);setWfStep(0);}} style={{width:150}}/>
        <div className="spacer"/>
      </div>
      <div className="wf-steps">
        {WF_STEPS.map((s,i)=>(
          <div key={i} className={`wf-step ${i<wfStep?'done':i===wfStep?'active':'pending'}`}
            onClick={()=>setWfStep(Math.min(i, wfStep<=i ? wfStep+1 : i))}>
            {i<wfStep?'✓ ':''}{s}
          </div>
        ))}
        {wfStep===2 && !alreadyPaid && (
          <button className="btn btn-g" onClick={confirmSalary} disabled={saving} style={{marginLeft:10}}>
            {saving?'저장중...':'확정 저장'}
          </button>
        )}
        {alreadyPaid && <span style={{fontSize:10,color:'var(--ok)',marginLeft:10}}>✓ {mo} 급여 확정 완료</span>}
      </div>
      <div className="pn">
        <div className="pn-h"><div><div className="pn-t">{mo} 급여 계산</div><div className="pn-st">매출 팁 자동 집계 · 초과근무 자동 반영</div></div></div>
        <table className="tbl">
          <thead>
            <tr>
              <th>직원</th>
              <th className="num">출근일</th><th className="num">근무시간</th><th className="num">초과시간</th>
              <th className="num">기본급</th><th className="num">초과수당</th>
              <th className="num">팁</th><th className="num">공제</th>
              <th className="num">지급액</th>
            </tr>
          </thead>
          <tbody>
            {empCalcs.map(c=>(
              <tr key={c.emp.name}>
                <td style={{fontWeight:500}}>{c.emp.nameKr} <span style={{fontSize:9,color:'var(--text3)'}}>({c.emp.position})</span></td>
                <td className="num">{c.workDays}일</td>
                <td className="num">{c.workHours}h</td>
                <td className="num" style={{color:c.otH>0?'#9B59B6':'var(--text3)'}}>{c.otH>0?'+'+c.otH+'h':'-'}</td>
                <td className="num">{fmt(c.baseSalary)}</td>
                <td className="num" style={{color:'#9B59B6'}}>{c.overtime>0?'+'+fmt(c.overtime):'-'}</td>
                <td className="num" style={{color:'var(--ok)'}}>{c.tip>0?'+'+fmt(c.tip):'-'}</td>
                <td className="num" style={{color:'var(--err)'}}>-{fmt(c.deduction)}</td>
                <td className="num" style={{fontWeight:700,color:'var(--gold-light)',fontSize:12}}>{fmt(c.netSalary)}</td>
              </tr>
            ))}
            <tr style={{background:'var(--gold-glow)'}}>
              <td style={{fontWeight:600}}>합계</td>
              <td colSpan={7}></td>
              <td className="num" style={{fontWeight:700,color:'var(--gold-light)',fontSize:13}}>{fmt(empCalcs.reduce((a,c)=>a+c.netSalary,0))}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style={{fontSize:9.5,color:'var(--text3)',marginTop:6}}>
        * 팁은 매출 데이터의 팁차감 항목을 직원 수로 균등 분배 | 공제율 3.5% | 초과: 19시 이후
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   TAB 2 — 지급 이력
   ════════════════════════════════════════ */
function SalaryHistory() {
  const [list,    setList]    = useState([]);
  const [editing, setEditing] = useState(null);

  useEffect(()=>{ DataService.read('salary').then(setList); },[]);

  const markPaid = async (id) => {
    const updated = list.map(s =>
      s.id===id ? {...s, paid:true, paidDate:today()} : s
    );
    await DataService.write('salary', updated);
    setList(updated);
  };

  return (
    <div className="fade-in">
      <div className="pn">
        <div className="pn-h"><div className="pn-t">지급 이력</div></div>
        <table className="tbl">
          <thead>
            <tr>
              <th>직원</th><th>기간</th><th className="num">출근일</th>
              <th className="num">기본급</th><th className="num">초과수당</th>
              <th className="num">팁</th><th className="num">공제</th>
              <th className="num">지급액</th><th>지급일</th><th>상태</th><th></th>
            </tr>
          </thead>
          <tbody>
            {[...list].reverse().map((s,i)=>{
              const emp=EMPLOYEES.find(e=>e.name===s.employee);
              return (
                <tr key={i}>
                  <td style={{fontWeight:500}}>{emp?.nameKr||s.employee}</td>
                  <td>{s.year}.{pad2(s.month)}</td>
                  <td className="num">{s.workDays}일</td>
                  <td className="num">{fmt(s.baseSalary)}</td>
                  <td className="num">{fmt(s.overtime)}</td>
                  <td className="num" style={{color:'var(--ok)'}}>{fmt(s.tip)}</td>
                  <td className="num" style={{color:'var(--err)'}}>-{fmt(s.deduction)}</td>
                  <td className="num" style={{fontWeight:600,color:'var(--gold-light)'}}>{fmt(s.netSalary)}</td>
                  <td>{s.paidDate||'-'}</td>
                  <td><span className={`sts ${s.paid?'sts-ok':'sts-warn'}`}>{s.paid?'지급완료':'대기'}</span></td>
                  <td>
                    {!s.paid && (
                      <button className="btn btn-s" style={{fontSize:9,padding:'2px 7px'}} onClick={()=>markPaid(s.id)}>지급처리</button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   TAB 3 — 명세서 (인쇄 지원)
   ════════════════════════════════════════ */
function SalaryPayslip() {
  const [list,    setList]   = useState([]);
  const [idx,     setIdx]    = useState(0);
  const [showPrint,setShow]  = useState(false);
  useEffect(()=>{ DataService.read('salary').then(l=>{ setList(l); }); },[]);

  if(list.length===0) return <div className="empty">지급 이력이 없습니다</div>;
  const s   = list[idx] || list[0];
  const emp = EMPLOYEES.find(e=>e.name===s.employee);

  const PayslipContent = () => (
    <>
      <h2>급여 명세서</h2>
      <div className="sub">{s.year}년 {s.month}월 | {emp?.nameKr||s.employee} ({emp?.position||''})</div>
      {[
        ['근무일수', s.workDays+'일'],
        ['근무시간', s.workHours+'h'],
        ['기본급',   fmt(s.baseSalary)+'₫'],
        ['초과수당', fmt(s.overtime)+'₫', s.overtime>0?'#9B59B6':undefined],
        ['팁',       fmt(s.tip)+'₫',       s.tip>0?'green':undefined],
        ['공제액',   '-'+fmt(s.deduction)+'₫', 'red'],
      ].map(([k,v,c],i)=>(
        <div key={i} className="row">
          <span>{k}</span><span style={c?{color:c}:{}}>{v}</span>
        </div>
      ))}
      <div className="total-row"><span>실지급액</span><span>{fmt(s.netSalary)}₫</span></div>
      <div className="footer">
        지급일: {s.paidDate||'미정'} · 상태: {s.paid?'지급완료':'대기'}<br/>
        HWASA K-Beauty — 급여 명세서
      </div>
    </>
  );

  return (
    <div className="fade-in">
      <div className="toolbar">
        <select className="form-inp" value={idx} onChange={e=>setIdx(Number(e.target.value))} style={{width:220}}>
          {list.map((s,i)=>{ const e=EMPLOYEES.find(x=>x.name===s.employee); return <option key={i} value={i}>{e?.nameKr||s.employee} — {s.year}.{pad2(s.month)}</option>; })}
        </select>
        <div className="spacer"/>
        <button className="btn btn-o" onClick={()=>setShow(true)}>인쇄 / PDF</button>
      </div>
      <div className="payslip" style={{maxWidth:420}}>
        <PayslipContent/>
      </div>
      {showPrint && (
        <div className="receipt-bg" onClick={()=>setShow(false)}>
          <div className="receipt" onClick={e=>e.stopPropagation()}>
            <PayslipContent/>
            <div style={{textAlign:'center',marginTop:12}}>
              <button onClick={()=>window.print()} style={{padding:'5px 14px',background:'#222',color:'#fff',border:'none',borderRadius:4,cursor:'pointer',fontSize:11}}>인쇄</button>
              <button onClick={()=>setShow(false)} style={{marginLeft:8,padding:'5px 14px',background:'#ddd',border:'none',borderRadius:4,cursor:'pointer',fontSize:11}}>닫기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {

  useEffect(()=>{ document.body.classList.toggle('light',!dark); localStorage.setItem('hskb_theme',dark?'dark':'light'); },[dark]);

  if(!user) return null;
  const logout=()=>{ sessionStorage.removeItem('hskb_erp_user'); window.location.href='PAGE_ERP.html'; };

  const renderContent=()=>{ return subTab===0?<SalaryCalc/>:subTab===1?<SalaryHistory/>:<SalaryPayslip/>; };

  return (
    <React.Fragment>
      <style>{ CSS }{ SALARY_CSS }</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-logo"><div className="mk">H</div><div className="nm">HWASA K-Beauty</div></div>
          <div className="hdr-nav">
            { ERP_PAGES.map(p=>(
              <a key={p.id} href={p.href} className={'hdr-tab'+(p.id==='salary'?' active':'')} style={{ textDecoration:'none' }}> <Ic d={p.icon} size={14}/>{ p.label }</a>
            )) }
          </div>
          <div className="hdr-right">
            <div className="hdr-date">{now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
            <button className="theme-btn" onClick={()=>setDark(!dark)}>
              {dark ? <Ic d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" size={15}/>
                : <Ic d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" size={15}/>
              }
            </button>
            <div className="hdr-user">
              <div className="av" style={{ background:user.color||'var(--gold)' }}>{user.initial||user.name?.charAt(0)}</div>
              <div><div className="nm">{user.name}</div><div className="rl">{user.role}</div></div>
            </div>
            <button className="btn-logout" onClick={logout}> 로그아웃</button>

        </div>
        <div className="content">
          <div className="sub-tabs">{SUB_TABS.map((tab,i)=>(
            <div key={i} className={'sub-tab'+(subTab===i?' active':'')} onClick={()=>setSub(i)}>{ tab }</div>
          ))}</div>
          <div className="page" key={subTab}>{renderContent()}</div>
        </div>

    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
