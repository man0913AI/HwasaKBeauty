<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Beauty | Hwasa K-Beauty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-accent: #B8956A;
            --color-accent-light: #D4B896;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Noto Sans KR', sans-serif;
            --font-nav: 'Instrument Sans', sans-serif;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font-body); background: #0A0A0A; color: #F5F0EB; line-height: 1.6; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; display: block; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--color-accent); border-radius: 2px; }

        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 0 48px 0 20px; height: 80px;
            display: flex; align-items: center; justify-content: space-between;
            background: transparent;
        }
        .logo { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .logo-img { height: 68px; width: auto; filter: invert(1) brightness(2); }
        .nav { display: flex; align-items: center; gap: 20px; }
        .nav a { font-family: var(--font-nav); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #fff; transition: color 0.3s; font-weight: 700; white-space: nowrap; }
        .nav a:hover, .nav a.active { color: var(--color-accent); }
        .nav-cta { padding: 10px 24px; border: 1px solid var(--color-accent); color: var(--color-accent) !important; font-size: 11px !important; letter-spacing: 2px; transition: all 0.3s !important; }
        .nav-cta:hover { background: var(--color-accent); color: #fff !important; }
        .menu-toggle { display: none; flex-direction: column; gap: 6px; cursor: pointer; z-index: 1001; }
        .menu-toggle span { display: block; width: 28px; height: 1px; background: #fff; }

        /* PAGE HERO — 짧게 */
        .page-hero { padding: 96px 48px 24px; text-align: center; }
        .page-hero-label { font-family: var(--font-nav); font-size: 11px; letter-spacing: 6px; text-transform: uppercase; color: var(--color-accent-light); margin-bottom: 12px; }
        .page-hero-title { font-family: var(--font-display); font-size: clamp(36px, 5vw, 64px); font-weight: 300; color: #fff; line-height: 1.2; margin-bottom: 8px; }
        .page-hero-title em { font-style: italic; color: var(--color-accent-light); }
        .page-hero-desc { font-size: 13px; color: #fff; font-weight: 300; max-width: 500px; margin: 0 auto; }

        /* TV GRID */
        .tv-section { padding: 20px 48px 80px; }
        .tv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px 40px; max-width: min(924px, 92vw); margin: 0 auto; }

        .tv-wrap {
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; transform: translateY(28px);
            transition: opacity 0.65s var(--ease-out), transform 0.65s var(--ease-out);
        }
        .tv-wrap.visible { opacity: 1; transform: translateY(0); }
        .tv-wrap:nth-child(1) { transition-delay: 0.04s; }
        .tv-wrap:nth-child(2) { transition-delay: 0.13s; }
        .tv-wrap:nth-child(3) { transition-delay: 0.22s; }
        .tv-wrap:nth-child(4) { transition-delay: 0.31s; }

        /* TV 본체 유광 로즈골드 */
        .tv-body {
            width: 100%;
            background: linear-gradient(150deg,
                #f5cfc0 0%,
                #d4906e 18%,
                #b86e52 35%,
                #9a4e38 52%,
                #c07058 68%,
                #d9927a 82%,
                #efc0a8 100%
            );
            border-radius: 16px;
            padding: 10px 10px 5px;
            box-shadow:
                0 1px 0 rgba(255,210,190,0.6) inset,
                0 3px 10px rgba(240,160,130,0.18) inset,
                0 -2px 0 rgba(60,20,10,0.9) inset,
                0 18px 56px rgba(0,0,0,0.85),
                0 4px 16px rgba(0,0,0,0.6),
                0 0 28px rgba(200,110,80,0.2);
        }
        /* 화면 */
        .tv-screen {
            border-radius: 10px; overflow: hidden; background: #000;
            box-shadow: inset 0 0 18px rgba(0,0,0,1), inset 0 0 2px rgba(255,255,255,0.05);
        }
        .tv-screen video { display: block; width: 100%; aspect-ratio: 9/16; object-fit: cover; background: #000; }
        /* 빈 슬롯 */
        .tv-empty { width: 100%; aspect-ratio: 9/16; background: #070707; display: flex; align-items: center; justify-content: center; }
        .tv-plus { width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.07); color: rgba(255,255,255,0.1); font-size: 20px; display: flex; align-items: center; justify-content: center; }
        /* 하단 턱 */
        .tv-chin { padding: 5px 0 3px; display: flex; align-items: center; justify-content: center; }
        .tv-dot { width: 5px; height: 5px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, #383838, #131313); box-shadow: inset 0 1px 1px rgba(255,255,255,0.07); }
        /* 넥 */
        .tv-neck { width: 20px; height: 20px; background: linear-gradient(to bottom, #c07058, #9a4e38); clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); }
        /* 베이스 */
        .tv-base { width: 66%; height: 9px; background: linear-gradient(to bottom, #d4906e, #9a4e38); border-radius: 0 0 10px 10px; box-shadow: 0 5px 16px rgba(0,0,0,0.75), 0 1px 0 rgba(255,200,170,0.35) inset; }
        /* 넘버 */
        .tv-number { font-family: var(--font-nav); font-size: 10px; letter-spacing: 3px; color: #fff; margin-top: 10px; }

        /* reveal 공통 */
        .reveal { opacity: 0; transform: translateY(36px); transition: all 0.8s var(--ease-out); }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        /* FOOTER */

        @media (max-width: 1024px) { .tv-grid { grid-template-columns: repeat(2,1fr); } }
        @media (max-width: 768px) {
            .header { padding: 0 24px; height: 64px; } .nav { display: none; } .menu-toggle { display: flex; }
            .page-hero { padding: 88px 20px 16px; }
            .tv-section { padding: 12px 16px 60px; } .tv-grid { gap: 14px; }
        }
        .bg-video-wrap {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        .bg-video-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        html, body { overflow: hidden; height: 100%; margin: 0; }
        .scroll-container {
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 1;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-container { scrollbar-width: none; }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">

        </a>
        <nav class="nav" id="nav">
            <a href="index.html">Home</a>
            <a href="diploma.html">Diploma</a>

        <div class="menu-toggle" id="menuToggle" onclick="toggleMenu()">

    </header>

    <section class="page-hero">
        <p class="page-hero-label reveal">Beauty Tips</p>

        <p class="page-hero-desc reveal">집에서도 실천할 수 있는 셀프 뷰티 팁</p>

    <div class="tv-section">
        <div class="tv-grid">

                <div class="tv-body">

                        <video controls muted preload="metadata">
                            <source src="Self-Beauty/SelfBeauty_1.mp4" type="video/mp4">

                    </div>
                    <div class="tv-chin"><div class="tv-dot"></div></div>

                <div class="tv-neck"></div>

            <div class="tv-wrap">
                <div class="tv-body">

                    </div>
                    <div class="tv-chin"><div class="tv-dot"></div></div>
                </div>
                <div class="tv-neck"></div>
                <div class="tv-base"></div>
                <div class="tv-number">#2</div>
            </div>

            <div class="tv-wrap">
                <div class="tv-body">
                    <div class="tv-screen">
                        <div class="tv-empty"><div class="tv-plus">+</div></div>
                    </div>
                    <div class="tv-chin"><div class="tv-dot"></div></div>

                <div class="tv-neck"></div>

            <div class="tv-wrap">
                <div class="tv-body">
                    <div class="tv-screen">

                    </div>

    <footer class="footer-slim">
        <div class="footer-slim-inner">
            <span class="footer-copy">&copy; 2026 Hwasa K-Beauty. All rights reserved.</span>
            <div class="footer-qr-slots">
                <div class="footer-qr-placeholder">QR<br>Homepage</div>
                <div class="footer-qr-placeholder">QR<br>E-Chart</div>

            <div class="footer-slim-links">
                <a href="https://www.instagram.com/hwasa_k_beauty/" target="_blank">Instagram</a>

                <a href="contact.html" class="footer-contact-btn">Contact</a>

    </footer>

    </div>

    <script>
        // reveal
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.08, rootMargin: '0px 0px -10px 0px' });
        document.querySelectorAll('.reveal, .tv-wrap').forEach(el => obs.observe(el));

        function toggleMenu() {
            const nav = document.getElementById('nav');
            nav.style.display = nav.style.display === 'flex' ? 'none' : 'flex';
            if (window.innerWidth <= 768 && nav.style.display === 'flex') {
                nav.style.cssText = 'display:flex;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,10,0.97);z-index:999;align-items:center;justify-content:center;gap:28px;';
            }
        }
    </script>
</body>
