<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HWASA K-Beauty — 직원 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #B8956A; --gold-dark: #8B6F4E; --gold-light: #D4B896;
      --bg: #141210; --surface: #1C1916; --elevated: #242018;
      --border: rgba(255,255,255,0.07);
      --text: #E8E0D8; --text-2: #9E9589; --text-3: #6B6560;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 55% at 72% 38%, rgba(184,149,106,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 22% 72%, rgba(184,149,106,0.04) 0%, transparent 55%);
    }
    .bg-line {
      position: fixed; inset: 0; pointer-events: none;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.012) 40px);
    }
    .card {
      position: relative; z-index: 10; width: 420px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 52px 44px 44px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .deco-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(184,149,106,0.1); pointer-events: none; }
    .deco-ring-1 { width: 220px; height: 220px; top: -80px; right: -70px; }
    .deco-ring-2 { width: 160px; height: 160px; top: -40px; right: -30px; opacity: .5; }
    .deco-ring-3 { width: 270px; height: 270px; bottom: -90px; left: -90px; opacity: .6; }
    .logo { display: flex; align-items: center; gap: 13px; margin-bottom: 36px; }
    .logo-mark {
      width: 44px; height: 44px; background: var(--gold); border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-size: 24px; color: #fff; font-weight: 600; flex-shrink: 0;
    }
    .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; color: var(--text); font-weight: 400; letter-spacing: 0.5px; }
    .logo-sub  { font-size: 9.5px; color: var(--text-3); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 3px; }
    .title    { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--text); margin-bottom: 6px; }
    .subtitle { font-size: 11.5px; color: var(--text-3); margin-bottom: 34px; line-height: 1.6; }
    .field { margin-bottom: 18px; }
    .field-label { display: block; font-size: 9.5px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; color: var(--text-2); margin-bottom: 8px; }
    .inp-wrap { position: relative; }
    .inp {
      width: 100%; background: var(--elevated); border: 1px solid var(--border);
      border-radius: 9px; padding: 13px 16px; font-size: 13px; color: var(--text);
      font-family: 'Noto Sans KR', sans-serif; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .inp:focus { border-color: rgba(184,149,106,0.5); box-shadow: 0 0 0 3px rgba(184,149,106,0.08); }
    .inp.has-btn { padding-right: 44px; }
    .inp::placeholder { color: var(--text-3); }
    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-3);
      display: flex; align-items: center; justify-content: center;
      padding: 4px; transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--gold); }
    .err-msg {
      display: none; font-size: 11.5px; color: #FF6B6B;
      padding: 10px 14px; margin-bottom: 14px;
      background: rgba(255,107,107,0.07); border: 1px solid rgba(255,107,107,0.18); border-radius: 8px;
    }
    .err-msg.show { display: block; }
    .btn-login {
      width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 9px;
      color: #fff; font-size: 13px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; margin-top: 6px;
    }
    .btn-login:hover { background: var(--gold-dark); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(184,149,106,0.25); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-login .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto;
    }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { margin-top: 32px; padding-top: 22px; border-top: 1px solid var(--border); text-align: center; font-size: 10px; color: var(--text-3); line-height: 1.9; }
    .footer a { color: var(--gold); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .home-link {
      position: fixed; top: 24px; left: 28px; z-index: 20;
      display: flex; align-items: center; gap: 8px;
      color: var(--text-3); font-size: 11px; letter-spacing: 1px;
      text-decoration: none; text-transform: uppercase; transition: color 0.2s;
    }
    .home-link:hover { color: var(--gold); }
    .home-link:hover svg { transform: translateX(-3px); }
    .home-link svg { transition: transform 0.2s; }
    @media (max-width: 480px) { .card { width: 92vw; padding: 40px 28px 36px; } }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-line"></div>

  <a href="PAGE_MAIN.html" class="home-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    홈으로
  </a>

  <div class="card">
    <div class="deco-ring deco-ring-1"></div>
    <div class="deco-ring deco-ring-2"></div>
    <div class="deco-ring deco-ring-3"></div>

    <div class="logo">
      <div class="logo-mark">H</div>
      <div>
        <div class="logo-name">HWASA K-Beauty</div>
        <div class="logo-sub">Clinic ERP System</div>
      </div>
    </div>

    <div class="title">직원 로그인</div>
    <div class="subtitle">계정 정보를 입력하여 ERP에 접속하세요</div>

    <div class="field">
      <label class="field-label" for="uid">아이디</label>
      <input class="inp" type="text" id="uid" placeholder="아이디 입력" autocomplete="username" autocapitalize="none" />
    </div>

    <div class="field">
      <label class="field-label" for="upw">비밀번호</label>
      <div class="inp-wrap">
        <input class="inp has-btn" type="password" id="upw" placeholder="비밀번호 입력" autocomplete="current-password" />
        <button class="eye-btn" id="eyeBtn" type="button" aria-label="비밀번호 표시">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="err-msg" id="errMsg">⚠ 아이디 또는 비밀번호가 올바르지 않습니다.</div>

    <button class="btn-login" id="loginBtn" type="button">
      <span class="btn-text">로그인</span>
      <div class="spinner"></div>
    </button>

    <div class="footer">
      Hwasa K-Beauty · A1 Khu Five Star, Mỹ Đình, Hà Nội<br/>
      계정 문의: <a href="tel:0326842002">0326-842-002</a>
    </div>
  </div>

  <script>
    const ACCOUNTS = {
      "admin":      { pw: "hwasa2023", name: "이화사 원장", role: "관리자", initial: "이", color: "linear-gradient(135deg,#B8956A,#8B6F4E)" },
      "galaxy0219": { pw: "0716",      name: "Galaxy",     role: "원장",   initial: "G", color: "linear-gradient(135deg,#4D96FF,#2766CC)" },
      "manager":    { pw: "0716",      name: "Manager",    role: "매니저", initial: "M", color: "linear-gradient(135deg,#6BCB77,#449D51)" }
    };

    const uid    = document.getElementById("uid");
    const upw    = document.getElementById("upw");
    const btn    = document.getElementById("loginBtn");
    const errMsg = document.getElementById("errMsg");
    const eyeBtn = document.getElementById("eyeBtn");
    const eyeIcon = document.getElementById("eyeIcon");

    const eyeOpen  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeClose = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22"/>`;
    let pwVisible = false;

    eyeBtn.addEventListener("click", () => {
      pwVisible = !pwVisible;
      upw.type = pwVisible ? "text" : "password";
      eyeIcon.innerHTML = pwVisible ? eyeClose : eyeOpen;
    });

    function doLogin() {
      const id  = uid.value.trim();
      const pw  = upw.value;
      const acc = ACCOUNTS[id];

      if (!acc || acc.pw !== pw) {
        errMsg.classList.add("show");
        upw.value = ""; upw.focus();
        return;
      }

      errMsg.classList.remove("show");
      btn.disabled = true;
      btn.classList.add("loading");

      sessionStorage.setItem("hskb_erp_user", JSON.stringify({ id, ...acc }));

      setTimeout(() => {
        window.location.href = "PAGE_ERP_SALES.html";
      }, 700);
    }

    btn.addEventListener("click", doLogin);
    uid.addEventListener("keydown", e => { if (e.key === "Enter") { upw.focus(); } });
    upw.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    uid.focus();
  </script>
</body>
</html>
