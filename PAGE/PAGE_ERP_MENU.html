<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HWASA K-Beauty ERP - 메뉴관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
  <script src="ERP_COMMON.js"></script>
    <script src="DATA_CONNECTOR.js"></script>
    </head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const PAGE_ID = 'menu';

function App() {
  const [dark, setDark] = useState(false);
  const now = new Date();
  const user = getUser();
  
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  }, [dark]);
  
  return (
    <div className="erp-wrap">
      <header className="hdr">
        <a href="../erp.html" className="hdr-logo" style={{textDecoration:'none'}}>
          <div className="hdr-logo-icon">H</div>
          <span className="hdr-logo-text">HWASA K-Beauty</span>
        </a>
        <div className="hdr-nav">
          { ERP_PAGES.map(p=>{
              const isActive = p.id==='menu' || (p.children && p.children.some(c=>c.id==='menu'));
              if(p.children && p.children.length > 0) {
                return (
                  <div key={p.id} className="hdr-tab-wrap">
                    <a href={p.href} className={'hdr-tab'+(isActive?' active':'')} style={{textDecoration:'none'}}><Ic d={p.icon} size={14}/>{p.label}</a>
                    <div className="hdr-dropdown">
                      {p.children.map(c=>(
                        <a key={c.id} href={c.href} className={'hdr-dropdown-item'+(c.id==='menu'?' active':'')} style={{textDecoration:'none'}}><Ic d={c.icon} size={13}/>{c.label}</a>
                      ))}
                    </div>
                  </div>
                );
              }
              return <a key={p.id} href={p.href} className={'hdr-tab'+(isActive?' active':'')} style={{textDecoration:'none'}}><Ic d={p.icon} size={14}/>{p.label}</a>;
            }) }
        </div>
        <div className="hdr-right">
          <div className="hdr-date">{now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
          <button className="theme-btn" onClick={()=>setDark(!dark)}>
            {dark ? <Ic d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" size={16}/> : <Ic d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 5a7 7 0 1 0 0 14A7 7 0 0 0 12 5z" size={16}/>}
          </button>
          <div className="hdr-user">
            <div className="hdr-avatar" style={{background: user?.color || '#B8956A'}}>{user?.initial || '관'}</div>
            <div><div className="hdr-uname">{user?.name || '관리자'}</div><div className="hdr-role">{user?.role || '관리자'}</div></div>
          </div>
          <button className="hdr-logout" onClick={logout}>로그아웃</button>
        </div>
      </header>
      <main className="erp-main" style={{padding:'24px'}}>
        <MenuManagement />
      </main>
    </div>
  );
}

function MenuManagement() {
  const categories = [
    { id: 'hairloss', label: '탈모 케어', color: '#B8956A' },
    { id: 'face', label: '페이스 케어', color: '#8B6F4E' },
    { id: 'body', label: '바디 케어', color: '#6B8E6B' },
    { id: 'event', label: '이벤트', color: '#7B6B8E' },
    { id: 'package', label: '패키지', color: '#8E6B6B' },
    { id: 'membership', label: '멤버십', color: '#6B7B8E' },
  ];
  
  const [menus, setMenus] = useState(() => {
    const saved = localStorage.getItem('hskb_menus');
    return saved ? JSON.parse(saved) : [
      { id: 1, category: 'hairloss', name: '탈모 기본 케어', duration: 60, price: 550000, unit: 'VND', active: true, desc: '두피 분석 + 탈모 케어 기본 프로그램' },
      { id: 2, category: 'hairloss', name: '탈모 집중 케어', duration: 90, price: 880000, unit: 'VND', active: true, desc: '집중 탈모 치료 + 영양 공급' },
      { id: 3, category: 'face', name: '기본 페이스 케어', duration: 60, price: 550000, unit: 'VND', active: true, desc: '클렌징 + 기본 케어' },
      { id: 4, category: 'body', name: '바디 마사지 60분', duration: 60, price: 550000, unit: 'VND', active: true, desc: '전신 바디 마사지' },
      { id: 5, category: 'package', name: 'HWASA COMBO A', duration: 120, price: 870000, unit: 'VND', active: true, desc: '페이스 + 바디 + 발 각질정리' },
      { id: 6, category: 'membership', name: 'VIP Membership CLUB', duration: 0, price: 11000000, unit: 'VND', active: true, desc: '기본샴푸 2회권 + 모든관리 1회' },
    ];
  });
  
  const [filter, setFilter] = useState('all');
  const [editId, setEditId] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ category:'hairloss', name:'', duration:60, price:0, unit:'VND', active:true, desc:'' });
  
  const save = (list) => {
    setMenus(list);
    localStorage.setItem('hskb_menus', JSON.stringify(list));
  };
  
  const filtered = filter === 'all' ? menus : menus.filter(m => m.category === filter);
  
  const toggleActive = (id) => {
    save(menus.map(m => m.id === id ? {...m, active: !m.active} : m));
  };
  
  const deleteMenu = (id) => {
    if(confirm('삭제하시겠습니까?')) save(menus.filter(m => m.id !== id));
  };
  
  const addMenu = () => {
    const newMenu = { ...form, id: Date.now() };
    save([...menus, newMenu]);
    setShowAdd(false);
    setForm({ category:'hairloss', name:'', duration:60, price:0, unit:'VND', active:true, desc:'' });
  };
  
  const catMap = Object.fromEntries(categories.map(c => [c.id, c]));
  
  return (
    <div>
      <div style={{marginBottom:'20px'}}>
        <h2 style={{fontSize:'20px',fontWeight:'700',color:'var(--text)',marginBottom:'4px'}}>프로그램 메뉴 관리</h2>
        <p style={{fontSize:'12px',color:'var(--text2)'}}>시술 프로그램 및 가격 관리</p>
      </div>
      
      <div style={{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
          {[{id:'all',label:'전체'},...categories].map(c => (
            <button key={c.id} onClick={()=>setFilter(c.id)}
              style={{padding:'6px 14px',borderRadius:'20px',border:'none',cursor:'pointer',fontSize:'11px',fontWeight:'600',
                background: filter===c.id ? 'var(--gold)' : 'var(--bg-card)',
                color: filter===c.id ? 'white' : 'var(--text2)',
                transition:'all .2s'}}>
              {c.label}
            </button>
          ))}
        </div>
        <button onClick={()=>setShowAdd(true)}
          style={{padding:'8px 16px',background:'var(--gold)',color:'white',border:'none',borderRadius:'8px',cursor:'pointer',fontSize:'12px',fontWeight:'700'}}>
          + 메뉴 추가
        </button>
      </div>
      
      {showAdd && (
        <div style={{background:'var(--bg-card)',border:'1px solid var(--border-gold)',borderRadius:'12px',padding:'20px',marginBottom:'16px'}}>
          <h3 style={{fontSize:'14px',fontWeight:'700',marginBottom:'16px',color:'var(--gold-light)'}}>새 메뉴 추가</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px',marginBottom:'12px'}}>
            <div>
              <label style={{fontSize:'11px',color:'var(--text2)',display:'block',marginBottom:'4px'}}>카테고리</label>
              <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})}
                style={{width:'100%',padding:'8px',borderRadius:'6px',border:'1px solid var(--border)',background:'var(--bg)',color:'var(--text)',fontSize:'12px'}}>
                {categories.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:'11px',color:'var(--text2)',display:'block',marginBottom:'4px'}}>메뉴명</label>
              <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="메뉴 이름"
                style={{width:'100%',padding:'8px',borderRadius:'6px',border:'1px solid var(--border)',background:'var(--bg)',color:'var(--text)',fontSize:'12px',boxSizing:'border-box'}}/>
            </div>
            <div>
              <label style={{fontSize:'11px',color:'var(--text2)',display:'block',marginBottom:'4px'}}>소요시간(분)</label>
              <input type="number" value={form.duration} onChange={e=>setForm({...form,duration:+e.target.value})}
                style={{width:'100%',padding:'8px',borderRadius:'6px',border:'1px solid var(--border)',background:'var(--bg)',color:'var(--text)',fontSize:'12px',boxSizing:'border-box'}}/>
            </div>
            <div>
              <label style={{fontSize:'11px',color:'var(--text2)',display:'block',marginBottom:'4px'}}>가격</label>
              <input type="number" value={form.price} onChange={e=>setForm({...form,price:+e.target.value})}
                style={{width:'100%',padding:'8px',borderRadius:'6px',border:'1px solid var(--border)',background:'var(--bg)',color:'var(--text)',fontSize:'12px',boxSizing:'border-box'}}/>
            </div>
            <div>
              <label style={{fontSize:'11px',color:'var(--text2)',display:'block',marginBottom:'4px'}}>통화</label>
              <select value={form.unit} onChange={e=>setForm({...form,unit:e.target.value})}
                style={{width:'100%',padding:'8px',borderRadius:'6px',border:'1px solid var(--border)',background:'var(--bg)',color:'var(--text)',fontSize:'12px'}}>
                <option value="VND">VND (동)</option>
                <option value="KRW">KRW (원)</option>
              </select>
            </div>
            <div>
              <label style={{fontSize:'11px',color:'var(--text2)',display:'block',marginBottom:'4px'}}>설명</label>
              <input value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})} placeholder="간단한 설명"
                style={{width:'100%',padding:'8px',borderRadius:'6px',border:'1px solid var(--border)',background:'var(--bg)',color:'var(--text)',fontSize:'12px',boxSizing:'border-box'}}/>
            </div>
          </div>
          <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
            <button onClick={()=>setShowAdd(false)} style={{padding:'8px 16px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'6px',cursor:'pointer',fontSize:'12px',color:'var(--text2)'}}>취소</button>
            <button onClick={addMenu} style={{padding:'8px 16px',background:'var(--gold)',color:'white',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'12px',fontWeight:'700'}}>저장</button>
          </div>
        </div>
      )}
      
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:'12px'}}>
        {filtered.map(menu => {
          const cat = catMap[menu.category] || {};
          return (
            <div key={menu.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'12px',padding:'16px',
              opacity: menu.active ? 1 : 0.5, transition:'all .2s'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}}>
                <div>
                  <span style={{display:'inline-block',padding:'2px 8px',borderRadius:'10px',fontSize:'10px',fontWeight:'700',
                    background: cat.color+'22', color: cat.color, marginBottom:'6px'}}>
                    {cat.label || menu.category}
                  </span>
                  <div style={{fontSize:'14px',fontWeight:'700',color:'var(--text)'}}>{menu.name}</div>
                </div>
                <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                  <button onClick={()=>toggleActive(menu.id)}
                    style={{padding:'4px 10px',borderRadius:'12px',border:'none',cursor:'pointer',fontSize:'10px',fontWeight:'700',
                      background: menu.active ? '#22c55e22' : 'var(--bg)',
                      color: menu.active ? '#22c55e' : 'var(--text2)'}}>
                    {menu.active ? 'ON' : 'OFF'}
                  </button>
                  <button onClick={()=>deleteMenu(menu.id)}
                    style={{padding:'4px 8px',borderRadius:'6px',border:'none',cursor:'pointer',fontSize:'10px',background:'#ef444422',color:'#ef4444'}}>
                    삭제
                  </button>
                </div>
              </div>
              <div style={{fontSize:'12px',color:'var(--text2)',marginBottom:'8px'}}>{menu.desc}</div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:'11px',color:'var(--text3)'}}>{menu.duration > 0 ? menu.duration+'분' : '기간제'}</span>
                <span style={{fontSize:'16px',fontWeight:'800',color:'var(--gold-light)'}}>
                  {menu.price.toLocaleString()} <span style={{fontSize:'11px',fontWeight:'600'}}>{menu.unit}</span>
                </span>
              </div>
            </div>
          );
        })}
      </div>
      
      {filtered.length === 0 && (
        <div style={{textAlign:'center',padding:'60px',color:'var(--text3)'}}>
          <div style={{fontSize:'40px',marginBottom:'12px'}}>📋</div>
          <div>등록된 메뉴가 없습니다</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
