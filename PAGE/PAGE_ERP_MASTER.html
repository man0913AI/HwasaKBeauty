<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HWASA K-Beauty ERP - 마스터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
  <script src="ERP_COMMON.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;
const PAGE_TABS = ['대시보드','프로그램','메뉴(HEAD)','메뉴구성(BODY)','이벤트','직원','멤버등급','지출항목','매입분류','공급처','고객등록'];

const MASTER_CSS = `
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:14px;}
.dash-section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:background .3s;}
.dash-section h4{font-size:11px;font-weight:600;color:var(--gold-light);margin-bottom:10px;}
.dash-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px;}
.dash-row:last-child{border-bottom:none;}
.bk-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--rs);font-size:10px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .2s;}
.fade-in{animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.toolbar{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.toolbar .spacer{flex:1;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--text3);font-size:12px;}
`;

/* ════════════════════════════════════════
   대시보드 (Phase 6)
   ════════════════════════════════════════ */
function Dashboard() {
  const [sales,    setSales]    = useState({});
  const [att,      setAtt]      = useState({});
  const [customers,setCust]     = useState([]);
  const todayStr = today();
  const nowYm    = todayStr.slice(0,7);

  useEffect(()=>{
    DataService.read('sales').then(setSales);
    DataService.read('attendance').then(setAtt);
    DataService.read('customers').then(setCust);
  },[]);

  // 오늘 매출
  const todaySales = sales[todayStr] || { rows:[], expenses:[] };
  const sm = f => (todaySales.rows||[]).reduce((a,x)=>a+(Number(x[f])||0),0);
  const todayInc = sm('cash')+sm('deposit')+sm('card')+sm('krw');
  const todayExp = (todaySales.expenses||[]).reduce((a,x)=>a+(Number(x.amount)||0),0);
  const todayCnt = (todaySales.rows||[]).length;

  // 이번달 매출
  const moDates = Object.keys(sales).filter(d=>d.startsWith(nowYm));
  const moInc = moDates.reduce((a,dt)=>{
    const d=sales[dt]; const sm2=f=>(d.rows||[]).reduce((b,x)=>b+(Number(x[f])||0),0);
    return a+sm2('cash')+sm2('deposit')+sm2('card')+sm2('krw');
  },0);

  // 오늘 출근
  const todayDay   = new Date().getDate();
  const monthAtt   = att[nowYm] || {};
  const presentToday = EMPLOYEES.filter(e=>(monthAtt[e.name]||{})[todayDay]);

  // 활성 이벤트
  const activeEvs = MASTER.events.filter(ev=>ev.active && todayStr>=ev.startDate && todayStr<=ev.endDate);

  // 최근 고객
  const recentCust = [...customers].sort((a,b)=>{
    const la = a.payments[a.payments.length-1]?.date||'';
    const lb = b.payments[b.payments.length-1]?.date||'';
    return lb.localeCompare(la);
  }).slice(0,5);

  const fileRef = useRef();
  const handleRestore = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    if(!confirm('현재 데이터를 덮어씁니다. 계속하시겠습니까?')) return;
    try {
      const cnt = await BackupService.importAll(file);
      alert(`복원 완료 (${cnt}개 테이블). 페이지를 새로고침합니다.`);
      window.location.reload();
    } catch(err) { alert('복원 실패: '+err.message); }
    e.target.value = '';
  };

  return (
    <div className="fade-in">
      <div className="toolbar">
        <span style={{fontSize:13,fontWeight:600,color:'var(--gold-light)'}}>오늘 현황</span>
        <span style={{fontSize:10,color:'var(--text3)'}}>{todayStr}</span>
        <div className="spacer"/>
        <button className="bk-btn" style={{background:'var(--ok)',color:'#fff'}} onClick={()=>BackupService.exportAll()}>⬇ JSON 백업</button>
        <button className="bk-btn" style={{background:'var(--warn)',color:'#fff'}} onClick={()=>fileRef.current.click()}>⬆ 백업 복원</button>
        <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={handleRestore}/>
      </div>

      <div className="dash-grid">
        {/* 오늘 매출 */}
        <div className="dash-section">
          <h4>오늘 매출</h4>
          <div style={{fontSize:22,fontWeight:700,color:'var(--gold-light)',marginBottom:6}}>{fmt(todayInc)}₫</div>
          <div className="dash-row"><span style={{color:'var(--text3)'}}>방문 건수</span><span style={{fontWeight:600}}>{todayCnt}건</span></div>
          <div className="dash-row"><span style={{color:'var(--text3)'}}>지출</span><span style={{color:'var(--err)'}}>{fmt(todayExp)}₫</span></div>
          <div className="dash-row"><span style={{color:'var(--text3)'}}>순수입</span><span style={{fontWeight:600,color:'var(--ok)'}}>{fmt(todayInc-todayExp)}₫</span></div>
        </div>

        {/* 월 누적 */}
        <div className="dash-section">
          <h4>{nowYm} 월 누적</h4>
          <div style={{fontSize:22,fontWeight:700,color:'var(--gold-light)',marginBottom:6}}>{fmt(moInc)}₫</div>
          <div className="dash-row"><span style={{color:'var(--text3)'}}>영업일</span><span>{moDates.length}일</span></div>
          <div className="dash-row"><span style={{color:'var(--text3)'}}>총 방문</span><span>{moDates.reduce((a,d)=>a+(sales[d]?.rows?.length||0),0)}건</span></div>
        </div>

        {/* 오늘 출근 */}
        <div className="dash-section">
          <h4>오늘 출근</h4>
          {EMPLOYEES.map(emp=>{
            const rec = (monthAtt[emp.name]||{})[todayDay];
            return (
              <div key={emp.name} className="dash-row">
                <span style={{fontWeight:500}}>{emp.nameKr}</span>
                {rec
                  ? <span style={{color:'var(--ok)'}}>{rec.in} ~ {rec.out||'근무중'}</span>
                  : <span style={{color:'var(--text3)'}}>미출근</span>}
              </div>
            );
          })}
        </div>

        {/* 활성 이벤트 */}
        <div className="dash-section">
          <h4>활성 이벤트</h4>
          {activeEvs.length===0
            ? <div style={{fontSize:11,color:'var(--text3)'}}>진행중인 이벤트 없음</div>
            : activeEvs.map((ev,i)=>(
                <div key={i} className="dash-row">
                  <span style={{fontSize:10}}>{ev.name}</span>
                  <span style={{color:'var(--warn)',fontSize:10}}>{ev.discountType==='%'?ev.discountValue+'%':fmt(ev.discountValue)+'₫'} 할인</span>
                </div>
              ))}
        </div>
      </div>

      {/* 최근 방문 고객 */}
      <div className="pn">
        <div className="pn-h"><div className="pn-t">최근 방문 고객</div></div>
        <table className="tbl">
          <thead><tr><th>고객</th><th>등급</th><th>최근 방문</th><th>최근 메뉴</th><th className="num">총 결제</th></tr></thead>
          <tbody>{recentCust.map(c=>{
            const last = c.payments[c.payments.length-1];
            const tot  = c.payments.reduce((a,p)=>a+p.amount,0);
            return (
              <tr key={c.id}>
                <td style={{fontWeight:500}}>{c.name}</td>
                <td>{c.grade?<span className={`sts ${c.grade==='VIP'||c.grade==='VVIP'?'sts-warn':'sts-info'}`}>{c.grade}</span>:'-'}</td>
                <td>{last?.date||'-'}</td>
                <td style={{color:'var(--text2)'}}>{last?.menu||'-'}</td>
                <td className="num" style={{fontWeight:600,color:'var(--gold-light)'}}>{fmt(tot)}</td>
              </tr>
            );
          })}</tbody>
        </table>
      </div>
    </div>
  );
}


/* ════════════════════════════════════════
   MASTER — 마스터정보 관리
   ════════════════════════════════════════ */
function MasterTable({title,dataKey,columns,initRow}) {
  const [rows,setRows]=useState([]);
  useEffect(()=>{DataService.read('master').then(m=>setRows(m[dataKey]||[]));},[dataKey]);
  const up=(i,f,v)=>setRows(p=>{const r=[...p];r[i]={...r[i],[f]:v};return r;});
  const add=()=>setRows(p=>[...p,initRow(p.length)]);
  const del=(i)=>setRows(p=>p.filter((_,j)=>j!==i));
  const save=async()=>{const m=await DataService.read('master');m[dataKey]=rows;await DataService.write('master',m);
    // 동기화: MASTER 객체 업데이트
    MASTER[dataKey]=JSON.parse(JSON.stringify(rows));
    alert('저장 완료');};
  return (<div className="fade-in">
    <div className="toolbar"><span style={{fontSize:12,fontWeight:600}}>{title}</span><span style={{fontSize:10,color:'var(--text3)',marginLeft:8}}>{rows.length}건</span><div className="spacer"/><button className="btn btn-s" onClick={add}>+ 추가</button><button className="btn btn-g" onClick={save}>저장</button></div>
    <div className="ss-wrap"><table className="ss" style={{minWidth:columns.reduce((a,c)=>a+c.w,0)+60}}>
      <thead><tr><th style={{width:30}}>No</th>{columns.map(c=><th key={c.k} style={{minWidth:c.w}}>{c.l}</th>)}<th style={{width:28}}>×</th></tr></thead>
      <tbody>{rows.map((row,ri)=><tr key={ri}><td className="rn">{ri+1}</td>
        {columns.map(c=><td key={c.k} className={c.t==='num'?'nc':''}>
          {c.t==='bool'?<div style={{textAlign:'center'}}><input type="checkbox" checked={!!row[c.k]} onChange={e=>up(ri,c.k,e.target.checked)}/></div>
          :c.t==='sel'?<select value={row[c.k]||''} onChange={e=>up(ri,c.k,e.target.value)}>{c.opts.map(o=><option key={o} value={o}>{o}</option>)}</select>
          :c.t==='num'?<input value={row[c.k]||''} onChange={e=>up(ri,c.k,e.target.value===''?0:Number(e.target.value.replace(/,/g,'')))} placeholder="0"/>
          :<input value={row[c.k]||''} onChange={e=>up(ri,c.k,e.target.value)}/>}
        </td>)}
        <td><button className="del-btn" onClick={()=>del(ri)}>×</button></td></tr>)}
      </tbody></table></div>
  </div>);
}

function MasterProgram(){return <MasterTable title="프로그램 모듈 (재사용 단위)" dataKey="program" columns={[
  {k:'code',l:'코드',w:60,t:'tx'},{k:'name',l:'프로그램명',w:130,t:'tx'},
  {k:'majorCat',l:'대분류',w:75,t:'sel',opts:MAJOR_CATS},{k:'defaultTime',l:'기본시간',w:70,t:'sel',opts:TIME_OPTS},
  {k:'desc',l:'설명',w:160,t:'tx'},{k:'active',l:'활성',w:40,t:'bool'}
]} initRow={(n)=>({code:'PG'+String(n+1).padStart(3,'0'),name:'',majorCat:'마사지',defaultTime:'30분',desc:'',active:true})}/>;}

function MasterMenuHead(){return <MasterTable title="메뉴 관리 (MENU_HEAD)" dataKey="menuHead" columns={[
  {k:'code',l:'메뉴코드',w:65,t:'tx'},{k:'name',l:'메뉴명',w:120,t:'tx'},{k:'desc',l:'상세설명',w:200,t:'tx'},
  {k:'totalTime',l:'총시간(분)',w:75,t:'num'},{k:'price',l:'가격(VND)',w:100,t:'num'},{k:'active',l:'활성',w:40,t:'bool'}
]} initRow={(n)=>({code:'MH'+String(n+1).padStart(3,'0'),name:'',desc:'',totalTime:0,price:0,active:true})}/>;}

function MasterMenuBody(){
  const pgOpts = MASTER.program.filter(p=>p.active).map(p=>p.code+' '+p.name);
  return (<div className="fade-in">
    <MasterTable title="메뉴 구성 (MENU_BODY) — 프로그램 라우트" dataKey="menuBody" columns={[
      {k:'id',l:'ID',w:55,t:'tx'},
      {k:'menuCode',l:'메뉴',w:130,t:'sel',opts:MASTER.menuHead.map(m=>m.code+' '+m.name)},
      {k:'pgCode',l:'프로그램',w:140,t:'sel',opts:pgOpts},
      {k:'time',l:'시간',w:65,t:'sel',opts:TIME_OPTS},
      {k:'seq',l:'순서',w:45,t:'num'},{k:'active',l:'활성',w:40,t:'bool'}
    ]} initRow={(n)=>({id:'MB'+String(n+1).padStart(3,'0'),menuCode:'',pgCode:'',time:'30분',seq:n+1,active:true})}/>
    <div className="pn" style={{padding:14,marginTop:8}}>
      <div style={{fontSize:11,fontWeight:600,marginBottom:8,color:'var(--gold-light)'}}>메뉴별 구성 미리보기</div>
      {MASTER.menuHead.filter(m=>m.active).map(mh => {
        const bodies = MASTER.menuBody.filter(b=>b.menuCode===mh.code&&b.active).sort((a,b)=>a.seq-b.seq);
        if(bodies.length===0) return null;
        return (<div key={mh.code} style={{marginBottom:10,padding:'8px 10px',border:'1px solid var(--border)',borderRadius:'var(--rs)'}}>
          <div style={{fontSize:11,fontWeight:600}}>{mh.code} {mh.name} <span style={{color:'var(--text3)',fontWeight:400}}>({mh.totalTime}분 / {fmt(mh.price)}₫)</span></div>
          <div style={{marginTop:4}}>{bodies.map((b,i)=>{
            const pg = MASTER.program.find(p=>p.code===b.pgCode);
            return <span key={i} style={{display:'inline-block',fontSize:9,padding:'2px 8px',margin:'2px 3px',border:'1px solid var(--border-gold)',borderRadius:12,color:'var(--gold-light)'}}>
              {i+1}. {pg?pg.name:b.pgCode} ({b.time}) <span style={{color:'var(--text3)'}}>{pg?.majorCat}</span>
            </span>;
          })}</div>
        </div>);
      })}
    </div>
  </div>);
}

  {k:'id',l:'코드',w:55,t:'tx'},{k:'name',l:'이벤트명',w:150,t:'tx'},
  {k:'menuCode',l:'대상메뉴',w:140,t:'sel',opts:['(전체)',...MASTER.menuHead.map(m=>m.code+' '+m.name)]},

  {k:'desc',l:'설명',w:140,t:'tx'},{k:'active',l:'활성',w:40,t:'bool'}
]} initRow={(n)=>({id:'EV'+String(n+1).padStart(3,'0'),name:'',menuCode:'',startDate:'',endDate:'',discountType:'%',discountValue:0,desc:'',active:true})}/>;}


function MasterEmployees(){return <MasterTable title="직원 관리" dataKey="employees" columns={[
  {k:'name',l:'ID',w:60,t:'tx'},{k:'nameKr',l:'이름',w:60,t:'tx'},{k:'position',l:'직위',w:100,t:'tx'},

function MasterGrades(){
  const [items,setItems]=useState(MASTER.memberGrades);
  const save=async()=>{const m=await DataService.read('master');m.memberGrades=items;await DataService.write('master',m);MASTER.memberGrades=[...items];alert('저장 완료');};

  {k:'id',l:'코드',w:50,t:'tx'},{k:'name',l:'항목명',w:120,t:'tx'},{k:'active',l:'활성',w:40,t:'bool'}

/* ════════════════════════════════════════
   CUSTOMER MANAGEMENT — 고객관리
   ════════════════════════════════════════ */
function CustomerList({onSelect}) {
  const [list,setList]=useState([]);const [search,setSearch]=useState('');
  useEffect(()=>{DataService.read('customers').then(setList);},[]);
  const filtered=list.filter(c=>!search||c.name.includes(search)||c.id.includes(search)||(c.nameEn||'').toLowerCase().includes(search.toLowerCase())||c.phone.includes(search));
  return (<div className="fade-in">
    <div className="toolbar">
      <input className="form-inp" placeholder="고객 검색 (이름/코드/연락처)" value={search} onChange={e=>setSearch(e.target.value)} style={{width:250}}/>
      <div className="spacer"/>
      <span style={{fontSize:10,color:'var(--text3)'}}>총 {filtered.length}명</span>
    </div>
    <div className="pn"><table className="tbl">
      <thead><tr><th>코드</th><th>이름</th><th>연락처</th><th>등급</th><th>첫방문</th><th className="num">마일리지</th><th className="num">방문횟수</th><th className="num">총 결제</th></tr></thead>
      <tbody>{filtered.map(c=>{const totalPay=c.payments.reduce((a,p)=>a+p.amount,0);return(
        <tr key={c.id} onClick={()=>onSelect(c)} style={{cursor:'pointer'}}>
          <td style={{color:'var(--text3)'}}>{c.id}</td>
          <td style={{fontWeight:600}}>{c.name}{c.nameEn?<span style={{color:'var(--text3)',fontSize:10,marginLeft:4}}>({c.nameEn})</span>:''}</td>
          <td>{c.phone}</td>
          <td>{c.grade?<span className={`sts ${c.grade==='VIP'||c.grade==='VVIP'?'sts-warn':c.grade==='GOLD'?'sts-ok':'sts-info'}`}>{c.grade}</span>:'-'}</td>
          <td>{c.firstVisit}</td>
          <td className="num" style={{color:'var(--gold-light)'}}>{fmt(c.mileage)}</td>
          <td className="num">{c.history.length}회</td>
          <td className="num" style={{fontWeight:600,color:'var(--gold-light)'}}>{fmt(totalPay)}</td>
        </tr>);})}
      </tbody>
    </table></div>
  </div>);
}

function CustomerRegister({onDone}) {
  const [form,setForm]=useState({name:'',nameEn:'',phone:'',gender:'여',birth:'',grade:'',area:'',memo:''});
  const up=(k,v)=>setForm(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!form.name||!form.phone){alert('이름과 연락처는 필수입니다.');return;}
    const list=await DataService.read('customers');
    const maxId=list.reduce((a,c)=>Math.max(a,parseInt(c.id.replace('C',''))||0),0);
    const newC={...form,id:'C'+String(maxId+1).padStart(3,'0'),firstVisit:today(),mileage:0,payments:[],history:[]};
    list.push(newC);await DataService.write('customers',list);
    alert(newC.name+' 고객이 등록되었습니다.');if(onDone)onDone(newC);
  };
  return (<div className="fade-in">
    <div className="pn" style={{padding:18}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>신규 고객 등록</div>
      <div className="form-grid">
        <div className="form-g"><label className="form-l">이름 *</label><input className="form-inp" value={form.name} onChange={e=>up('name',e.target.value)} placeholder="홍길동"/></div>
        <div className="form-g"><label className="form-l">영문/베트남명</label><input className="form-inp" value={form.nameEn} onChange={e=>up('nameEn',e.target.value)} placeholder="Hong Gildong"/></div>
        <div className="form-g"><label className="form-l">연락처 *</label><input className="form-inp" value={form.phone} onChange={e=>up('phone',e.target.value)} placeholder="0912-345-6789"/></div>
        <div className="form-g"><label className="form-l">성별</label><select className="form-inp" value={form.gender} onChange={e=>up('gender',e.target.value)}><option>여</option><option>남</option></select></div>
        <div className="form-g"><label className="form-l">생년월일</label><input type="date" className="form-inp" value={form.birth} onChange={e=>up('birth',e.target.value)}/></div>
        <div className="form-g"><label className="form-l">멤버 등급</label><select className="form-inp" value={form.grade} onChange={e=>up('grade',e.target.value)}>{MEMBER_GRADES.map(g=><option key={g} value={g}>{g||'(없음)'}</option>)}</select></div>
        <div className="form-g"><label className="form-l">거주 지역</label><input className="form-inp" value={form.area} onChange={e=>up('area',e.target.value)} placeholder="미딩"/></div>
        <div className="form-g"><label className="form-l">메모</label><input className="form-inp" value={form.memo} onChange={e=>up('memo',e.target.value)}/></div>
      </div>
      <button className="btn btn-g" onClick={save}>등록</button>
    </div>
  </div>);
}

function CustomerDetail({customer,onBack}) {
  const c=customer;if(!c) return <div className="empty">고객을 선택해주세요</div>;
  const totalPay=c.payments.reduce((a,p)=>a+p.amount,0);
  const totalTip=c.payments.reduce((a,p)=>a+(p.tip||0),0);
  return (<div className="fade-in">
    <div className="toolbar"><button className="btn btn-s" onClick={onBack}>← 목록</button><span style={{fontSize:13,fontWeight:600}}>{c.name}</span><span style={{fontSize:10,color:'var(--text3)',marginLeft:8}}>{c.id}</span></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      {/* 좌측: 기초정보 + 마일리지 + 관리이력 */}
      <div>
        <div className="pn" style={{padding:16}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--gold-light)'}}>기초 정보</div>
          {[['코드',c.id],['이름',c.name+(c.nameEn?' ('+c.nameEn+')':'')],['연락처',c.phone],['성별',c.gender],['생년월일',c.birth||'-'],['등급',c.grade||'-'],['첫 방문일',c.firstVisit],['지역',c.area||'-'],['메모',c.memo||'-']].map(([k,v],i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--border)',fontSize:11}}>
              <span style={{color:'var(--text2)'}}>{k}</span><span style={{fontWeight:500}}>{v}</span>
            </div>
          ))}
        </div>
        <div className="pn" style={{padding:16,marginTop:0}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--gold-light)'}}>마일리지</div>
          <div style={{fontSize:24,fontWeight:700,color:'var(--gold-light)',marginBottom:6}}>{fmt(c.mileage)}₫</div>
          <div style={{fontSize:10,color:'var(--text3)'}}>총 결제: {fmt(totalPay)}₫ · 총 팁: {fmt(totalTip)}₫ · 방문: {c.history.length}회</div>
        </div>
        <div className="pn" style={{padding:0,marginTop:0}}>
          <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',fontSize:12,fontWeight:600,color:'var(--gold-light)'}}>관리 이력 ({c.history.length}건)</div>
          <table className="tbl"><thead><tr><th>날짜</th><th>메뉴</th><th>담당</th><th>메모</th></tr></thead>
          <tbody>{[...c.history].reverse().map((h,i)=>(
            <tr key={i}><td style={{color:'var(--gold-light)',fontWeight:500}}>{h.date}</td><td>{h.menu}</td><td>{h.therapist}</td><td style={{color:'var(--text2)'}}>{h.note}</td></tr>
          ))}</tbody></table>
        </div>
      </div>
      {/* 우측: 결제정보 */}
      <div>
        <div className="cards" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
          <div className="card"><div className="card-bar" style={{background:'var(--gold)'}}/><div className="card-lb">총 결제</div><div className="card-vl" style={{fontSize:16}}>{fmt(totalPay)}</div></div>
          <div className="card"><div className="card-bar" style={{background:'var(--ok)'}}/><div className="card-lb">총 팁</div><div className="card-vl" style={{fontSize:16}}>{fmt(totalTip)}</div></div>
          <div className="card"><div className="card-bar" style={{background:'var(--info)'}}/><div className="card-lb">방문</div><div className="card-vl" style={{fontSize:16}}>{c.history.length}회</div></div>
        </div>
        <div className="pn" style={{padding:0}}>
          <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',fontSize:12,fontWeight:600,color:'var(--gold-light)'}}>결제 내역 ({c.payments.length}건)</div>
          <table className="tbl"><thead><tr><th>날짜</th><th>메뉴</th><th className="num">금액</th><th>결제</th><th className="num">팁</th></tr></thead>
          <tbody>{[...c.payments].reverse().map((p,i)=>(
            <tr key={i}>
              <td style={{fontWeight:500}}>{p.date}</td><td>{p.menu}</td>
              <td className="num" style={{fontWeight:600,color:'var(--gold-light)'}}>{fmt(p.amount)}</td>
              <td><span className={`sts ${p.method==='현금'?'sts-ok':'sts-info'}`}>{p.method}</span></td>
              <td className="num" style={{color:'var(--ok)'}}>{fmt(p.tip)}</td>
            </tr>
          ))}</tbody></table>
        </div>
        <div className="pn" style={{padding:16,marginTop:0}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--gold-light)'}}>결제 수단별 합계</div>
          {(() => {
            const byMethod={};c.payments.forEach(p=>{byMethod[p.method]=(byMethod[p.method]||0)+p.amount;});
            return Object.entries(byMethod).map(([m,a],i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:11}}>
                <span>{m}</span><span style={{fontWeight:600}}>{fmt(a)}₫</span>
              </div>
            ));
          })()}
        </div>
      </div>
    </div>
  </div>);
}

function App() {
  const [user,setUser]=useState(getUser());
  const [subTab,setSub]=useState(0);
  const [now,setNow]=useState(new Date());
  const [dark,setDark]=useState(()=>localStorage.getItem('hskb_theme')!=='light');

  useEffect(()=>{ if(!user){ window.location.href='PAGE_ERP.html'; return; } const t=setInterval(()=>setNow(new Date()),60000); return ()=>clearInterval(t); },[user]);
  useEffect(()=>{ document.body.classList.toggle('light',!dark); localStorage.setItem('hskb_theme',dark?'dark':'light'); },[dark]);

  if(!user) return null;
  const logout=()=>{ localStorage.removeItem('hskb_erp_user'); window.location.href='PAGE_ERP.html'; };

  const renderContent=()=>{ return subTab===0?<Dashboard/>:subTab===1?<MasterProgram/>:subTab===2?<MasterMenuHead/>:subTab===3?<MasterMenuBody/>:subTab===4?<MasterEvents/>:subTab===5?<MasterEmployees/>:subTab===6?<MasterGrades/>:subTab===7?<MasterExpenseItems/>:subTab===8?<MasterPurchaseCats/>:subTab===9?<MasterSuppliers/>:<CustomerRegister onDone={()=>{}}/>; };

  return (
    <React.Fragment>
      <style>{ CSS }{ MASTER_CSS }</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-logo"><div className="mk">H</div><div className="nm">HWASA K-Beauty</div></div>
          <div className="hdr-nav">
            { ERP_PAGES.map(p=>(
              <a key={p.id} href={p.href} className={'hdr-tab'+(p.id==='master'?' active':'')} style={{ textDecoration:'none' }}> <Ic d={p.icon} size={14}/>{ p.label }</a>
            )) }
          </div>
          <div className="hdr-right">
            <div className="hdr-date">{now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
            <button className="theme-btn" onClick={()=>setDark(!dark)}>
              {dark ? <Ic d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" size={15}/>
                : <Ic d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" size={15}/>
              }
            </button>
            <div className="hdr-user">
              <div className="av" style={{ background:user.color||'var(--gold)' }}>{user.initial||user.name?.charAt(0)}</div>
              <div><div className="nm">{user.name}</div><div className="rl">{user.role}</div></div>
            </div>
            <button className="btn-logout" onClick={logout}> 로그아웃</button>
          </div>
        </div>
        <div className="content">
          <div className="sub-tabs">{PAGE_TABS.map((tab,i)=>(
            <div key={i} className={'sub-tab'+(subTab===i?' active':'')} onClick={()=>setSub(i)}>{ tab }</div>
          ))}</div>
          <div className="page" key={subTab}>{renderContent()}</div>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
