<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HWASA K-Beauty ERP - 결산</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js" crossorigin></script>
  <script src="ERP_COMMON.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;
const SUB_TABS = ['월말','분기','반기','년간'];

const CLOSING_CSS = `
.bar-wrap{background:var(--bg-el);border-radius:4px;height:8px;overflow:hidden;margin-top:3px;}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease;}
.month-bar-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);}
.month-label{font-size:10px;color:var(--text2);width:60px;flex-shrink:0;}
.month-val{font-size:10px;font-weight:600;width:80px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;}
.fade-in{animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.toolbar{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.toolbar .spacer{flex:1;}
.btn-export{background:var(--gold);color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;}
.btn-export:hover{background:#d4a017;}
`;

/* ── 날짜 범위 계산 ──────────────────────────────────────── */
function getDateRange(period, year, month, quarter) {
  const y = parseInt(year);
  const m = parseInt(month);
  const q = parseInt(quarter);
  switch(period) {
    case 'monthly':
      return { start:`${year}-${pad2(m)}`, end:`${year}-${pad2(m)}`, label:`${year}년 ${m}월` };
    case 'quarterly': {
      const qStart = (q-1)*3+1;
      return { start:`${year}-${pad2(qStart)}`, end:`${year}-${pad2(qStart+2)}`, label:`${year}년 ${q}분기 (${qStart}~${qStart+2}월)` };
    }
    case 'semi': {
      const half = parseInt(month); // 1 or 2
      return half===1
        ? { start:`${year}-01`, end:`${year}-06`, label:`${year}년 상반기 (1~6월)` }
        : { start:`${year}-07`, end:`${year}-12`, label:`${year}년 하반기 (7~12월)` };
    }
    case 'annual':
      return { start:`${year}-01`, end:`${year}-12`, label:`${year}년 연간` };
    default:
      return { start:'', end:'', label:'' };
  }
}

function filterSalesByRange(sales, start, end) {
  return Object.entries(sales).filter(([dt]) => {
    const ym = dt.slice(0,7);
    return ym >= start && ym <= end;
  });
}
function filterPurchaseByRange(purchase, start, end) {
  return purchase.filter(p => {
    const ym = p.date?.slice(0,7)||'';
    return ym >= start && ym <= end;
  });
}

/* ── 월별 합산 ─────────────────────────────────────────────── */
function aggregateByMonth(entries) {
  const byMo = {};
  entries.forEach(([dt, dayData]) => {
    const ym = dt.slice(0,7);
    if (!byMo[ym]) byMo[ym] = { sales:0, exp:0 };
    const sm = f => (dayData.rows||[]).reduce((a,x)=>a+(Number(x[f])||0),0);
    byMo[ym].sales += sm('cash')+sm('deposit')+sm('card')+sm('krw');
    byMo[ym].exp   += (dayData.expenses||[]).reduce((a,x)=>a+(Number(x.amount)||0),0);
  });
  return byMo;
}

/* ════════════════════════════════════════
   결산 컴포넌트
   ════════════════════════════════════════ */
function Settlement({period}) {
  const now   = new Date();
  const curY  = String(now.getFullYear());
  const curM  = pad2(now.getMonth()+1);
  const curQ  = String(Math.ceil((now.getMonth()+1)/3));
  const curH  = now.getMonth()+1 <= 6 ? '1' : '2';

  const [year,  setYear]  = useState(curY);
  const [month, setMonth] = useState(curM);
  const [qtr,   setQtr]   = useState(curQ);
  const [half,  setHalf]  = useState(curH);

  const [sales,    setSales]    = useState({});
  const [purchase, setPurchase] = useState([]);
  const [prevSales,setPrevSales]= useState({});
  useEffect(()=>{
    DataService.read('sales').then(setSales);
    DataService.read('purchase').then(setPurchase);
  },[]);

  const { start, end, label } = getDateRange(period, year,
    period==='monthly' ? month : period==='quarterly' ? qtr : half, qtr);

  const filteredSales    = filterSalesByRange(sales,    start, end);
  const filteredPurchase = filterPurchaseByRange(purchase, start, end);

  const salesT = filteredSales.reduce((a,[,d])=>{
    const sm=f=>(d.rows||[]).reduce((b,x)=>b+(Number(x[f])||0),0);
    return a+sm('cash')+sm('deposit')+sm('card')+sm('krw');
  },0);
  const expT   = filteredSales.reduce((a,[,d])=>a+(d.expenses||[]).reduce((b,e)=>b+(Number(e.amount)||0),0),0);
  const purT   = filteredPurchase.reduce((a,p)=>a+(p.total||0),0);
  const net    = salesT - expT - purT;

  const byMo   = aggregateByMonth(filteredSales);
  const months = Object.keys(byMo).sort();
  const maxMoSales = Math.max(1,...months.map(m=>byMo[m].sales));

  // 전년 대비
  const prevYear = String(parseInt(year)-1);
  const { start:ps, end:pe } = getDateRange(period, prevYear,
    period==='monthly' ? month : period==='quarterly' ? qtr : half, qtr);
  const prevFiltered = filterSalesByRange(sales, ps, pe);
  const prevSalesT   = prevFiltered.reduce((a,[,d])=>{
    const sm=f=>(d.rows||[]).reduce((b,x)=>b+(Number(x[f])||0),0);
    return a+sm('cash')+sm('deposit')+sm('card')+sm('krw');
  },0);
  const yoyRate = prevSalesT > 0 ? Math.round((salesT-prevSalesT)/prevSalesT*100) : null;

  // 엑셀 내보내기 함수
  const exportToExcel = useCallback(() => {
    try {
      if (!window.XLSX) { alert('SheetJS 라이브러리 로드 실패. 새로고침 후 다시 시도하세요.'); return; }
      const strFileName = `HSKB_결산_${year}${month}.xlsx`;
      const objWb = XLSX.utils.book_new();

      // 손익 내역 시트
      const lstProfitData = [
        { 항목: '매출 합계', 금액: salesT, 비율: '100%' },
        { 항목: '(-) 영업 지출', 금액: -expT, 비율: salesT>0 ? Math.round(expT/salesT*100)+'%' : '0%' },
        { 항목: '(-) 매입 비용', 금액: -purT, 비율: salesT>0 ? Math.round(purT/salesT*100)+'%' : '0%' },
        { 항목: '순이익', 금액: net, 비율: salesT>0 ? Math.round(net/salesT*100)+'%' : '0%' },
      ];
      if (yoyRate != null) {
        lstProfitData.push({ 항목: '전년 대비', 금액: (yoyRate>=0?'+':'')+yoyRate+'%', 비율: yoyRate>=0?'증':'감' });
      }
      XLSX.utils.book_append_sheet(objWb, XLSX.utils.json_to_sheet(lstProfitData), '손익내역');

      // 월별 매출 시트
      const lstMonthlyData = months.map(m => {
        const objMo = byMo[m];
        return { 월: m, 매출: objMo.sales, 지출: objMo.exp, 순이익: objMo.sales - objMo.exp };
      });
      XLSX.utils.book_append_sheet(objWb, XLSX.utils.json_to_sheet(lstMonthlyData), '월별매출');

      // 매입 내역 시트
      const lstPurchaseData = filteredPurchase.map(p => ({
        날짜: p.date, 품목: p.item, 분류: p.category, 금액: p.total
      }));
      XLSX.utils.book_append_sheet(objWb, XLSX.utils.json_to_sheet(lstPurchaseData), '매입내역');

      XLSX.writeFile(objWb, strFileName);
    } catch (objErr) {
      console.error('엑셀 내보내기 오류:', objErr);
      alert('엑셀 파일 생성 중 오류가 발생했습니다.');
    }
  }, [year, month, salesT, expT, purT, net, yoyRate, months, byMo, filteredPurchase]);

  return (
    <div className="fade-in">
      <div className="toolbar">
        <input type="number" className="form-inp" value={year} onChange={e=>setYear(e.target.value)} min="2020" max="2030" style={{width:80}}/>
        {period==='monthly'   && <select className="form-inp" value={month} onChange={e=>setMonth(e.target.value)} style={{width:80}}>{['01','02','03','04','05','06','07','08','09','10','11','12'].map(m=><option key={m} value={m}>{m}월</option>)}</select>}
        {period==='quarterly' && <select className="form-inp" value={qtr} onChange={e=>setQtr(e.target.value)} style={{width:80}}>{[1,2,3,4].map(q=><option key={q} value={q}>{q}분기</option>)}</select>}
        {period==='semi'      && <select className="form-inp" value={half} onChange={e=>setHalf(e.target.value)} style={{width:100}}><option value="1">상반기</option><option value="2">하반기</option></select>}
        <div className="spacer"/>
        <span style={{fontSize:10,color:'var(--text3)'}}>{label}</span>
        <button className="btn-export" onClick={exportToExcel}>엑셀 내보내기</button>
      </div>

      <div className="cards">
        {[
          ['총 매출', fmt(salesT),  'var(--ok)'],
          ['영업 지출', fmt(expT),  'var(--warn)'],
          ['매입 비용', fmt(purT),  'var(--err)'],
          ['순이익',    fmt(net),   net>=0?'var(--ok)':'var(--err)'],
          ...(yoyRate!=null ? [['전년 대비', (yoyRate>=0?'+':'')+yoyRate+'%', yoyRate>=0?'var(--ok)':'var(--err)']] : []),
        ].map(([lb,vl,c],i)=>(
          <div className="card" key={i}><div className="card-bar" style={{background:c}}/><div className="card-lb">{lb}</div><div className="card-vl" style={{color:c,fontSize:16}}>{vl}</div></div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div className="pn" style={{padding:16}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--gold-light)'}}>손익 내역</div>
          <table className="tbl">
            <thead><tr><th>항목</th><th className="num">금액 (VND)</th><th className="num">비율</th></tr></thead>
            <tbody>
              <tr><td>매출 합계</td><td className="num" style={{color:'var(--ok)'}}>{fmt(salesT)}</td><td className="num">100%</td></tr>
              <tr><td>(-) 영업 지출</td><td className="num" style={{color:'var(--err)'}}>-{fmt(expT)}</td><td className="num">{salesT>0?Math.round(expT/salesT*100):0}%</td></tr>
              <tr><td>(-) 매입 비용</td><td className="num" style={{color:'var(--err)'}}>-{fmt(purT)}</td><td className="num">{salesT>0?Math.round(purT/salesT*100):0}%</td></tr>
              <tr style={{background:'var(--gold-glow)'}}><td style={{fontWeight:600}}>순이익</td><td className="num" style={{fontWeight:700,fontSize:13,color:net>=0?'var(--ok)':'var(--err)'}}>{fmt(net)}</td><td className="num" style={{fontWeight:600}}>{salesT>0?Math.round(net/salesT*100):0}%</td></tr>
            </tbody>
          </table>
          {filteredPurchase.length>0 && <>
            <div style={{fontSize:11,fontWeight:600,margin:'12px 0 6px',color:'var(--gold-light)'}}>매입 내역</div>
            <table className="tbl">
              <thead><tr><th>날짜</th><th>품목</th><th>분류</th><th className="num">금액</th></tr></thead>
              <tbody>{filteredPurchase.map((p,i)=>(
                <tr key={i}><td>{p.date}</td><td>{p.item}</td><td>{p.category}</td><td className="num">{fmt(p.total)}</td></tr>
              ))}</tbody>
            </table>
          </>}
        </div>
        {months.length>0 && (
          <div className="pn" style={{padding:16}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'var(--gold-light)'}}>월별 매출 현황</div>
            {months.map(m=>(
              <div key={m} className="month-bar-row">
                <div className="month-label">{m}</div>
                <div style={{flex:1}}>
                  <div className="bar-wrap">
                    <div className="bar-fill" style={{width:Math.round(byMo[m].sales/maxMoSales*100)+'%',background:'var(--gold)'}}/>
                  </div>
                </div>
                <div className="month-val" style={{color:'var(--gold-light)'}}>{fmt(byMo[m].sales)}</div>
                <div className="month-val" style={{color:'var(--err)',fontSize:9}}>-{fmt(byMo[m].exp)}</div>
              </div>
            ))}
            <div style={{marginTop:12,padding:'8px 0',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',fontSize:11}}>
              <span style={{color:'var(--text2)'}}>총 {months.length}개월 합계</span>
              <span style={{fontWeight:700,color:'var(--gold-light)'}}>{fmt(salesT)}</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [user,setUser]=useState(getUser());
  const [subTab,setSub]=useState(0);
  const [now,setNow]=useState(new Date());
  const [dark,setDark]=useState(()=>localStorage.getItem('hskb_theme')!=='light');

  useEffect(()=>{ if(!user){ window.location.href='PAGE_ERP.html'; return; } const t=setInterval(()=>setNow(new Date()),60000); return ()=>clearInterval(t); },[user]);
  useEffect(()=>{ document.body.classList.toggle('light',!dark); localStorage.setItem('hskb_theme',dark?'dark':'light'); },[dark]);

  if(!user) return null;
  const logout=()=>{ sessionStorage.removeItem('hskb_erp_user'); window.location.href='PAGE_ERP.html'; };

  const renderContent=()=>{ return <Settlement period={['monthly','quarterly','semi','annual'][subTab]}/>; };

  return (
    <React.Fragment>
      <style>{ CSS }{ CLOSING_CSS }</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-logo"><div className="mk">H</div><div className="nm">HWASA K-Beauty</div></div>
          <div className="hdr-nav">
            { ERP_PAGES.map(p=>(
              <a key={p.id} href={p.href} className={'hdr-tab'+(p.id==='closing'?' active':'')} style={{ textDecoration:'none' }}> <Ic d={p.icon} size={14}/>{ p.label }</a>
            )) }
          </div>
          <div className="hdr-right">
            <div className="hdr-date">{now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
            <button className="theme-btn" onClick={()=>setDark(!dark)}>
              {dark ? <Ic d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" size={15}/>
                : <Ic d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" size={15}/>
              }
            </button>
            <div className="hdr-user">
              <div className="av" style={{ background:user.color||'var(--gold)' }}>{user.initial||user.name?.charAt(0)}</div>
              <div><div className="nm">{user.name}</div><div className="rl">{user.role}</div></div>
            </div>
            <button className="btn-logout" onClick={logout}> 로그아웃</button>
          </div>
        </div>
        <div className="content">
          <div className="sub-tabs">{SUB_TABS.map((tab,i)=>(
            <div key={i} className={'sub-tab'+(subTab===i?' active':'')} onClick={()=>setSub(i)}>{ tab }</div>
          ))}</div>
          <div className="page" key={subTab}>{renderContent()}</div>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
