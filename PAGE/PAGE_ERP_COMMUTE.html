<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HWASA K-Beauty ERP - 출퇴근</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
  <script src="ERP_COMMON.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;
const SUB_TABS = ['월별 현황','직원별','근태 요약'];


/* ATTENDANCE */
.att-cal{border-collapse:collapse;font-size:9.5px;width:100%;}
.att-cal th{background:var(--bg-el);padding:5px 3px;border:1px solid var(--border);text-align:center;color:var(--text2);font-weight:600;position:sticky;top:0;z-index:5;}
.att-cal td{padding:2px;border:1px solid var(--border);text-align:center;font-variant-numeric:tabular-nums;height:26px;}
.att-cal .emp-name{background:var(--bg-el);font-weight:600;color:var(--gold-light);text-align:left;padding-left:6px;white-space:nowrap;position:sticky;left:0;z-index:3;}
.att-cal .in-t{color:var(--ok);font-size:8.5px;}
.att-cal .out-t{color:var(--info);font-size:8.5px;}

/* PAYSLIP */
.payslip{background:var(--bg-card);border:1px solid var(--border-gold);border-radius:var(--radius);padding:20px;max-width:480px;transition:background .3s;}
.payslip h3{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold-light);margin-bottom:3px;}
.payslip .period{font-size:10px;color:var(--text3);margin-bottom:14px;}
.payslip .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:11.5px;}
.payslip .row:last-child{border-bottom:none;}
.payslip .row .k{color:var(--text2);}
.payslip .row .v{font-weight:500;font-variant-numeric:tabular-nums;}
.payslip .total{border-top:2px solid var(--gold);margin-top:6px;padding-top:8px;}
.payslip .total .v{font-size:15px;font-weight:700;color:var(--gold-light);}

.fade-in{animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.toolbar{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.toolbar .spacer{flex:1;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--text3);font-size:12px;}
`;

function App() {
  const [user,setUser]=useState(getUser());
  const [subTab,setSub]=useState(0);
  const [now,setNow]=useState(new Date());
  const [dark,setDark]=useState(()=>localStorage.getItem('hskb_theme')!=='light');

  useEffect(()=>{ if(!user){ window.location.href='PAGE_ERP.html'; return; } const t=setInterval(()=>setNow(new Date()),60000); return ()=>clearInterval(t); },[user]);
  useEffect(()=>{ document.body.classList.toggle('light',!dark); localStorage.setItem('hskb_theme',dark?'dark':'light'); },[dark]);

  if(!user) return null;
  const logout=()=>{ sessionStorage.removeItem('hskb_erp_user'); window.location.href='PAGE_ERP.html'; };

  const renderContent=()=>{ return subTab===0?<AttendanceMonthly/>:subTab===1?<AttendanceByEmployee/>:<AttendanceSummary/>; };

  return (
    <React.Fragment>
      <style>{ CSS }</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-logo"><div className="mk">H</div><div className="nm">HWASA K-Beauty</div></div>
          <div className="hdr-nav">
            { ERP_PAGES.map(p=>(
              <a key={p.id} href={p.href} className={'hdr-tab'+(p.id==='commute'?' active':'')} style={{ textDecoration:'none' }}> <Ic d={p.icon} size={14}/>{ p.label }</a>
            )) }
          </div>
          <div className="hdr-right">
            <div className="hdr-date">{now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
            <button className="theme-btn" onClick={()=>setDark(!dark)}>
              {dark ? <Ic d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" size={15}/>
                : <Ic d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" size={15}/>
              }
            </button>
            <div className="hdr-user">
              <div className="av" style={{ background:user.color||'var(--gold)' }}>{user.initial||user.name?.charAt(0)}</div>
              <div><div className="nm">{user.name}</div><div className="rl">{user.role}</div></div>
            </div>
            <button className="btn-logout" onClick={logout}> 로그아웃</button>
          </div>
        </div>
        <div className="content">
          <div className="sub-tabs">{SUB_TABS.map((tab,i)=>(
            <div key={i} className={'sub-tab'+(subTab===i?' active':'')} onClick={()=>setSub(i)}>{ tab }</div>
          ))}</div>
          <div className="page" key={subTab}>{renderContent()}</div>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
