<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP | Hwasa K-Beauty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #FAFAF8;
            --color-bg-dark: #0A0A0A;
            --color-bg-cream: #F5F0EB;
            --color-text: #1A1A1A;
            --color-text-light: #F5F0EB;
            --color-accent: #B8956A;
            --color-accent-light: #D4B896;
            --color-muted: #8A8A8A;
            --color-border: rgba(26,26,26,0.12);
            --color-border-light: rgba(245,240,235,0.2);
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Noto Sans KR', sans-serif;
            --font-nav: 'Instrument Sans', sans-serif;
            --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font-body);
            background: var(--color-bg-dark);
            color: var(--color-text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; display: block; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--color-accent); border-radius: 2px; }
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 0 48px 0 20px; height: 80px;
            display: flex; align-items: center; justify-content: space-between;
            transition: none;
            border-bottom: none;
            background: transparent;
            
            border-color: transparent;
        }
        .logo { display: flex; align-items: center; gap: 12px;  flex-shrink: 0; }
        .logo-img { height: 68px; width: auto; filter: invert(1) brightness(2); transition: opacity 0.3s; }
        .nav { display: flex; align-items: center; gap: 20px; }
        .nav a {
            font-family: var(--font-nav); font-size: 12px; letter-spacing: 2px;
            text-transform: uppercase; color: #fff; transition: color 0.3s; font-weight: 700;
         white-space: nowrap; }
        .nav a:hover, .nav a.active { color: var(--color-accent); }
        .nav-cta {
            padding: 10px 24px; border: 1px solid var(--color-accent);
            color: var(--color-accent) !important; font-size: 11px !important;
            letter-spacing: 2px; transition: all 0.3s !important;
        }
        .nav-cta:hover { background: var(--color-accent); color: #fff !important; }
        .menu-toggle { display: none; flex-direction: column; gap: 6px; cursor: pointer; z-index: 1001; }
        .menu-toggle span { display: block; width: 28px; height: 1px; background: #fff; transition: all 0.3s; }
        .page-hero {
            padding: 96px 48px 24px; text-align: center;
            background: transparent;
        }
        .page-hero-label {
            font-family: var(--font-nav); font-size: 11px; letter-spacing: 6px;
            text-transform: uppercase; color: var(--color-accent-light); margin-bottom: 20px;
        }
        .page-hero-title {
            font-family: var(--font-display); font-size: clamp(36px, 5vw, 64px);
            font-weight: 300; color: #fff; line-height: 1.2; margin-bottom: 16px;
        }
        .page-hero-title em { font-style: italic; color: var(--color-accent-light); }
        .page-hero-desc {
            font-size: 15px; color: #fff; font-weight: 300;
            max-width: 500px; margin: 0 auto; line-height: 1.8;
        }
        .section { padding: 100px 48px; position: relative; }
        .section-dark { background: transparent; }
        .section-label {
            font-family: var(--font-nav); font-size: 11px; letter-spacing: 5px;
            text-transform: uppercase; color: var(--color-accent); margin-bottom: 20px;
        }
        .section-title {
            font-family: var(--font-display); font-size: clamp(28px, 3.5vw, 48px);
            font-weight: 300; line-height: 1.2; margin-bottom: 24px; color: #fff;
        }
        .section-title em { font-style: italic; }
        .section-desc {
            font-size: 15px; line-height: 1.9; font-weight: 300;
            color: #fff; max-width: 520px;
        }
        .divider-line { width: 48px; height: 1px; background: var(--color-accent); margin: 28px 0; }
        .section-header { text-align: center; margin-bottom: 64px; }
        .section-header .divider-line { margin: 28px auto; }
        .section-header .section-desc { margin: 0 auto; }
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s var(--ease-out); }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        @media (max-width: 1024px) {
        }
        @media (max-width: 768px) {
            .header { padding: 0 24px; height: 64px; }
            .nav { display: none; }
            .menu-toggle { display: flex; }
            .section { padding: 80px 20px; }
            .page-hero { padding: 88px 20px 16px; }
        }
        
        .erp-notice {
            max-width: 700px; margin: 0 auto; text-align: center;
            background: transparent; border: 1px solid rgba(255,255,255,0.08);
            padding: 60px 48px;
        }
        .erp-notice h3 {
            font-family: var(--font-display); font-size: 28px; font-weight: 300;
            color: #fff; margin-bottom: 16px;
        }
        .erp-notice p {
            font-size: 15px; color: #fff; font-weight: 300;
            line-height: 1.9; margin-bottom: 24px;
        }
        .erp-notice .icon {
            font-size: 48px; margin-bottom: 24px; display: block;
        }
        .erp-btn {
            display: inline-block; padding: 14px 36px; border: 1px solid var(--color-accent);
            color: var(--color-accent); font-family: var(--font-nav); font-size: 12px;
            letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s;
        }
        .erp-btn:hover { background: var(--color-accent); color: #fff; }

    
        .bg-video-wrap {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        .bg-video-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Scroll container: content only scrolls below header */
        html, body { overflow: hidden; height: 100%; margin: 0; }
        .scroll-container {
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 1;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-container { scrollbar-width: none; }
        
        /* FOOTER */
        .footer-slim { background: #111; border-top: 1px solid rgba(184,149,106,0.3); padding: 16px 0; }
        .footer-inner { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; font-size: 12px; color: rgba(255,255,255,0.5); }
        .footer-inner a { color: #B8956A; text-decoration: none; transition: color 0.3s; }
        .footer-inner a:hover { color: #d4b58a; }
        .footer-sep { color: rgba(255,255,255,0.2); }
        .footer-qr-slots, .footer-qr-placeholder, .footer-slim-inner, .footer-slim-links, .footer-copy { display: none !important; }

        
        /* RIGHT SIDEBAR */
        .side-nav { position:fixed; right:0; top: 80px; transform: none; z-index:100; display:flex; flex-direction:column; align-items:flex-end; gap:0; background:transparent; }
        .side-nav a { display:block; padding:12px 14px; font-family:var(--font-nav,'Montserrat',sans-serif); font-size:10px; letter-spacing:2px; color: #fff; text-decoration:none; transition:color 0.3s,background 0.3s; text-transform:uppercase; text-align:right; }
        .side-nav a:hover { color:#B8956A; background:rgba(0,0,0,0.3); }
        .footer-erp { margin-left:auto; }
        .footer-erp a { color:#888; text-decoration:none; font-size:11px; letter-spacing:1px; }
        .footer-erp a:hover { color:#B8956A; }

        </style>
</head>
<body>
    <div class="bg-video-wrap">
        <video muted playsinline preload="metadata" poster="video-poster.jpg" style="pointer-events:none;" onloadeddata="this.currentTime=0.5;this.pause();">
            <source src="bg-video.mp4" type="video/mp4">

    <header class="header" id="header">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Hwasa K-Beauty" class="logo-img">
        </a>
        <nav class="nav" id="nav">

        </nav>
        <div class="menu-toggle" id="menuToggle" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>
    <div class="side-nav" id="sideNav">
        <a href="academy.html">ACADEMY</a>
        <a href="shop.html">SHOP</a>
        <a href="contact.html">CONTACT</a>
    </div>
    <div class="scroll-container">

    <section class="page-hero">
        <p class="page-hero-label">Staff Only</p>
        <h1 class="page-hero-title">Internal <em>System</em></h1>

    <section class="section">
        <div class="erp-notice reveal">
            <span class="icon">🔐</span>

            <p>Hwasa K-Beauty 내부 운영 관리 시스템입니다.<br>직원 전용 페이지로 별도 로그인이 필요합니다.</p>

    <footer class="footer-slim">
        <div class="footer-inner">
            <span>© 2026 Hwasa K-Beauty</span>
            <span class="footer-sep">|</span>

            <span class="footer-erp"><a href="erp.html">ERP</a></span>
        </div>
    </footer>

    </div><!-- scroll-container -->
    <script>
        const revealElements = document.querySelectorAll('.reveal');
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
        revealElements.forEach(el => revealObserver.observe(el));
        function toggleMenu() {
            const nav = document.getElementById('nav');
            nav.style.display = nav.style.display === 'flex' ? 'none' : 'flex';
            if (window.innerWidth <= 768 && nav.style.display === 'flex') {
                nav.style.cssText = `
                    display: flex; flex-direction: column; position: fixed;
                    top: 0; left: 0; right: 0; bottom: 0;
                    background: transparent; z-index: 999;
                    align-items: center; justify-content: center; gap: 28px;
                `;
            }
        }
    </script>
</body>
