function CustomerRegister({onDone}) {
  const [form,setForm]=useState({name:'',nameEn:'',phone:'',gender:'여',birth:'',grade:'',area:'',memo:''});
  const up=(k,v)=>setForm(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!form.name||!form.phone){alert('이름과 연락처는 필수입니다.');return;}
    const list=await DataService.read('customers');
    const maxId=list.reduce((a,c)=>Math.max(a,parseInt(c.id.replace('C',''))||0),0);
    const newC={...form,id:'C'+String(maxId+1).padStart(3,'0'),firstVisit:today(),mileage:0,payments:[],history:[]};
    list.push(newC);await DataService.write('customers',list);
    alert(newC.name+' 고객이 등록되었습니다.');if(onDone)onDone(newC);
  };
  return (<div className="fade-in">
    <div className="pn" style={{padding:18}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>신규 고객 등록</div>

        <div className="form-g"><label className="form-l">영문/베트남명</label><input className="form-inp" value={form.nameEn} onChange={e=>up('nameEn',e.target.value)} placeholder="Hong Gildong"/></div>
        <div className="form-g"><label className="form-l">연락처 *</label><input className="form-inp" value={form.phone} onChange={e=>up('phone',e.target.value)} placeholder="0912-345-6789"/></div>
        <div className="form-g"><label className="form-l">성별</label><select className="form-inp" value={form.gender} onChange={e=>up('gender',e.target.value)}><option>여</option><option>남</option></select></div>
        <div className="form-g"><label className="form-l">생년월일</label><input type="date" className="form-inp" value={form.birth} onChange={e=>up('birth',e.target.value)}/></div>
        <div className="form-g"><label className="form-l">멤버 등급</label><select className="form-inp" value={form.grade} onChange={e=>up('grade',e.target.value)}>{MEMBER_GRADES.map(g=><option key={g} value={g}>{g||'(없음)'}</option>)}</select></div>
        <div className="form-g"><label className="form-l">거주 지역</label><input className="form-inp" value={form.area} onChange={e=>up('area',e.target.value)} placeholder="미딩"/></div>
        <div className="form-g"><label className="form-l">메모</label><input className="form-inp" value={form.memo} onChange={e=>up('memo',e.target.value)}/></div>
      </div>
      <button className="btn btn-g" onClick={save}>등록</button>
    </div>
  </div>);
}

/* ════════════════════════════════════════
   SALES DAILY INPUT — SPREADSHEET
   ════════════════════════════════════════ */
function SalesDailyInput() {
  const [selDate, setSelDate] = useState(today());
  const [data, setData] = useState({ rows: [], expenses: [] });

  const loadData = useCallback(async (date) => {
    const all = await DataService.read('sales');
    const d = all[date] || { rows: [], expenses: [] };
    if (d.rows.length === 0) d.rows = [mkSaleRow(1, date)];
    setData(d);
  }, []);
  useEffect(() => { loadData(selDate); }, [selDate, loadData]);

  const mkSaleRow = (no, date) => ({
    no, date, name:'', grade:'', service:'',
    hair:false, event:false, vip:false,
    deductAmt:0, deduct:0, tipDeduct:0,
    cash:0, deposit:0, card:0, krw:0, unpaid:0,
    male:'', female:'', ticket:'',
  });

  const upRow = (i, f, v) => setData(p => {
    const rows = [...p.rows]; rows[i] = { ...rows[i], [f]: v }; return { ...p, rows };
  });
  const addRow = () => setData(p => ({ ...p, rows: [...p.rows, mkSaleRow(p.rows.length+1, selDate)] }));
  const delRow = (i) => setData(p => ({ ...p, rows: p.rows.filter((_,j)=>j!==i).map((r,j)=>({...r,no:j+1})) }));
  const addExp = () => setData(p => ({ ...p, expenses: [...p.expenses, {item:'기타',amount:0,note:''}] }));
  const upExp = (i,f,v) => setData(p => { const e=[...p.expenses]; e[i]={...e[i],[f]:v}; return {...p,expenses:e}; });
  const delExp = (i) => setData(p => ({ ...p, expenses: p.expenses.filter((_,j)=>j!==i) }));
  const save = async () => { const all=await DataService.read('sales'); all[selDate]=data; await DataService.write('sales',all); alert('저장 완료'); };

  const totals = useMemo(() => {
    const r=data.rows; const sm=(f)=>r.reduce((a,x)=>a+(Number(x[f])||0),0);
    const expT=data.expenses.reduce((a,x)=>a+(Number(x.amount)||0),0);
    const inc=sm('cash')+sm('deposit')+sm('card')+sm('krw');
    return { dCnt:r.filter(x=>Number(x.deduct)>0).length, dAmt:sm('deductAmt'), tip:sm('tipDeduct'),
      cash:sm('cash'), dep:sm('deposit'), card:sm('card'), krw:sm('krw'), unpaid:sm('unpaid'),
      male:r.filter(x=>x.male).length, female:r.filter(x=>x.female).length, expT, inc, net:inc-expT };
  }, [data]);

  const cols = [
    {k:'no',l:'No',w:30,t:'ro'},{k:'name',l:'고객명',w:80,t:'tx'},{k:'grade',l:'멤버등급',w:75,t:'sel',opts:MEMBER_GRADES},
    {k:'service',l:'메뉴',w:130,t:'sel',opts:['',...MASTER.menuHead.filter(m=>m.active).map(m=>m.name)]},{k:'hair',l:'탈모',w:35,t:'chk'},{k:'event',l:'이벤트',w:40,t:'chk'},
    {k:'vip',l:'VIP',w:35,t:'chk'},{k:'deductAmt',l:'차감금액',w:80,t:'num'},{k:'deduct',l:'차감',w:55,t:'num'},
    {k:'tipDeduct',l:'팁차감',w:75,t:'num'},{k:'cash',l:'현금',w:85,t:'num'},{k:'deposit',l:'입금+10%',w:80,t:'num'},
    {k:'card',l:'카드',w:80,t:'num'},{k:'krw',l:'한국돈',w:75,t:'num'},{k:'unpaid',l:'미수',w:65,t:'num'},
    {k:'male',l:'남',w:30,t:'tx'},{k:'female',l:'여',w:30,t:'tx'},{k:'ticket',l:'TICKET',w:55,t:'tx'},
  ];

  return (
    <div className="fade-in">
      <div className="toolbar">
        <input type="date" className="form-inp" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{width:150}} />
        <span style={{fontSize:11,color:'var(--text2)'}}>{new Date(selDate+'T00:00').toLocaleDateString('ko-KR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</span>
        <div className="spacer" />
        <button className="btn btn-s" onClick={addRow}>+ 행 추가</button>
        <button className="btn btn-g" onClick={save}>저장</button>
      </div>
      <div className="ss-wrap">
        <table className="ss" style={{minWidth:1500}}>
          <thead><tr>{cols.map(c=><th key={c.k} style={{minWidth:c.w}}>{c.l}</th>)}<th style={{width:28}}>×</th></tr></thead>
          <tbody>
            {data.rows.map((row,ri)=>(
              <tr key={ri}>{cols.map(c=>(
                <td key={c.k} className={c.t==='num'?'nc':''}>
                  {c.t==='ro'?<div className="rn">{row.no}</div>
                  :c.t==='chk'?<div style={{textAlign:'center'}}><input type="checkbox" checked={!!row[c.k]} onChange={e=>upRow(ri,c.k,e.target.checked)}/></div>
                  :c.t==='sel'?<select value={row[c.k]||''} onChange={e=>upRow(ri,c.k,e.target.value)}>{c.opts.map(o=><option key={o} value={o}>{o||'-'}</option>)}</select>
                  :c.t==='num'?<input value={row[c.k]||''} onChange={e=>upRow(ri,c.k,e.target.value===''?0:Number(e.target.value.replace(/,/g,'')))} placeholder="0"/>
                  :<input value={row[c.k]||''} onChange={e=>upRow(ri,c.k,e.target.value)}/>}
                </td>
              ))}<td><button className="del-btn" onClick={()=>delRow(ri)}>×</button></td></tr>
            ))}
            <tr className="ss-total">
              <td colSpan={7} style={{textAlign:'right',paddingRight:8}}>합계</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.dAmt)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{totals.dCnt}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.tip)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.cash)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.dep)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.card)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.krw)}</td>
              <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(totals.unpaid)}</td>
              <td style={{textAlign:'center'}}>{totals.male}</td>
              <td style={{textAlign:'center'}}>{totals.female}</td>
              <td></td><td></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:10}}>
        <div className="exp-panel">
          <h4>지출 항목</h4>
          {data.expenses.map((exp,i)=>(
            <div key={i} className="exp-row">
              <select value={exp.item} onChange={e=>upExp(i,'item',e.target.value)}>{EXPENSE_ITEMS.map(it=><option key={it} value={it}>{it}</option>)}</select>
              <input value={exp.amount||''} placeholder="금액" onChange={e=>upExp(i,'amount',Number(e.target.value.replace(/,/g,''))||0)} style={{width:90}}/>
              <input value={exp.note||''} placeholder="비고" onChange={e=>upExp(i,'note',e.target.value)}/>
              <button onClick={()=>delExp(i)} style={{background:'none',border:'none',color:'var(--err)',cursor:'pointer',fontSize:13}}>×</button>
            </div>
          ))}
          <button className="btn btn-s" onClick={addExp} style={{marginTop:5}}>+ 지출 추가</button>
        </div>
        <div className="close-panel">
          <h4>일일 마감 집계</h4>
          <div className="close-grid">
            {[['차감횟수',totals.dCnt+'건'],['차감금액',fmt(totals.dAmt)],['팁차감',fmt(totals.tip)],
              ['현금',fmt(totals.cash)],['입금+10%',fmt(totals.dep)],['카드',fmt(totals.card)],
              ['한국돈',fmt(totals.krw)],['미수금',fmt(totals.unpaid)],
              ['총지출',fmt(totals.expT),'var(--err)'],['총수입',fmt(totals.inc),'var(--ok)'],
              ['남',totals.male+'명'],['여',totals.female+'명'],
            ].map(([k,v,c],i)=>(
              <div key={i} className="close-item"><span className="k">{k}</span><span className="v" style={c?{color:c}:{}}>{v}</span></div>
            ))}
            <div className="close-item" style={{gridColumn:'span 2',borderColor:'var(--border-gold)'}}>
              <span className="k">남은돈 (수입-지출)</span><span className="v" style={{fontSize:13}}>{fmt(totals.net)}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

    return {date:dt,cnt:d.rows.length,cash:sm('cash'),dep:sm('deposit'),card:sm('card'),krw:sm('krw'),unpaid:sm('unpaid'),exp:expT};});
  const gt=(f)=>mData.reduce((a,x)=>a+x[f],0);
  const totInc=gt('cash')+gt('dep')+gt('card')+gt('krw');

  return (<div className="fade-in">
    <div className="toolbar"><input type="month" className="form-inp" value={mo} onChange={e=>setMo(e.target.value)} style={{width:150}}/></div>

    </div>
    <div className="pn"><table className="tbl">

      <tbody>{mData.map(d=>{const inc=d.cash+d.dep+d.card+d.krw;return (<tr key={d.date}><td>{d.date}</td><td>{d.cnt}건</td><td className="num">{fmt(d.cash)}</td><td className="num">{fmt(d.dep)}</td><td className="num">{fmt(d.card)}</td><td className="num">{fmt(d.krw)}</td><td className="num">{fmt(d.unpaid)}</td><td className="num" style={{color:'var(--err)'}}>{fmt(d.exp)}</td><td className="num" style={{fontWeight:600,color:'var(--gold-light)'}}>{fmt(inc-d.exp)}</td></tr>);})}
        <tr style={{background:'var(--gold-glow)'}}><td style={{fontWeight:600}}>합계</td><td>{gt('cnt')}건</td><td className="num" style={{fontWeight:600}}>{fmt(gt('cash'))}</td><td className="num" style={{fontWeight:600}}>{fmt(gt('dep'))}</td><td className="num" style={{fontWeight:600}}>{fmt(gt('card'))}</td><td className="num" style={{fontWeight:600}}>{fmt(gt('krw'))}</td><td className="num" style={{fontWeight:600}}>{fmt(gt('unpaid'))}</td><td className="num" style={{fontWeight:600,color:'var(--err)'}}>{fmt(gt('exp'))}</td><td className="num" style={{fontWeight:700,color:'var(--gold-light)',fontSize:12}}>{fmt(totInc-gt('exp'))}</td></tr>

function PurchaseInput() {
  const [rows, setRows] = useState([]);

  const upRow = (i,f,v) => setRows(p=>{
    const r=[...p]; r[i]={...r[i],[f]:v};
    if(f==='qty'||f==='unitPrice') r[i].total = (Number(r[i].qty)||0) * (Number(r[i].unitPrice)||0);
    return r;
  });
  const addRow = () => setRows(p=>[...p, mkRow()]);
  const delRow = (i) => setRows(p=>p.filter((_,j)=>j!==i));
  const save = async () => { await DataService.write('purchase', rows); alert('저장 완료'); };

  const pCols = [
    {k:'date',l:'날짜',w:95,t:'date'},{k:'supplier',l:'공급처',w:110,t:'sel',opts:['',...MASTER.suppliers.filter(s=>s.active).map(s=>s.name)]},{k:'item',l:'품목',w:120,t:'tx'},
    {k:'category',l:'분류',w:80,t:'sel',opts:PURCHASE_CATS},{k:'qty',l:'수량',w:55,t:'num'},
    {k:'unitPrice',l:'단가(VND)',w:95,t:'num'},{k:'total',l:'합계',w:100,t:'ro_num'},{k:'note',l:'비고',w:100,t:'tx'},
  ];

  const grandTotal = rows.reduce((a,x)=>a+(x.total||0),0);

  return (<div className="fade-in">
    <div className="toolbar">
      <span style={{fontSize:12,fontWeight:600}}>매입 입력</span>
      <div className="spacer"/>
      <button className="btn btn-s" onClick={addRow}>+ 행 추가</button>
      <button className="btn btn-g" onClick={save}>저장</button>
    </div>
    <div className="ss-wrap">
      <table className="ss" style={{minWidth:900}}>
        <thead><tr><th style={{width:30}}>No</th>{pCols.map(c=><th key={c.k} style={{minWidth:c.w}}>{c.l}</th>)}<th style={{width:28}}>×</th></tr></thead>
        <tbody>
          {rows.map((row,ri)=>(
            <tr key={ri}>
              <td className="rn">{ri+1}</td>
              {pCols.map(c=>(
                <td key={c.k} className={c.t==='num'||c.t==='ro_num'?'nc':''}>
                  {c.t==='ro_num'?<div style={{padding:'3px 5px',textAlign:'right',color:'var(--gold-light)',fontWeight:600,fontSize:10.5}}>{fmt(row[c.k])}</div>
                  :c.t==='date'?<input type="date" value={row[c.k]||''} onChange={e=>upRow(ri,c.k,e.target.value)}/>
                  :c.t==='sel'?<select value={row[c.k]||''} onChange={e=>upRow(ri,c.k,e.target.value)}>{c.opts.map(o=><option key={o} value={o}>{o}</option>)}</select>
                  :c.t==='num'?<input value={row[c.k]||''} onChange={e=>upRow(ri,c.k,e.target.value===''?0:Number(e.target.value.replace(/,/g,'')))} placeholder="0"/>
                  :<input value={row[c.k]||''} onChange={e=>upRow(ri,c.k,e.target.value)}/>}
                </td>

              <td><button className="del-btn" onClick={()=>delRow(ri)}>×</button></td>
            </tr>
          ))}
          {rows.length>0 && <tr className="ss-total">
            <td colSpan={6} style={{textAlign:'right',paddingRight:8}}>합계</td>
            <td style={{padding:'5px 6px',textAlign:'right'}}>{fmt(grandTotal)}</td>
            <td></td><td></td>

/* ════════════════════════════════════════
   SETTLEMENT
   ════════════════════════════════════════ */
function Settlement({period}) {
  const [sales,setSales]=useState({});const [purchase,setPurchase]=useState([]);
  useEffect(()=>{DataService.read('sales').then(setSales);DataService.read('purchase').then(setPurchase);},[]);
  const dates=Object.keys(sales).sort();
  const salesT=dates.reduce((a,d)=>{const rows=sales[d]?.rows||[];return a+rows.reduce((b,r)=>b+(Number(r.cash)||0)+(Number(r.deposit)||0)+(Number(r.card)||0)+(Number(r.krw)||0),0);},0);
  const expT=dates.reduce((a,d)=>a+(sales[d]?.expenses||[]).reduce((b,e)=>b+(Number(e.amount)||0),0),0);
  const purT=purchase.reduce((a,p)=>a+(p.total||0),0);const net=salesT-expT-purT;
  const labels={monthly:'월말 결산',quarterly:'분기 결산',semi:'반기 결산',annual:'년간 결산'};
  return (<div className="fade-in">
    <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,marginBottom:14,color:'var(--gold-light)'}}>{labels[period]}</h3>
    <div className="cards">
      {[['총 매출',fmt(salesT),'var(--ok)'],['영업 지출',fmt(expT),'var(--warn)'],['매입 비용',fmt(purT),'var(--err)'],['순이익',fmt(net),net>=0?'var(--ok)':'var(--err)']].map(([lb,vl,c],i)=>(
        <div className="card" key={i}><div className="card-bar" style={{background:c}}/><div className="card-lb">{lb}</div><div className="card-vl" style={{color:c}}>{vl}</div></div>
      ))}
    </div>
    <div className="pn" style={{padding:16}}>
      <div style={{fontSize:11,color:'var(--text2)',marginBottom:10}}>기간: {dates[0]||'-'} ~ {dates[dates.length-1]||'-'} ({dates.length}일)</div>
      <table className="tbl"><thead><tr><th>항목</th><th className="num">금액 (VND)</th><th className="num">비율</th></tr></thead>
      <tbody>
        <tr><td>매출 합계</td><td className="num" style={{color:'var(--ok)'}}>{fmt(salesT)}</td><td className="num">100%</td></tr>
        <tr><td>(-) 영업 지출</td><td className="num" style={{color:'var(--err)'}}>-{fmt(expT)}</td><td className="num">{salesT>0?Math.round(expT/salesT*100):0}%</td></tr>
        <tr><td>(-) 매입 비용</td><td className="num" style={{color:'var(--err)'}}>-{fmt(purT)}</td><td className="num">{salesT>0?Math.round(purT/salesT*100):0}%</td></tr>
        <tr style={{background:'var(--gold-glow)'}}><td style={{fontWeight:600}}>순이익</td><td className="num" style={{fontWeight:700,fontSize:13,color:net>=0?'var(--ok)':'var(--err)'}}>{fmt(net)}</td><td className="num" style={{fontWeight:600}}>{salesT>0?Math.round(net/salesT*100):0}%</td></tr>
      </tbody></table>
    </div></div>);
}

      const totH=days.reduce((a,d)=>{const r=ed[d];if(!r)return a;const [ih,im]=r.in.split(':').map(Number);const [oh,om]=r.out.split(':').map(Number);return a+(oh+om/60)-(ih+im/60);},0);
      return (<tr key={emp.name}><td style={{fontWeight:500}}>{emp.nameKr}</td><td>{emp.position}</td><td className="num">{days.length}일</td><td className="num">{totH.toFixed(1)}h</td>
        <td className="num">{days.length>0?(totH/days.length).toFixed(1):'0'}h</td><td className="num">{fmt(emp.hourly)}</td><td className="num" style={{fontWeight:600,color:'var(--gold-light)'}}>{fmt(Math.round(totH*emp.hourly))}</td></tr>);
    })}</tbody></table></div></div>);
}

/* ════════════════════════════════════════

function SalaryCalc() {
  const [att,setAtt]=useState({});const [con,setCon]=useState([]);const [mo,setMo]=useState('2026-03');
  useEffect(()=>{DataService.read('attendance').then(setAtt);DataService.read('contracts').then(setCon);},[]);
  const md=att[mo]||{};
  return (<div className="fade-in">
    <div className="toolbar"><input type="month" className="form-inp" value={mo} onChange={e=>setMo(e.target.value)} style={{width:150}}/><div className="spacer"/><button className="btn btn-g">급여 확정</button></div>
    <div className="pn"><div className="pn-h"><div><div className="pn-t">급여 계산</div><div className="pn-st">{mo}</div></div></div>
    <table className="tbl"><thead><tr><th>직원</th><th className="num">출근일</th><th className="num">근무시간</th><th className="num">기본급</th><th className="num">시간급</th><th className="num">공제</th><th className="num">지급액</th></tr></thead>
    <tbody>{EMPLOYEES.map(emp=>{const ed=md[emp.name]||{};const days=Object.keys(ed);
      const totH=days.reduce((a,d)=>{const r=ed[d];if(!r)return a;const [ih,im]=r.in.split(':').map(Number);const [oh,om]=r.out.split(':').map(Number);return a+(oh+om/60)-(ih+im/60);},0);
      const ct=con.find(c=>c.employee===emp.name);const base=ct?.baseSalary||emp.base;const hPay=Math.round(totH*emp.hourly);const ded=Math.round(base*0.035);const net=base-ded;
      return (<tr key={emp.name}><td style={{fontWeight:500}}>{emp.nameKr} <span style={{color:'var(--text3)',fontSize:9}}>({emp.name})</span></td>
        <td className="num">{days.length}일</td><td className="num">{totH.toFixed(1)}h</td><td className="num">{fmt(base)}</td><td className="num">{fmt(hPay)}</td>
        <td className="num" style={{color:'var(--err)'}}>-{fmt(ded)}</td><td className="num" style={{fontWeight:700,color:'var(--gold-light)',fontSize:12}}>{fmt(net)}</td></tr>);
    })}</tbody></table></div></div>);
}

function SalaryPayslip() {
  const [list,setList]=useState([]);const [idx,setIdx]=useState(0);

/* ════════════════════════════════════════
   MASTER — 마스터정보 관리
   ════════════════════════════════════════ */
function MasterTable({title,dataKey,columns,initRow}) {
  const [rows,setRows]=useState([]);
  useEffect(()=>{DataService.read('master').then(m=>setRows(m[dataKey]||[]));},[dataKey]);
  const up=(i,f,v)=>setRows(p=>{const r=[...p];r[i]={...r[i],[f]:v};return r;});
  const add=()=>setRows(p=>[...p,initRow(p.length)]);
  const del=(i)=>setRows(p=>p.filter((_,j)=>j!==i));
  const save=async()=>{const m=await DataService.read('master');m[dataKey]=rows;await DataService.write('master',m);
    // 동기화: MASTER 객체 업데이트
    MASTER[dataKey]=JSON.parse(JSON.stringify(rows));
    alert('저장 완료');};
  return (<div className="fade-in">
    <div className="toolbar"><span style={{fontSize:12,fontWeight:600}}>{title}</span><span style={{fontSize:10,color:'var(--text3)',marginLeft:8}}>{rows.length}건</span><div className="spacer"/><button className="btn btn-s" onClick={add}>+ 추가</button><button className="btn btn-g" onClick={save}>저장</button></div>
    <div className="ss-wrap"><table className="ss" style={{minWidth:columns.reduce((a,c)=>a+c.w,0)+60}}>
      <thead><tr><th style={{width:30}}>No</th>{columns.map(c=><th key={c.k} style={{minWidth:c.w}}>{c.l}</th>)}<th style={{width:28}}>×</th></tr></thead>
      <tbody>{rows.map((row,ri)=><tr key={ri}><td className="rn">{ri+1}</td>
        {columns.map(c=><td key={c.k} className={c.t==='num'?'nc':''}>
          {c.t==='bool'?<div style={{textAlign:'center'}}><input type="checkbox" checked={!!row[c.k]} onChange={e=>up(ri,c.k,e.target.checked)}/></div>
          :c.t==='sel'?<select value={row[c.k]||''} onChange={e=>up(ri,c.k,e.target.value)}>{c.opts.map(o=><option key={o} value={o}>{o}</option>)}</select>
          :c.t==='num'?<input value={row[c.k]||''} onChange={e=>up(ri,c.k,e.target.value===''?0:Number(e.target.value.replace(/,/g,'')))} placeholder="0"/>
          :<input value={row[c.k]||''} onChange={e=>up(ri,c.k,e.target.value)}/>}
        </td>)}
        <td><button className="del-btn" onClick={()=>del(ri)}>×</button></td></tr>)}
      </tbody></table></div>
  </div>);
}

/* ════════════════════════════════════════

function App() {
  const [user,setUser]=useState(getUser);
  const [menu,setMenu]=useState('sales');
  const [subTab,setSub]=useState(0);
  const [now,setNow]=useState(new Date());
  const [dark,setDark]=useState(()=>localStorage.getItem('hskb_theme')!=='light');
  const [selCustomer,setSelCustomer]=useState(null);

  useEffect(()=>{
    if(!user){window.location.href='PAGE_ERP.html';return;}
    const t=setInterval(()=>setNow(new Date()),60000);
    const sp=document.getElementById('splash');
    if(sp){sp.style.opacity='0';setTimeout(()=>sp.remove(),500);}
    return ()=>clearInterval(t);
  },[user]);

  useEffect(()=>{
    document.body.classList.toggle('light',!dark);
    localStorage.setItem('hskb_theme',dark?'dark':'light');
  },[dark]);

  if(!user) return null;

  const go=(id)=>{setMenu(id);setSub(0);};
  const logout=()=>{localStorage.removeItem('hskb_erp_user');window.location.href='PAGE_ERP.html';};

  const renderContent=()=>{
    switch(menu){
      case 'master': return subTab===0?<MasterProgram/>:subTab===1?<MasterMenuHead/>:subTab===2?<MasterMenuBody/>:subTab===3?<MasterEvents/>:subTab===4?<MasterEmployees/>:subTab===5?<MasterGrades/>:subTab===6?<MasterExpenseItems/>:subTab===7?<MasterPurchaseCats/>:subTab===8?<MasterSuppliers/>:<CustomerRegister onDone={()=>{}}/>;
      case 'customer': return subTab===0?<CustomerList onSelect={c=>{setSelCustomer(c);setSub(1);}}/>:<CustomerDetail customer={selCustomer} onBack={()=>setSub(0)}/>;
      case 'sales': return subTab===0?<SalesDailyInput/>:subTab===1?<SalesList/>:<SalesMonthlySummary/>;
      case 'purchase': return subTab===0?<PurchaseInput/>:subTab===1?<PurchaseList/>:<PurchaseStats/>;
      case 'settlement': return <Settlement period={['monthly','quarterly','semi','annual'][subTab]}/>;
      case 'contracts': return subTab===0?<ContractList/>:subTab===1?<ContractAdd/>:<ContractExpiry/>;
      case 'attendance': return subTab===0?<AttendanceMonthly/>:subTab===1?<AttendanceByEmployee/>:<AttendanceSummary/>;
      case 'salary': return subTab===0?<SalaryCalc/>:subTab===1?<SalaryHistory/>:<SalaryPayslip/>;
      default: return null;
    }
  };

  return (
    <ThemeCtx.Provider value={{dark,setDark}}>
      <style>{CSS}</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-logo"><div className="mk">H</div><div className="nm">HWASA K-Beauty</div></div>
          <div className="hdr-nav">
            {MENUS.map(m=>(<div key={m.id} className={`hdr-tab ${menu===m.id?'active':''}`} onClick={()=>go(m.id)}><Ic d={m.icon} size={14}/>{m.label}</div>))}
          </div>
          <div className="hdr-right">
            <div className="hdr-date">{now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
            <button className="theme-btn" onClick={()=>setDark(!dark)} title={dark?'라이트 모드':'다크 모드'}>
              {dark ? <Ic d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" size={15}/> : <Ic d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" size={15}/>}
            </button>
            <div className="hdr-user">
              <div className="av" style={{background:user.color||'var(--gold)'}}>{user.initial||user.name?.charAt(0)}</div>
              <div><div className="nm">{user.name}</div><div className="rl">{user.role}</div></div>
            </div>
            <button className="btn-logout" onClick={logout}>로그아웃</button>
          </div>
        </div>
        <div className="content">
          <div className="sub-tabs">{SUB_TABS[menu].map((tab,i)=>(<div key={i} className={`sub-tab ${subTab===i?'active':''}`} onClick={()=>setSub(i)}>{tab}</div>))}</div>
          <div className="page" key={menu+'-'+subTab}>{renderContent()}</div>
        </div>
      </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
