<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hwasa K-Beauty | Premium Korean Skin Care in Hanoi</title>
  <meta name="description" content="하노이 미딩에 위치한 프리미엄 한국식 피부관리 전문샵. 22년 경력의 전문가가 제공하는 정통 메디컬 스킨케어."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
  <style>
:root {
  --accent:#B8956A;--accent-light:#D4B896;--accent-dark:#A07D56;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-body:'Noto Sans KR',sans-serif;
  --font-nav:'Instrument Sans',sans-serif;
  --ease:cubic-bezier(0.25,0.46,0.45,0.94);--ease-out:cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;scroll-behavior:smooth;}
body{font-family:var(--font-body);background:#000;color:#fff;line-height:1.6;overflow:hidden;height:100%;}
a{text-decoration:none;color:inherit;}
button{border:none;background:none;cursor:pointer;font-family:inherit;}
img{max-width:100%;display:block;}
#root{height:100%;}

/* BG */
.bg-video-wrap{position:fixed;inset:0;z-index:-2;overflow:hidden;}
.bg-video-wrap video{width:100%;height:100%;object-fit:cover;}
.bg-overlay{position:fixed;inset:0;z-index:-1;pointer-events:none;}
.bg-overlay-static{background:radial-gradient(ellipse 70% 60% at 50% 45%,rgba(0,0,0,0.82) 0%,rgba(0,0,0,0.6) 35%,rgba(0,0,0,0.35) 60%,rgba(0,0,0,0.18) 80%,rgba(0,0,0,0.08) 100%);}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 48px 0 20px;height:80px;display:flex;align-items:center;justify-content:space-between;background:transparent;}
.logo-img{height:68px;width:auto;filter:invert(1) brightness(2);transition:opacity .3s;cursor:pointer;}
.nav{display:flex;align-items:center;gap:20px;}
.nav a,.nav-link{font-family:var(--font-nav);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#fff;transition:color .3s;font-weight:700;cursor:pointer;background:none;border:none;white-space:nowrap;}
.nav a:hover,.nav-link:hover,.nav a.active,.nav-link.active{color:var(--accent);}
.nav-cta{padding:10px 24px;border:1px solid var(--accent);color:var(--accent)!important;font-size:11px!important;}
.nav-cta:hover{background:var(--accent);color:#fff!important;}
.menu-toggle{display:none;flex-direction:column;gap:6px;cursor:pointer;z-index:1001;background:none;border:none;}
.menu-toggle span{display:block;width:28px;height:1px;background:#fff;transition:all .3s;}

/* SIDE NAV */
.side-nav{position:fixed;right:0;top:80px;z-index:100;display:flex;flex-direction:column;align-items:flex-end;gap:0;background:transparent;}
.side-nav a,.side-link{display:block;padding:12px 14px;font-family:var(--font-nav);font-size:10px;letter-spacing:2px;color:#fff;text-decoration:none;transition:color .3s,background .3s;text-transform:uppercase;text-align:right;cursor:pointer;background:none;border:none;}
.side-link:hover{color:var(--accent);background:rgba(0,0,0,.3);}

/* SCROLL CONTAINER */
.scroll-ct{position:fixed;top:80px;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;z-index:1;}
.scroll-ct::-webkit-scrollbar{display:none;}.scroll-ct{scrollbar-width:none;}

/* FOOTER */
.footer-slim{position:fixed;bottom:0;left:0;right:0;z-index:100;background:transparent;padding:16px 0;}
.footer-inner{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;font-family:var(--font-nav);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;}
.footer-inner a,.footer-link{color:#fff;text-decoration:none;transition:color .3s;cursor:pointer;background:none;border:none;font-family:var(--font-nav);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.footer-inner a:hover,.footer-link:hover{color:var(--accent);}
.footer-sep{color:rgba(255,255,255,.4);}

/* COMMON */
.section{max-width:1100px;margin:0 auto;padding:80px 48px;}
.section-label{font-family:var(--font-nav);font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--accent-light);margin-bottom:12px;}
.section-title{font-family:var(--font-display);font-size:clamp(28px,4vw,48px);font-weight:300;color:#fff;margin-bottom:8px;line-height:1.2;}
.section-title em{font-style:italic;color:var(--accent-light);}
.section-desc{font-size:14px;color:#fff;font-weight:300;max-width:600px;line-height:1.8;margin-bottom:24px;}
.divider-line{width:40px;height:1px;background:var(--accent);margin:20px 0;}
.btn-primary{display:inline-block;padding:14px 36px;background:var(--accent);color:#fff;font-family:var(--font-nav);font-size:12px;letter-spacing:2px;text-transform:uppercase;transition:background .3s;cursor:pointer;border:none;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-outline{display:inline-block;padding:14px 36px;border:1px solid rgba(255,255,255,.3);color:#fff;font-family:var(--font-nav);font-size:12px;letter-spacing:2px;text-transform:uppercase;transition:all .3s;cursor:pointer;background:transparent;}
.btn-outline:hover{background:#fff;color:#000;}
.reveal{opacity:0;transform:translateY(40px);transition:opacity .8s var(--ease),transform .8s var(--ease);}
.reveal.visible{opacity:1;transform:none;}

/* STATS */
.stats-bar{display:flex;justify-content:center;gap:48px;padding:40px 0;flex-wrap:wrap;}
.stat-item{text-align:center;}
.stat-num{font-family:var(--font-display);font-size:42px;font-weight:300;color:var(--accent-light);letter-spacing:2px;}
.stat-label{font-family:var(--font-nav);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-top:4px;}

/* SERVICE CARDS */
.service-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:32px;}
.service-card{border:1px solid rgba(255,255,255,.08);padding:40px 28px;transition:border-color .3s,transform .3s;cursor:default;}
.service-card:hover{border-color:var(--accent);transform:translateY(-4px);}
.service-num{font-family:var(--font-nav);font-size:10px;letter-spacing:3px;color:var(--accent);margin-bottom:16px;}
.service-name{font-family:var(--font-display);font-size:22px;font-weight:400;margin-bottom:10px;}
.service-desc{font-size:13px;color:rgba(255,255,255,.8);line-height:1.7;}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:280px 1fr;gap:48px;align-items:center;}
.about-img{width:250px;height:250px;border-radius:50%;overflow:hidden;border:2px solid var(--accent);margin:0 auto;}
.about-img img{width:100%;height:100%;object-fit:cover;}
.about-name{font-family:var(--font-display);font-size:28px;font-weight:400;margin-bottom:8px;}
.about-text{font-size:14px;line-height:2;color:rgba(255,255,255,.85);}

/* DIPLOMA */
.diploma-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-top:24px;}
.diploma-card{border:1px solid rgba(255,255,255,.08);overflow:hidden;cursor:pointer;transition:border-color .3s,transform .3s;}
.diploma-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.diploma-card img{width:100%;aspect-ratio:4/3;object-fit:cover;}
.diploma-caption{padding:10px 12px;font-size:11px;color:rgba(255,255,255,.7);}
.diploma-caption strong{color:#fff;display:block;margin-bottom:2px;}

/* PROGRAM */
.prog-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;}
.prog-tab{font-family:var(--font-nav);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;border:1px solid rgba(184,149,106,.3);border-radius:20px;color:#fff;cursor:pointer;transition:all .25s;background:transparent;}
.prog-tab:hover,.prog-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.prog-card{border:1px solid rgba(255,255,255,.08);padding:24px;transition:border-color .3s;}
.prog-card:hover{border-color:var(--accent);}
.prog-card h3{font-family:var(--font-display);font-size:20px;font-weight:300;margin-bottom:8px;}
.prog-card h3 em{color:var(--accent-light);font-style:italic;}
.prog-card p{font-size:12px;color:#fff;line-height:1.7;margin-bottom:12px;}
.prog-tag{display:inline-block;font-family:var(--font-nav);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border:1px solid rgba(184,149,106,.3);color:var(--accent);border-radius:20px;margin:0 4px 4px 0;}
.prog-price{font-size:13px;font-weight:600;color:var(--accent-light);margin-top:10px;}

/* SHOP */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;}
.product-card{border:1px solid rgba(255,255,255,.08);overflow:hidden;transition:border-color .3s;}
.product-card:hover{border-color:var(--accent);}
.product-img{height:200px;background:#070707;display:flex;align-items:center;justify-content:center;font-size:56px;}
.product-body{padding:20px;}
.product-name{font-family:var(--font-display);font-size:18px;margin-bottom:6px;}
.product-desc-text{font-size:12px;color:#fff;line-height:1.7;margin-bottom:10px;}
.product-price{font-family:var(--font-nav);font-size:16px;font-weight:600;color:var(--accent);}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;}
.contact-card{border:1px solid rgba(255,255,255,.08);padding:24px;}
.contact-card h3{font-family:var(--font-nav);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.contact-info{font-size:13px;line-height:2;color:#fff;}
.contact-link{color:var(--accent-light);text-decoration:underline;}

/* TV FRAME (selfbeauty) */
.tv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:24px;}
.tv-wrap{position:relative;background:linear-gradient(145deg,#c7a78a,#e8d5c0,#b8956a,#d4b896);border-radius:18px;padding:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.tv-screen{border-radius:10px;overflow:hidden;background:#000;}
.tv-screen video{display:block;width:100%;aspect-ratio:9/16;object-fit:cover;}
.tv-empty{width:100%;aspect-ratio:9/16;background:#070707;display:flex;align-items:center;justify-content:center;}
.tv-plus{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.07);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;}

/* MARBLE (letter) */
.marble-grid{display:flex;flex-direction:column;gap:40px;max-width:700px;margin:0 auto;}
.marble-frame{background:linear-gradient(135deg,#e8e4de,#d4cfc6,#f0ece6,#c8c0b4);border-radius:6px;padding:16px;box-shadow:0 12px 40px rgba(0,0,0,.4);}
.marble-inner{border:2px solid rgba(184,149,106,.4);border-radius:2px;overflow:hidden;}
.marble-inner video{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}

/* TIMELINE */
.timeline{position:relative;max-width:700px;margin:0 auto;padding:20px 0;}
.timeline::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(184,149,106,.3);transform:translateX(-50%);}
.tl-item{display:flex;margin-bottom:28px;position:relative;}
.tl-item:nth-child(odd){flex-direction:row-reverse;text-align:right;}
.tl-content{width:45%;padding:16px;}
.tl-year{font-family:var(--font-nav);font-size:11px;letter-spacing:3px;color:var(--accent);margin-bottom:4px;}
.tl-title{font-size:14px;font-weight:500;margin-bottom:4px;}
.tl-desc{font-size:12px;color:rgba(255,255,255,.7);line-height:1.6;}
.tl-dot{position:absolute;left:50%;top:20px;width:10px;height:10px;border-radius:50%;background:var(--accent);transform:translateX(-50%);z-index:2;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;}

/* MOBILE */
.mobile-menu{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:28px;}
.mobile-menu.open{display:flex;}
.mobile-menu a,.mobile-menu button{font-family:var(--font-nav);font-size:18px;color:#fff;letter-spacing:2px;text-transform:uppercase;font-weight:700;background:none;border:none;cursor:pointer;}
.mobile-menu a:hover,.mobile-menu button:hover{color:var(--accent);}

/* LOADER */
.loader-wrap{position:fixed;inset:0;z-index:3000;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s;}
.loader-text{font-family:var(--font-display);font-size:24px;font-weight:300;color:#fff;letter-spacing:4px;margin-bottom:16px;}
.loader-bar{width:200px;height:2px;background:rgba(255,255,255,.1);overflow:hidden;border-radius:1px;}
.loader-fill{height:100%;background:var(--accent);width:0;transition:width 1.5s var(--ease);}

@media(max-width:1024px){.service-grid{grid-template-columns:1fr 1fr;}.about-grid{grid-template-columns:1fr;text-align:center;}.contact-grid{grid-template-columns:1fr;}}
@media(max-width:768px){.nav{display:none;}.menu-toggle{display:flex;}.section{padding:60px 24px;}.service-grid{grid-template-columns:1fr;}.stats-bar{gap:24px;}.header{padding:0 20px;}.side-nav{display:none;}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo,createContext,useContext} = React;

/* ═══ ROUTER ═══ */
const useHash = () => {
  const [hash,setHash] = useState(window.location.hash.slice(1)||'/');
  useEffect(()=>{const h=()=>setHash(window.location.hash.slice(1)||'/');window.addEventListener('hashchange',h);return()=>window.removeEventListener('hashchange',h);},[]);
  return hash;
};
const navigate = (path) => { window.location.hash = path; };

/* ═══ CONSTANTS ═══ */
const NAV_ITEMS = [
  {path:'/',label:'Home'},{path:'/diploma',label:'Diploma'},{path:'/program',label:'Program'},
  {path:'/selfbeauty',label:'Self Beauty'},{path:'/echart',label:'E-Chart'},
  {path:'/letter',label:'Letter'},{path:'/about',label:'About'},
];
const SIDE_ITEMS = [{path:'/academy',label:'Academy'},{path:'/shop',label:'Shop'},{path:'/contact',label:'Contact'}];

const STATS = [{num:22,suffix:'+',label:'Years of Experience'},{num:3500,suffix:'+',label:'Satisfied Clients'},{num:15,suffix:'+',label:'Specialized Treatments'},{num:98,suffix:'%',label:'Client Satisfaction'}];

const SERVICES = [
  {num:'01',name:'페이셜 케어',desc:'모공, 주름, 색소 등 피부 고민별 맞춤 관리'},
  {num:'02',name:'바디 마사지',desc:'한국식 경락 마사지와 아로마 테라피'},
  {num:'03',name:'특수 관리',desc:'리프팅, 재생, 미백 등 전문 메디컬 케어'},
];

/* ═══ BACKGROUND ═══ */
function Background({isHome}) {
  return (<>
    <div className="bg-video-wrap">
      {isHome
        ? <video autoPlay muted loop playsInline><source src="../bg-video.mp4" type="video/mp4"/></video>
        : <video muted playsInline preload="metadata" poster="../video-poster.jpg"
            ref={el=>{if(el){el.currentTime=0.5;el.pause();}}}><source src="../bg-video.mp4" type="video/mp4"/></video>}
    </div>
    {!isHome && <div className="bg-overlay bg-overlay-static"/>}
  </>);
}

/* ═══ HEADER ═══ */
function Header({current}) {
  const [menuOpen,setMenuOpen] = useState(false);
  return (<>
    <header className="header">
      <img src="../logo.png" alt="Hwasa K-Beauty" className="logo-img" onClick={()=>navigate('/')}/>
      <nav className="nav">
        {NAV_ITEMS.map(n=>(
          <button key={n.path} className={`nav-link ${current===n.path?'active':''}`} onClick={()=>navigate(n.path)}>{n.label}</button>
        ))}
        <button className="nav-link nav-cta" onClick={()=>navigate('/echart')}>상담 예약</button>
      </nav>
      <button className="menu-toggle" onClick={()=>setMenuOpen(!menuOpen)}><span/><span/><span/></button>
    </header>
    <div className={`mobile-menu ${menuOpen?'open':''}`}>
      {[...NAV_ITEMS,...SIDE_ITEMS].map(n=>(
        <button key={n.path} onClick={()=>{navigate(n.path);setMenuOpen(false);}}>{n.label}</button>
      ))}
    </div>
  </>);
}

/* ═══ SIDEBAR ═══ */
function Sidebar({current}) {
  return (<div className="side-nav">
    {SIDE_ITEMS.map(s=>(
      <button key={s.path} className="side-link" style={current===s.path?{color:'var(--accent)'}:{}} onClick={()=>navigate(s.path)}>{s.label}</button>
    ))}
  </div>);
}

/* ═══ FOOTER ═══ */
function Footer() {
  return (<footer className="footer-slim"><div className="footer-inner">
    <span>&copy; 2026 Hwasa K-Beauty</span>
    <span className="footer-sep">|</span>
    <a href="https://www.instagram.com/hwasa_k_beauty/" target="_blank" rel="noreferrer">Instagram</a>
    <span className="footer-sep">|</span>
    <a href="https://open.kakao.com/o/suDPpihg" target="_blank" rel="noreferrer">KakaoTalk</a>
    <span className="footer-sep">|</span>
    <button className="footer-link" onClick={()=>navigate('/contact')}>Contact</button>
    <span className="footer-sep">|</span>
    <a href="../erp.html">ERP</a>
  </div></footer>);
}

/* ═══ REVEAL HOOK ═══ */
function useReveal() {
  const ref = useRef(null);
  useEffect(()=>{
    const ct = ref.current?.closest('.scroll-ct');
    if(!ct) return;
    const obs = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{if(e.isIntersecting) e.target.classList.add('visible');});
    },{root:ct,threshold:0.08,rootMargin:'0px 0px -10px 0px'});
    ct.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    return ()=>obs.disconnect();
  });
  return ref;
}

/* ═══ COUNTER ═══ */
function Counter({end,suffix}) {
  const [val,setVal] = useState(0);
  const ref = useRef(null);
  useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{
      if(e.isIntersecting){
        let start=0;const dur=1500;const t0=performance.now();
        const tick=(now)=>{const p=Math.min((now-t0)/dur,1);setVal(Math.floor(p*end));if(p<1) requestAnimationFrame(tick);};
        requestAnimationFrame(tick);obs.disconnect();
      }
    },{threshold:0.3});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[end]);
  return <span ref={ref}>{val.toLocaleString()}{suffix}</span>;
}

/* ═══ PAGE: HOME ═══ */
function HomePage() {
  const r = useReveal();
  return (<div className="scroll-ct" ref={r}>
    <div className="section" style={{minHeight:'calc(100vh - 80px)',display:'flex',flexDirection:'column',justifyContent:'center'}}>
      <div className="section-label">Premium Korean Skin Care in Hanoi</div>
      <h1 className="section-title" style={{fontSize:'clamp(36px,5vw,56px)'}}>Unveil Your <em>True Beauty</em></h1>
      <p className="section-desc">피부 관리 22년 경력의 전문가가 하노이에서 제공하는 정통 한국식 메디컬 스킨케어</p>
      <div style={{display:'flex',gap:12,marginTop:8}}>
        <button className="btn-primary" onClick={()=>navigate('/echart')}>상담 예약하기 &rarr;</button>
        <button className="btn-outline" onClick={()=>navigate('/program')}>프로그램 보기</button>
      </div>
    </div>

    <div className="section reveal">
      <div className="section-label">Our Philosophy</div>
      <h2 className="section-title">피부 과학과 정성이 <em>만나는 곳</em></h2>
      <p className="section-desc">22년간 축적된 피부 관리 노하우와 한국 최신 메디컬 스킨케어 기술을 결합하여, 하노이에서 가장 신뢰할 수 있는 프리미엄 피부관리를 제공합니다.</p>
      <button className="btn-primary" onClick={()=>navigate('/about')}>자세히보기 &rarr;</button>
    </div>

    <div className="section reveal">
      <div className="section-label">Our Programs</div>

/* ═══ APP ═══ */
function App() {
  const route = useHash();
  const isHome = route === '/';
  const [loaded,setLoaded] = useState(false);

  useEffect(()=>{
    setTimeout(()=>setLoaded(true), 1800);
  },[]);

  useEffect(()=>{
    // 페이지 전환 시 스크롤 상단으로
    const ct = document.querySelector('.scroll-ct');
    if(ct) ct.scrollTop = 0;
  },[route]);

  const page = useMemo(()=>{
    switch(route) {
      case '/': return <HomePage/>;
      case '/about': return <AboutPage/>;
      case '/contact': return <ContactPage/>;
      case '/diploma': return <DiplomaPage/>;
      case '/program': return <ProgramPage/>;
      case '/shop': return <ShopPage/>;
      case '/selfbeauty': return <SelfBeautyPage/>;
      case '/letter': return <LetterPage/>;
      case '/academy': return <AcademyPage/>;
      case '/echart': return <EChartPage/>;
      default: return <HomePage/>;
    }
  },[route]);

  return (<>
    {!loaded && isHome && (
      <div className="loader-wrap" style={{opacity: loaded?0:1}}>
        <div className="loader-text">HWASA in Hanoi</div>
        <div className="loader-bar"><div className="loader-fill" ref={el=>{if(el) setTimeout(()=>el.style.width='100%',100);}}/></div>
      </div>
    )}
    <Background isHome={isHome}/>
    <Header current={route}/>
    <Sidebar current={route}/>
    {page}
    <Footer/>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
